components:
  schemas:
    CloudProviderLimits:
      required:
        - os
        - providerType
      type: object
      properties:
        os:
          type: array
          items:
            type: string
          description: OS's allows for the creation of VM's
          example:
            - "Ubuntu-22.04"
            - "Ubuntu-24.01"
            - "Ubuntu-24.02"
            - "Ubuntu-24.03"
            - "Centos 6"
        providerType:
          type: string
          description: Discriminator field to identify the cloud provider.
          example: "OVH"
    IONOSProvisionerTemplate:
      allOf:
        - $ref: '#/components/schemas/CloudProvisionerTemplate'
        - type: object
          properties:
            minCpuCore:
              type: integer
              format: int32
              description: Minimum number of cores for the VM
              example: 1
            maxCpuCore:
              type: integer
              format: int32
              description: Maximum number of cores for the VM
              example: 4
            minRam:
              type: integer
              format: int32
              description: Minimum ram size (Mb) for the VM
              example: 1024
            maxRam:
              type: integer
              format: int32
              description: Maximum ram size (Mb) for the VM
              example: 2048
            minStorage:
              type: integer
              format: int32
              description: Minimum storage size (Gb) for the VM
              example: 25
            maxStorage:
              type: integer
              format: int32
              description: Maximum storage size (Gb) for the VM
              example: 100
    IONOSProvisionerTemplateRequest:
      required:
        - minCpuCore
        - maxCpuCore
        - minRam
        - maxRam
        - minStorage
        - maxStorage
        - providerType
      allOf:
        - $ref: '#/components/schemas/CloudProvisionerTemplateRequest'
        - type: object
          properties:
            minCpuCore:
              type: integer
              format: int32
              description: Minimum number of cores for the VM
              example: 1
            maxCpuCore:
              type: integer
              format: int32
              description: Maximum number of cores for the VM
              example: 4
            minRam:
              type: integer
              format: int32
              description: Minimum ram size (Mb) for the VM
              example: 1024
            maxRam:
              type: integer
              format: int32
              description: Maximum ram size (Mb) for the VM
              example: 2048
            minStorage:
              type: integer
              format: int32
              description: Minimum storage size (Gb) for the VM
              example: 25
            maxStorage:
              type: integer
              format: int32
              description: Maximum storage size (Gb) for the VM
              example: 100
            providerType:
              type: string
              description: Discriminator field to identify the cloud provider.
              example: "IONOS"
    IONOSLimits:
      allOf:
        - $ref: '#/components/schemas/CloudProviderLimits'
        - type: object
          properties:
            minCpuCore:
              type: integer
              format: int32
              description: Minimum number of cores for the VM
              example: 1
            maxCpuCore:
              type: integer
              format: int32
              description: Maximum number of cores for the VM
              example: 4
            minRam:
              type: integer
              format: int32
              description: Minimum ram size (Mb) for the VM
              example: 1024
            maxRam:
              type: integer
              format: int32
              description: Maximum ram size (Mb) for the VM
              example: 2048
            minStorage:
              type: integer
              format: int32
              description: Minimum storage size (Gb) for the VM
              example: 25
            maxStorage:
              type: integer
              format: int32
              description: Maximum storage size (Gb) for the VM
              example: 100
        - description: 'IONOS limits sent to the client to IONOS VMs'
    OVHProvisionerTemplate:
      allOf:
        - $ref: '#/components/schemas/CloudProvisionerTemplate'
        - type: object
          properties:
            projectId:
              type: string
              description: Project id related to the environment of the VM
              example: c67c62fb7a574a88ba4cXXXXXXXXXXXX
            region:
              type: string
              description: Region where the VM will be running
              example: GRA11
            flavor:
              type: string
              description: OVH flavor for the VM
              example: d2-2
    OVHProvisionerTemplateRequest:
      required:
        - projectId
        - region
        - flavor
        - providerType
      allOf:
        - $ref: '#/components/schemas/CloudProvisionerTemplateRequest'
        - type: object
          properties:
            projectId:
