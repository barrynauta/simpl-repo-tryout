  "/agreements/{contractNegotiationId}/search":
    post:
      tags:
        - contract-agreements
      summary: Search for existing active Contract Agreement with multiple parameters
      description: Get confirmation if Contract Agreement is stored in database.
      operationId: contract#ContractAgreementSearchParams
      parameters:
        - name: contractNegotiationId
          in: path
          description: Contract Negotiation Id
          required: true
          schema:
            type: string
            pattern: "^[A-Za-z0-9:-]+$"
          example: 0ec61c92-677b-4e97-aef1-ed542e37183b
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contractAgreementId:
                  type: string
                  format: uuid
                  description: Contract Agreement Id
                  example: 0ec61c92-677b-4e97-aef1-ed542e37183b
                contractDefinitionId:
                  type: string
                  pattern: "^[A-Za-z0-9:-]+$"
                  description: Contract Definition Id
                  example: 0ec61c92-677b-4e97-aef1-ed542e37183b
                assetId:
                  type: string
                  pattern: "^[A-Za-z0-9:-]+$"
                  description: Contract asset Id
                  example: 123Ab
                providerId:
                  type: string
                  pattern: "^[A-Za-z0-9:-]+$"
                  description: Contract provider Id
                  example: abc12
                consumerId:
                  type: string
                  pattern: "^[A-Za-z0-9:-]+$"
                  description: Contract consumer Id
                  example: XC-12
      responses:
        '200':
          description: OK response.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ContractSearchConfirmation"
              example:
                contractAgreementId: 677186f6-1179-4cf1-b845-68d1c00c185f
                contractSearchTO:
                  contractAgreementId: 677186f6-1179-4cf1-b845-68d1c00c185f
                  contractDefinitionId: 77777777-1179-4cf1-b845-777777777777
                  assetId: A1
                  providerId: P1
                  consumerId: C1
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: urn:error:single-custom-exception
                status: 400
                title: Bad Request
                detail: 400 BAD_REQUEST "Validation failure"
                instance: "/contract/v1/agreements/{contractNegotiationId}/search"
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                status: 401
                title: Unauthorized
                detail: Invalid API Key
        '405':
          description: Method Not allowed
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                status: 405
                title: Method Not Allowed
