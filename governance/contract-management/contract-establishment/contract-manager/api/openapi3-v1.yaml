    get:
      tags:
        - health
      summary: health check endpoint
      description: Health check endpoint
      operationId: health#Liveness
      responses:
        '200':
          description: OK response.
          content:
            application/vnd.spring-boot.actuator.v3+json:
              schema:
                "$ref": "#/components/schemas/HealthResponse"
              example:
                status: UP
                groups:
                  - liveness
                  - readiness
                components:
                  db:
                    status: UP
                    details:
                      database: PostgreSQL
                      validationQuery: isValid()
                  diskSpace:
                    status: UP
                    details:
                      total: 135024029696
                      free: 42437074944
                      threshold: 10485760
                      path: C:\workspace\CONTRACTS-BILLING\repos\contract\.
                      exists: true
                  livenessState:
                    status: UP
                  ping:
                    status: UP
                  readinessState:
                    status: UP
                  ssl:
                    status: UP
                    details:
                      validChains: [ ]
                      invalidChains: [ ]
        '503':
          description: Service Unavailable
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                status: 503
                title: Service Unavailable
                detail: Service Unavailable
  "/credentials/agreements/{contractAgreementId}/definitions/{contractDefinitionId}/issue":
    post:
      tags:
        - verifiable-credentials
      summary: Issue Verifiable credential
      description: Issue Verifiable credential. Start the process of signing contract.
      operationId: contract#CreateVerifiableCredential
      requestBody:
        description: Request body
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ContractAgreementCreate"
            example:
              contractNegotiationId: 0ec61c92-677b-4e97-aef1-ed542e37183b
              assetId: MyResource1
              providerId: FirstProvider
              consumerId: Cons2000
              contractOfferId: 32c61c92-677b-4e97-aef1-ed542e371234
        required: false
      parameters:
        - name: contractAgreementId
          in: path
          description: Contract Agreement Id
          required: true
          schema:
            type: string
            format: uuid
          example: 0ec61c92-677b-4e97-aef1-ed542e37183b
        - name: contractDefinitionId
          in: path
          description: Contract Definition Id
          required: true
          schema:
            type: string
          example: 0ec61c92-677b-4e97-aef1-ed542e37183b
      responses:
        '201':
          description: OK response.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConfirmationResponse"
              example:
                contractAgreementId: 677186f6-1179-4cf1-b845-68d1c00c185f
                contractDefinitionId: 777186f6-1179-4cf1-b845-68d1c00c185f
                status: INITIATED
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                status: 400
                title: Bad Request
                detail: Invalid body content
                instance: "/contract/v1/credentials/agreements/7e822f42-f17c-4849-a56f-fbdb5209cd17/definitions/def1/issue"
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                status: 401
                title: Unauthorized
                detail: Invalid API Key
        '405':
          description: Method Not allowed
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                status: 405
                title: Method Not Allowed
                instance: "/contract/v1/credentials/agreements/7e822f42-f17c-4849-a56f-fbdb5209cd17/definitions/def1/issue"
        '500':
