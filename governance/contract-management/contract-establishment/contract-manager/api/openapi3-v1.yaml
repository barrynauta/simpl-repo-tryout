  "/verifications/{contractNegotiationId}":
    put:
      tags:
        - verifiable-credentials
      summary: Verify a Verifiable Credential
      description: Verify a Verifiable Credential request and provide response in async way
      operationId: contract#verifyCredential
      requestBody:
        description: Request body
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/VerifyCredentialRequest"
            example:
              "@context": [ "https://www.w3.org/2018/credentials/v1" ]
              type: [ "VerifiableCredential", "ContractCreated" ]
              issuer: "did:jwk:..."
              issuanceDate: "2024-10-01T10:09:52Z"
              credentialSubject:
                userId: "user-789"
                collectionId: "X"
              proof:
                type: "Ed25519Signature2020"
                created: "2024-10-01T10:09:53Z"
                proofPurpose: "assertionMethod"
                verificationMethod: "did:jwk:...#0"
                proofValue: "z4byXHND..."
        required: true
      parameters:
        - name: contractNegotiationId
          in: path
          description: Contract Negotiation Id
          required: true
          schema:
            type: string
          example: 0ec61c92-677b-4e97-aef1-ed542e37183b
      responses:
        '200':
          description: OK response.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/VerificationConfirmationResponse"
              example:
                contractNegotiationId: 677186f6-1179-4cf1-b845-68d1c00c185f
                status: INITIATED
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: "urn:problem-type:simpl:argumentTypeMismatch"
                status: 400
                title: Bad Request
                detail: Invalid body content
                instance: "/verifications/7e822f42-f17c-4849-a56f-fbdb5209cd17"
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: "urn:problem-type:simpl:unauthorized"
                status: 401
                title: Unauthorized
                detail: Invalid API Key
        '405':
          description: Method Not allowed
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: "urn:problem-type:simpl:methodNotSupported"
                status: 405
                title: Method Not Allowed
                instance: "/verifications/7e822f42-f17c-4849-a56f-fbdb5209cd17"
        '415':
          description: Unsupported Media Type
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: "urn:problem-type:simpl:unsupportedMediaType"
                status: 415
                title: Unsupported Media Type
                instance: "/verifications/7e822f42-f17c-4849-a56f-fbdb5209cd17"
        '500':
          description: Server Error
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: "urn:problem-type:simpl:internalServerError"
                status: 500
                title: Server Error
                detail: Server Error

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
  schemas:
    ConfirmationResponse:
      type: object
      required:
        - contractAgreementId
        - contractDefinitionId
        - status
      properties:
        contractAgreementId:
          type: string
          format: uuid
          description: ID of contract agreement
        contractDefinitionId:
          type: string
          description: ID of contract definition
        status:
          type: string
          description: Status of the process, in initiated state.
          example: TERMINATED
          format: string
          enum:
            - INITIATED
            - CREATED
            - FINALIZING
            - FINALIZED
            - TERMINATED
      example:
        contractAgreementId: 677186f6-1179-4cf1-b845-68d1c00c185f
        contractDefinitionId: 777186f6-1179-4cf1-b845-68d1c00c185f
        status: FINALIZING
    ContractSearchConfirmation:
      type: object
      required:
        - contractAgreementId
        - contractDefinitionId
      properties:
        contractAgreementId:
          type: string
          description: ID of contract agreement
        contractDefinitionId:
          type: string
          description: ID of contract definition
      example:
        contractAgreementId: 677186f6-1179-4cf1-b845-68d1c00c185f
        contractDefinitionId: 777186f6-1179-4cf1-b845-68d1c00c185f
    VerificationConfirmationResponse:
      type: object
      required:
        - contractNegotiationId
      properties:
        contractNegotiationId:
          type: string
          description: ID of contract negotiation
        status:
          type: string
          description: Status of the process, in initiated state.
          example: INITIATED
          format: string
          enum:
            - INITIATED
      example:
        contractNegotiationId: 677186f6-1179-4cf1-b845-68d1c00c185f
        status: INITIATED
    ContractAgreementData:
      type: object
      required:
        - contractAgreementId
        - contractDefinitionId
        - status
      properties:
        contractAgreementId:
          type: string
          format: uuid
          description: ID of contract agreement
        contractDefinitionId:
          type: string
          description: ID of contract definition
        consumerSignatureDate:
          type: string
          description: Consumer signature date
        providerSignatureDate:
          type: string
          description: Provider signature date
        status:
          type: string
          description: Status of the process, in initiated state.
          example: TERMINATED
          format: string
          enum:
            - INITIATED
            - CREATED
            - FINALIZING
            - FINALIZED
            - TERMINATED
        contractNegotiationId:
          type: string
          description: Contract negotiation ID
        assetId:
          type: string
          description: Asset ID
        providerId:
          type: string
          description: Provider ID
        consumerId:
          type: string
          description: Consumer ID
        contractOfferId:
          type: string
          description: Contract offer ID
      example:
        contractAgreementId: 677186f6-1179-4cf1-b845-68d1c00c185f
        contractDefinitionId: 777186f6-1179-4cf1-b845-68d1c00c185f
        consumerSignatureDate: '2024-05-05T10:20:30'
        providerSignatureDate: '2024-05-05T10:20:30'
        status: FINALIZING
        contractNegotiationId: C1-12
        assetId: As5
        providerId: PR1
        consumerId: CNS44
        contractOfferId: C1-12-33
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Overall health status
          enum: [ UP, DOWN ]
          example: UP
        groups:
          type: array
          description: Groups of probes aggregated in this health response
          items:
            type: string
          example: [ "liveness", "readiness" ]
        components:
          type: object
          description: Detailed component health information. Keys are component names, values are health objects.
          additionalProperties:
            type: object
            required:
              - status
            properties:
              status:
                type: string
                enum: [ UP, DOWN ]
                description: Component status
                example: UP
              details:
                type: object
                description: Component-specific details
                additionalProperties: true
          example:
            db:
              status: UP
              details:
                database: PostgreSQL
                validationQuery: isValid()
            diskSpace:
              status: UP
              details:
                total: 207929917440
                free: 40679194624
                threshold: 10485760
                path: "/."
                exists: true
    ContractAgreementCreate:
      type: object
      properties:
        contractNegotiationId:
          type: string
          example: "C1-12"
          format: string
        assetId:
          type: string
          example: "C1-12"
          format: string
        providerId:
          type: string
          example: "provider1"
          format: string
        consumerId:
          type: string
          example: "consumer1000"
          format: string
        contractOfferId:
          type: string
          example: "offerId123"
          format: string
      example:
        contractNegotiationId: C1-12
        assetId: As5
        providerId: PR1
        consumerId: CNS44
        contractOfferId: C1-12-33
    StatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: TERMINATED
          format: string
          enum:
            - FINALIZED
            - TERMINATED
      example:
        status: FINALIZED
    VerifyCredentialRequest:
      description: Verifiable Credential JSON
      type: object
      additionalProperties: true
      allOf:
        - $ref: "#/components/schemas/VerifiableCredential"
    VerifiableCredential:
      type: object
      description: W3C Verifiable Credential
      additionalProperties: true
      required:
        - "@context"
        - type
        - issuer
        - credentialSubject
      properties:
        "@context":
          description: JSON-LD context defining the semantic meaning of the credential
          oneOf:
            - type: string
              format: uri
            - type: array
              items:
                oneOf:
                  - type: string
                    format: uri
                  - type: object
        id:
          type: string
          format: uri
          description: Globally unique identifier for the verifiable credential
        type:
          description: Type definitions for the credential
          oneOf:
            - type: string
            - type: array
              minItems: 1
              items:
                type: string
          example:
            - VerifiableCredential
        name:
          type: string
          description: Human-readable name of the credential
        description:
          type: string
          description: Human-readable description of the credential
        issuer:
          description: Entity that issued the verifiable credential
          oneOf:
            - type: string
              format: uri
            - type: object
              additionalProperties: true
        issuanceDate:
          type: string
          format: date-time
        credentialSubject:
          description: Subject(s) to which the claims in the credential apply
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        validFrom:
          type: string
          format: date-time
          description: Date and time when the credential becomes valid
        validUntil:
          type: string
          format: date-time
          description: Date and time when the credential expires
        credentialStatus:
          description: Information used to determine the current status of the credential
          type: object
          additionalProperties: true
        credentialSchema:
          description: Schema defining the structure of the credential subject
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        refreshService:
          description: Service used to refresh the credential
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        termsOfUse:
          description: Terms of use associated with the credential
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        evidence:
          description: Evidence used to support the claims in the credential
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        proof:
          description: Cryptographic proofs used to verify the credential
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
      example:
        "@context":
          - "https://www.w3.org/2018/credentials/v1"
        type:
          - "VerifiableCredential"
          - "ContractCreated"
        issuer: "did:jwk:eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9..."
        issuanceDate: "2024-10-01T10:09:52Z"
        credentialSubject:
          userId: "user-789"
          collectionId: "X"
          validUntil: "2026-10-01T10:09:53Z"
        proof:
          type: "Ed25519Signature2020"
          created: "2024-10-01T10:09:53Z"
          proofPurpose: "assertionMethod"
          verificationMethod: "did:jwk:...#0"
          proofValue: "z4byXHNDw6FS37D3HVj2bApCfGQzNUmA7opvuNFe6mae..."

    Problem:
      description: A Problem Details object (RFC 9457). Additional properties specific
        to the problem type may be present.
      type: object
      properties:
        type:
          type: string
          format: uri
          description: An absolute URI that identifies the problem type
          default: about:blank
        title:
          type: string
          description: A short summary of the problem type. Written in English and
            readable for engineers (usually not suited for non technical stakeholders
            and not localized).
          example: Service Unavailable
        status:
          type: integer
          format: int32
          description: The HTTP status code generated by the origin server for this
            occurrence of the problem.
          minimum: 400
          maximum: 600
          exclusiveMaximum: true
          example: 503
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of
            the problem
        instance:
          type: string
          format: uri
          description: An absolute URI that identifies the specific occurrence of
            the problem. It may or may not yield further information if dereferenced.
