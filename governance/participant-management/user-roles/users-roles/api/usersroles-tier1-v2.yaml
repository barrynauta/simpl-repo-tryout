openapi: 3.0.1
info:
  title: User and Roles Tier 1
  description: Tier 1 APIs for managing Users and Roles in the Simpl-Open Agent
  contact:
    name: Simpl Programme
    url: https://simpl-programme.ec.europa.eu/
    email: cnect-simpl@ec.europa.eu
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  version: 2.0.0
servers:
- url: https://localhost:8082/tier1/v2
  description: usersroles
security:
- oauth2ClientCredentials: []
tags:
- name: Users
  description: Manages the Users of the Simpl-Open Agent
- name: Roles
  description: Manages the Roles of the Simpl-Open Agent
- name: User Session
  description: Helps users to retrieve their session data
paths:
  /users/{userId}:
    get:
      tags:
      - Users
      summary: Find User by ID
      description: Retrieves a User by its unique identifier.
      operationId: getUserById
      parameters:
      - name: userId
        in: path
        description: UUID of the User to be retrieved
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: Default example
            value: 8f031077-1d65-4f9c-96cf-8a388db51469
          getUser:
            summary: Get user by user ID example
            value: 9f031077-1d65-4f9c-96cf-8a388db51469
          notFound:
            summary: Bad request example
            value: 7f031077-1d65-4f9c-96cf-8a388db51469
          badRequest:
            summary: Bad request example
            value: 6f031077-1d65-4f9c-96cf-8a388db51469
          unauthorized:
            summary: Unauthorized access example
            value: 5f031077-1d65-4f9c-96cf-8a388db51469
          forbidden:
            summary: Forbidden access example
            value: 4f031077-1d65-4f9c-96cf-8a388db51469
      responses:
        "200":
          description: Successfully retrieved User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              examples:
                default:
                  summary: Default example
                  value:
                    id: 8f031077-1d65-4f9c-96cf-8a388db51469
                    firstName: Alexander
                    lastName: Williams
                    username: a.w
                    email: a.w@email.com
                    status: ENABLED
                    federated: false
                    roles:
                    - ONBOARDER_M
                    - T1UAR_M
                getUser:
                  summary: Default example
                  value:
                    id: 9f031077-1d65-4f9c-96cf-8a388db51469
                    firstName: Alexander
                    lastName: Williams
                    roles:
                    - ONBOARDER_M
                    - T1UAR_M
                    email: a.w@email.com
                    password: password
                    enabled: false
                    username: a.w
                    federated: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - T1UAR_M
    put:
      tags:
      - Users
      summary: Update User
      description: Updates an existing User by its unique identifier.
      operationId: updateUserById
      parameters:
      - name: userId
        in: path
        description: UUID of the User to be updated
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: Default example
            value: f50f9747-4fd4-4057-9937-1a86dd6e7142
          updateUserExample:
            summary: Default example
            value: f49f9747-4fd4-4057-9937-1a86dd6e7142
          notFound:
            summary: Bad request example
            value: 7f031077-1d65-4f9c-96cf-8a388db51469
          badRequest:
            summary: Bad request example
            value: 6f031077-1d65-4f9c-96cf-8a388db51469
          unauthorized:
            summary: Unauthorized access example
            value: 5f031077-1d65-4f9c-96cf-8a388db51469
          forbidden:
            summary: Forbidden access example
            value: 4f031077-1d65-4f9c-96cf-8a388db51469
      requestBody:
        description: Updated User data
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
            examples:
              default:
                summary: Default example
                value:
                  firstName: Alexander
                  lastName: Williams
                  username: a.w
                  email: a.w@email.com
                  enabled: true
                  roles:
                  - ONBOARDER_M
                  - T1UAR_M
              updateUserExample:
                summary: update user
                value:
                  firstName: Alexander
                  lastName: Doe
                  username: a.w
                  email: a.w@email.com
                  enabled: true
                  roles:
                  - T1UAR_M
        required: true
      responses:
        "204":
          description: Successfully updated User
          x-microcks-refs:
          - default
          - updateUserExample
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-microcks-operation:
        dispatcher: JSON_BODY
        dispatcherRules: |
          {
            "exp": "/email",
            "operator": "equals",
            "cases": {
              "a.w@email.com": "updateUserExample",
              "a.wemail.com": "badRequest",
              "aa.w@email.com": "conflict",
              "unauthorized@email.com": "unauthorized",
              "forbidden@email.com": "forbidden",
              "w.a@email.com": "notFound",
              "default": "badRequest"
            }
          }
      x-simpl-roles:
      - T1UAR_M
    delete:
      tags:
      - Users
      summary: Delete User
      description: Deletes an User by its unique identifier.
      operationId: deleteUserById
      parameters:
      - name: userId
        in: path
        description: UUID of the User to be deleted
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: Default example
            value: 25827477-c58d-4573-ad7d-f80e27d3fede
          deleteUser:
            summary: delete user
            value: f49f9747-4fd4-4057-9937-1a86dd6e7142
          notFound:
            summary: 404 - Not found
            value: e49f9747-4fd4-4057-9937-1a86dd6e7142
          badRequest:
            summary: 400 - Bad request example
            value: 6f031077-1d65-4f9c-96cf-8a388db51469
          unauthorized:
            summary: 401 - unauthorized
            value: 5f031077-1d65-4f9c-96cf-8a388db51469
          forbidden:
            summary: 403 - forbidden
            value: 4f031077-1d65-4f9c-96cf-8a388db51469
      responses:
        "204":
          description: Successfully deleted User
          x-microcks-refs:
          - default
          - deleteUser
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - T1UAR_M
  /users/{userId}/roles:
    get:
      tags:
      - Users
      summary: Retrieve roles for a user
      description: Returns the list of roles associated with the specified user.
      operationId: getUserRoles
      parameters:
      - name: userId
        in: path
        description: The ID of the user.
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          getRoles:
            summary: get a user's roles
            value: f49f9747-4fd4-4057-9937-1a86dd6e7142
          notFound:
            summary: 404 - Not found
            value: e49f9747-4fd4-4057-9937-1a86dd6e7142
          badRequest:
            summary: 400 - Bad request example
            value: 6f031077-1d65-4f9c-96cf-8a388db51469
          unauthorized:
            summary: 401 - unauthorized
            value: 5f031077-1d65-4f9c-96cf-8a388db51469
          forbidden:
            summary: 403 - forbidden
            value: 4f031077-1d65-4f9c-96cf-8a388db51469
      responses:
        "200":
          description: Successfully retrieved the list of roles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
              examples:
                getRoles:
                  summary: get a user's roles
                  value:
                  - code: SD_PUBLISHER
                    id: 08da9510-7c1a-462b-9869-53f4d4dcdeab
                    name: SD Publisher
                    description: User with permissions to publish data to the Simpl
                      platform.
                    builtIn: false
                    enabled: true
                  - code: RESEARCHER
                    id: 123e4567-e89b-12d3-a456-426614174000
                    name: Researcher
                    description: User with permissions to access and analyze data
                      on the Simpl platform.
                    builtIn: false
                    enabled: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - T1UAR_M
    put:
      tags:
      - Users
      summary: Update roles for a user
      description: "Replaces the id for the specified user. If the list is empty,\
        \ all existing roles will be deleted."
      operationId: updateUserRoles
      parameters:
      - name: userId
        in: path
        description: The ID of the user.
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          updateRoles:
            summary: get a user's roles
            value: f49f9747-4fd4-4057-9937-1a86dd6e7142
          notFound:
            summary: 404 - Not found
            value: e49f9747-4fd4-4057-9937-1a86dd6e7142
          badRequest:
            summary: 400 - Bad request example
            value: 6f031077-1d65-4f9c-96cf-8a388db51469
          unauthorized:
            summary: 401 - unauthorized
            value: 5f031077-1d65-4f9c-96cf-8a388db51469
          forbidden:
            summary: 403 - forbidden
            value: 4f031077-1d65-4f9c-96cf-8a388db51469
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleAssignmentRequest"
            examples:
              default:
                summary: Default example
        required: true
      responses:
        "204":
          description: Roles updated successfully.
          x-microcks-refs:
          - updateRoles
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - T1UAR_M
  /users:
    get:
      tags:
      - Users
      summary: Search Users
      description: Searches for Users based on provided filters and pagination options.
      operationId: searchUsers
      parameters:
      - name: page
        in: query
        description: the index of page to be retrieved
        required: false
        schema:
          $ref: "#/components/schemas/PageQueryParam"
        examples:
          filteredByNamesMailStatusFederated:
            summary: First page
            value: 0
          filteredByUsernameAsc:
            summary: First page
            value: 0
          filteredByEmailAsc:
            summary: First page
            value: 0
          filteredByEmailDesc:
            summary: First page
            value: 0
          filteredByUsernameDesc:
            summary: First page
            value: 0
          filteredByNamesMailStatusFederatedEmptyList:
            summary: First page
            value: 0
          firstPage:
            summary: First page
            value: 0
          firstPageSortedByUsernameAsc:
            summary: First page sorted by username asc
            value: 0
          firstPageSortedByUsernameDesc:
            summary: First page sorted by username desc
            value: 0
          firstPageFilteredByCode:
            summary: First page filtered by organization
            value: 0
          secondPageEmpty:
            summary: Second page empty
            value: 1
      - name: pageSize
        in: query
        description: maximum number of items per page desired by client
        required: false
        schema:
          $ref: "#/components/schemas/PageSizeQueryParam"
        examples:
          filteredByUsernameAsc:
            summary: First page
            value: 10
          filteredByUsernameDesc:
            summary: First page
            value: 10
          filteredByEmailAsc:
            summary: First page
            value: 10
          filteredByEmailDesc:
            summary: First page
            value: 10
          filteredByNamesMailStatusFederated:
            summary: page size
            value: 10
          filteredByNamesMailStatusFederatedEmptyList:
            summary: page size
            value: 10
          firstPage:
            summary: First page
            value: 10
          firstPageSortedByUsernameAsc:
            summary: First page sorted by username asc
            value: 10
          firstPageSortedByUsernameDesc:
            summary: First page sorted by username desc
            value: 10
          firstPageFilteredByCode:
            summary: First page filtered by organization
            value: 10
          secondPageEmpty:
            summary: Second page empty
            value: 10
      - name: firstName
        in: query
        description: the first name of the user
        required: false
        schema:
          type: string
          maxLength: 255
        examples:
          filteredByNamesMailStatusFederated:
            summary: First name
            value: Ethan
          filteredByNamesMailStatusFederatedEmptyList:
            summary: First name
            value: Liam
          firstPageFilteredByCode:
            summary: Default
            value: Alexander
      - name: lastName
        in: query
        description: the last name of the user
        required: false
        schema:
          type: string
          maxLength: 255
        examples:
          filteredByNamesMailStatusFederated:
            summary: last name
            value: Marsh
          filteredByNamesMailStatusFederatedEmptyList:
            summary: last name
            value: Kensington
          firstPageFilteredByCode:
            summary: Default
            value: Williams
      - name: username
        in: query
        description: the username of the user
        required: false
        schema:
          type: string
          maxLength: 255
        examples:
          filteredByUsernameAsc:
            summary: username
            value: Marsh
          filteredByUsernameDesc:
            summary: username
            value: marshethan
          filteredByNamesMailStatusFederated:
            summary: username
            value: marshethan
          filteredByNamesMailStatusFederatedEmptyList:
            summary: username
            value: Kensington
      - name: email
        in: query
        description: the email of the user
        required: false
        schema:
          type: string
          maxLength: 255
        examples:
          filteredByEmailAsc:
            summary: email
            value: ethanmarsh@mail.com
          filteredByEmailDesc:
            summary: email
            value: ethanmarsh@mail.com
          filteredByNamesMailStatusFederated:
            summary: email
            value: ethanmarsh@mail.com
          filteredByNamesMailStatusFederatedEmptyList:
            summary: email
            value: liamkensington@mail.com
          firstPageFilteredByCode:
            summary: Default
            value: a.w@example.com
      - name: enabled
        in: query
        description: filter enabled or disabled Users
        required: false
        schema:
          type: boolean
        examples:
          filteredByNamesMailStatusFederated:
            summary: filter enabled or disabled Users
            value: ENABLED
          filteredByNamesMailStatusFederatedEmptyList:
            summary: filter enabled or disabled Users
            value: DISABLED
          firstPageFilteredByCode:
            summary: Default
            value: true
      - name: federated
        in: query
        description: filter federated or non-federated Users
        required: false
        schema:
          type: boolean
        examples:
          filteredByNamesMailStatusFederated:
            summary: filter federated or non-federated Users
            value: true
          filteredByNamesMailStatusFederatedEmptyList:
            summary: filter federated or non-federated Users
            value: false
          firstPageFilteredByCode:
            summary: Default
            value: true
      - name: unpaged
        in: query
        description: "if true, the response will not be paginated and will return\
          \ all matching Users"
        required: false
        schema:
          type: boolean
        examples:
          firstPageFilteredByCode:
            summary: Default
            value: false
      responses:
        "200":
          description: Successfully retrieved search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersPagedResponse"
              examples:
                default:
                  summary: Default example
                  value:
                    self: /users?status=ENABLED&sort=username&page=2&pageSize=2
                    pageSize: 2
                    page: 2
                    total: 7
                    first: /users?status=ENABLED&sort=username&page=0&pageSize=2
                    last: /users?status=ENABLED&sort=username&page=4&pageSize=2
                    prev: /users?status=ENABLED&sort=username&page=1&pageSize=2
                    next: /users?status=ENABLED&sort=username&page=3&pageSize=2
                    items:
                    - firstName: Alexander
                      lastName: Williams
                      roles:
                      - ONBOARDER_M
                      - T1UAR_M
                      id: 1e79ec32-3dee-403d-9f80-cd18d374fa82
                      email: a.w@email.com
                      enabled: true
                      username: a.w
                      federated: false
                    - firstName: Brian
                      lastName: Johnson
                      roles:
                      - T1UAR_M
                      id: 2b89ec32-4dee-403d-9f80-cd18d374fa83
                      email: b.j@email.com
                      enabled: false
                      username: b.j
                      federated: false
                filteredByUsernameAsc:
                  summary: First page
                  value:
                    self: /users?page=0&pageSize=10&sort=useranem&firstname=Ethan&lastname=Marsh&username=marshethan&email=ethanmarsh@mail.com&status=ENABLED&federated=true
                    pageSize: 10
                    page: 0
                    total: 2
                    first: https://first.com
                    last: https://last.com
                    prev: https://prev.com
                    next: https://next.com
                    items:
                    - id: 1e79ec32-3dee-403d-9f80-cd18d374fa82
                      firstName: Ethan
                      lastName: Marsh
                      email: ethanmarsh1@email.com
                      username: EthanMarsh1
                      password: password
                      roles:
                      - ONBOARDER_M
                      - T1UAR_M
                    - id: 1e79ec32-3dee-403d-9f80-cd18d374fa83
                      firstName: Ethan
                      lastName: Marsh
                      email: ethanmarsh2@email.com
                      username: EthanMarsh2
                      password: password
                      roles:
                      - ONBOARDER_M
                      - T1UAR_M
                filteredByUsernameDesc:
                  summary: First page
                  value:
                    self: /users?page=0&pageSize=10&sort=useranem&firstname=Ethan&lastname=Marsh&username=marshethan&email=ethanmarsh@mail.com&status=ENABLED&federated=true
                    pageSize: 10
                    page: 0
                    total: 1
                    first: https://first.com
                    last: https://last.com
                    prev: https://prev.com
                    next: https://next.com
                    items:
                    - id: 1e79ec32-3dee-403d-9f80-cd18d374fa82
                      firstName: Ethan
                      lastName: Marsh
                      email: ethanmarsh@email.com
                      username: EthanMarsh
                      password: password
                      roles:
                      - ONBOARDER_M
                      - T1UAR_M
                filteredByEmailAsc:
                  summary: First page
                  value:
                    self: /users?page=0&pageSize=10&sort=useranem&firstname=Ethan&lastname=Marsh&username=marshethan&email=ethanmarsh@mail.com&status=ENABLED&federated=true
                    pageSize: 10
                    page: 0
                    total: 1
                    first: https://first.com
                    last: https://last.com
                    prev: https://prev.com
                    next: https://next.com
                    items:
                    - id: 1e79ec32-3dee-403d-9f80-cd18d374fa82
                      firstName: Ethan
                      lastName: Marsh
                      email: ethanmarsh@email.com
                      username: EthanMarsh
                      password: password
                      roles:
                      - ONBOARDER_M
                      - T1UAR_M
                filteredByEmailDesc:
                  summary: First page
                  value:
                    self: /users?page=0&pageSize=10&sort=useranem&firstname=Ethan&lastname=Marsh&username=marshethan&email=ethanmarsh@mail.com&status=ENABLED&federated=true
                    pageSize: 10
                    page: 0
                    total: 1
                    first: https://first.com
                    last: https://last.com
                    prev: https://prev.com
                    next: https://next.com
                    items:
                    - id: 1e79ec32-3dee-403d-9f80-cd18d374fa82
                      firstName: Ethan
                      lastName: Marsh
                      email: ethanmarsh@email.com
                      username: EthanMarsh
                      password: password
                      roles:
                      - ONBOARDER_M
                      - T1UAR_M
                firstPage:
                  summary: first page example
                  value:
                  - self: /users?status&page=0
                  - pageSize: 2
                  - page: 0
                  - total: 2
                  - items:
                    - firstName: Alexander
                      lastName: Williams
                      roles:
                      - ONBOARDER_M
                      - T1UAR_M
                      id: 1e79ec32-3dee-403d-9f80-cd18d374fa82
                      email: a.w@email.com
                      enabled: true
                      username: a.w
                      federated: true
                    - firstName: Alexander
                      lastName: Williams
                      roles:
                      - ONBOARDER_M
                      - T1UAR_M
                      id: 1e79ec32-3dee-403d-9f80-cd18d374fa82
                      email: a.w@email.com
                      enabled: true
                      username: a.w
                      federated: false
                filteredByNamesMailStatusFederated:
                  summary: filtered example
                  value:
                    self: /users?page=0&pageSize=10&sort=useranem&firstname=Ethan&lastname=Marsh&username=marshethan&email=ethanmarsh@mail.com&status=ENABLED&federated=true
                    pageSize: 10
                    page: 0
                    total: 1
                    first: https://first.com
                    last: https://last.com
                    prev: https://prev.com
                    next: https://next.com
                    items:
                    - id: 1e79ec32-3dee-403d-9f80-cd18d374fa82
                      firstName: Ethan
                      lastName: Marsh
                      email: ethanmarsh@email.com
                      username: EthanMarsh
                      password: password
                      roles:
                      - ONBOARDER_M
                      - T1UAR_M
                filteredByNamesMailStatusFederatedEmptyList:
                  summary: filtered example
                  value:
                    self: /users?page=0&pageSize=10&sort=useranem&firstname=Ethan&lastname=Marsh&username=Marsh&email=ethanmarsh@mail.com&status=ENABLED&federated=true
                    pageSize: 10
                    page: 0
                    total: 1
                    items: []
                firstPageFilteredByCode:
                  summary: "response filtered by username, firstname, lastname, email,\
                    \ status, federated"
                  value:
                    self: null
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - T1UAR_M
    post:
      tags:
      - Users
      summary: Create User
      description: Creates a new user.
      operationId: createNewUser
      requestBody:
        description: User to be created
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
            examples:
              default:
                summary: Default example
                value:
                  firstName: Alexander
                  lastName: Williams
                  roles:
                  - ONBOARDER_M
                  - T1UAR_M
                  id: 1e79ec32-3dee-403d-9f80-cd18d374fa82
                  email: a.w@email.com
                  enabled: true
                  username: a.w
                  password: changeme
        required: true
      responses:
