      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          import groovy.json.JsonSlurper

          def json = new JsonSlurper().parseText(mockRequest.requestContent)
          def roles = json.rolesRequested ?: []

          if (roles == ["IATTR_M"]) return "iattrm_rq_example"
          if (roles == ["T2IAA_M"]) return "t2iaam_rq_example"
          if (roles == ["IATTR_M","T2IAA_M"]) return "multiple_rq_open_example"
          if (roles == ["T1UAR_M","IATTR_M"]) return "multiple_rq_rejected_example"
          if (roles == ["T2IAA_M","IATTR_M"]) return "multiple_rq_approved_example"
          if (roles == ["T2IAA_M","T1UAR_M"]) return "multiple_rq_canceled_example"

          if (roles == ["SD_PUBLISHER"]) return "open_rq_example"
          if (roles == ["SD_ADMIN1"]) return "canceled_rq_example"
          if (roles == ["SD_ADMIN2"]) return "approved_rq_example"
          if (roles == ["SD_ADMIN3"]) return "rejected_rq_example"

          if (roles.isEmpty()) return "badRequest"
          if (roles == null) return "badRequest"
          if (roles == ["malformed-role"]) return "badRequest"
          if (roles == ["SD_UNKNOWN_ROLE"]) return "badRequest"
          if (roles == ["SD_DUMMY_ASSIGNED"]) return "role-already-assigned"
          if (roles == ["SD_ALREADY_REQUESTED"]) return "role-already-requested"
          if (roles == ["unauthorized"]) return "unauthorized"
          if (roles == ["forbidden"]) return "forbidden"

          return "default"
