components:
  schemas:
    PageMetadata:
      type: object
      example:
        number: 6
        size: 0
        totalPages: 5
        totalElements: 1
      properties:
        size:
          type: integer
          format: int64
        number:
          type: integer
          format: int64
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64
    User:
      type: object
      example:
        firstName: Alexander
        lastName: Williams
        roles:
        - ONBOARDER_M
        - T1UAR_M
        id: 1e79ec32-3dee-403d-9f80-cd18d374fa82
        email: a.w@email.com
        enabled: true
        username: a.w
      properties:
        id:
          type: string
          maxLength: 255
          readOnly: true
        username:
          type: string
          maxLength: 255
        firstName:
          type: string
          maxLength: 255
        lastName:
          type: string
          maxLength: 255
        email:
          type: string
          maxLength: 255
        password:
          type: string
          maxLength: 255
        roles:
          type: array
          items:
            type: string
        enabled:
          type: boolean
      required:
      - email
      - enabled
      - firstName
      - lastName
      - password
      - username
    Role:
      type: object
      example:
      - assignedIdentityAttributes:
        - DATA_PROVIDER_PUBLISHER
        - APP_PROVIDER_PUBLISHER
        - INFRA_PROVIDER_PUBLISHER
        name: Ro-MU-A
        description: "Role defined in XFSC Federated Catalogue: Participant Administrator"
        id: 08da9510-7c1a-462b-9869-53f4d4dcdeab
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 255
        assignedIdentityAttributes:
          type: array
          items:
            type: string
      required:
      - name
    PageResponseRole:
      type: object
      example:
        page:
          number: 6
          size: 0
          totalPages: 5
          totalElements: 1
        content:
        - assignedIdentityAttributes:
          - DATA_PROVIDER_PUBLISHER
          - APP_PROVIDER_PUBLISHER
          - INFRA_PROVIDER_PUBLISHER
          name: Ro-MU-A
          description: "Role defined in XFSC Federated Catalogue: Participant Administrator"
          id: 08da9510-7c1a-462b-9869-53f4d4dcdeab
        - assignedIdentityAttributes:
          - DATA_PROVIDER_PUBLISHER
          - APP_PROVIDER_PUBLISHER
          - INFRA_PROVIDER_PUBLISHER
          name: Ro-Pa-A
          description: "Role defined in XFSC Federated Catalogue: Participant User\
            \ Administrator"
          id: da5a7a86-d27e-442c-ae5a-13dade9bb0c4
        empty: false
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/Role"
        page:
          $ref: "#/components/schemas/PageMetadata"
        empty:
          type: boolean
    Problem:
      type: object
      description: |
        A Problem Details object (RFC 9457).

        Additional properties specific to the problem type may be present.
      example:
        type: urn:problem-type:exampleOrganization:exampleProblem
        href: https://www.belgif.be/specification/rest/api-guide/#standardized-problem-types
        title: Description of the type of problem that occurred
        status: 400
        detail: Description of specific occurrence of the problem
        instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
      properties:
        type:
          type: string
          format: uri
          default: about:blank
          description: |
            An absolute URI that identifies the problem type.  When dereferenced,
            it SHOULD provide human-readable documentation for the problem type
            (e.g., using HTML).
          example: https://zalando.github.io/problem/constraint-violation
        title:
          type: string
          description: |
            A short, summary of the problem type. Written in english and readable
            for engineers (usually not suited for non technical stakeholders and
            not localized); example: Service Unavailable
        status:
          type: integer
          format: int32
          description: |
            The HTTP status code generated by the origin server for this occurrence
            of the problem.
          example: 503
          maximum: 600
          minimum: 100
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the
            problem.
          example: Connection to database timed out
        instance:
          type: string
          format: uri
          description: |-
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
    SearchRolesFilterParameter:
      type: object
      properties:
        name:
          type: array
          items:
            type: string
          maxLength: 255
        description:
          type: string
          maxLength: 255
        attributeName:
          type: string
          maxLength: 255
  responses:
    BadRequest:
      description: "Bad request, invalid input data"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            badRequest:
              summary: Bad Request
              value:
                type: urn:problem-type:simpl:badRequest
                title: Bad request
                detail: Invalid input data
                status: 400
    Unauthorized:
      description: "Unauthorized, the user is not authenticated"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            unauthorized:
              summary: Unauthorized
              value:
                type: urn:problem-type:simpl:unauthorized
                title: Unauthorized
                detail: The user is not authenticated
                status: 401
    Forbidden:
      description: "Forbidden, the user does not have the roles to perform the operation"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            forbidden:
              summary: Forbidden
              value:
                type: urn:problem-type:simpl:forbidden
                title: Forbidden
                detail: The user does not have the roles to perform the operation
                status: 403
    Conflict:
      description: "Conflict, action requested cannot be performed"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            conflict:
              summary: Conflict
              value:
                type: urn:problem-type:simpl:conflict
                title: Conflict
                detail: Conflict
                status: 409
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            notFound:
              summary: Not Found
              value:
                type: urn:problem-type:simpl:notFound
                title: Not Found
                detail: Resource not found
                status: 404
  securitySchemes:
    mtls:
      type: http
