      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - APPLICANT
  /user:
    get:
      tags:
      - User Session
      summary: Fetch user session data for a logged in user
      description: Retrieves user data. Invoked by a user who wants to know its basic
        user information
      operationId: getUserSessionData
      responses:
        "200":
          description: Successfully retrieved user data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSessionData"
              examples:
                default:
                  summary: Default example
                  value:
                    username: aliza.clay
                    firstName: Aliza
                    lastName: Clay
                    email: aliza.clay@example.com
                    authProvider: SIMPL_AUTH
                    roles:
                    - SD_PUBLISHER
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - APPLICANT
components:
  schemas:
    CreateOnboardingRequest:
      allOf:
      - type: object
        properties:
          participantType:
            $ref: "#/components/schemas/ParticipantType"
          applicant:
