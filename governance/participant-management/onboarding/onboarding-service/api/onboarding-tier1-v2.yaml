openapi: 3.0.1
info:
  title: Onboarding Tier 1
  description: Tier 1 APIs for managing Onboarding of applicants to Simpl-Open
  contact:
    name: Simpl Programme
    url: https://simpl-programme.ec.europa.eu/
    email: cnect-simpl@ec.europa.eu
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  version: 2.0.1
servers:
- url: https://localhost:8082/tier1/v2
  description: onboarding
security:
- oauth2ClientCredentials: []
tags:
- name: Onboarding Requests Management
  description: Manage onboarding requests for applicant who want to join the data
    space
- name: Onboarding Users
  description: Retrieve information about logged in user for application purposes
paths:
  /onboardingRequests:
    post:
      tags:
      - Onboarding Requests Management
      summary: Create Onboarding Request
      description: |
        Creates a new onboarding request, only one onboarding request per applicant is allowed. Applicant and organization information are not mandatory as long as they are already part  of the registered user identity (see user/onboardingData).
      operationId: createOnboardingRequest
      requestBody:
        description: The onboarding request to create
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOnboardingRequest"
            examples:
              default:
                summary: Default example
                value:
                  applicant:
                    firstName: Aliza
                    lastName: Clay
                    email: aliza.clay@example.com
                  participantType:
                    id: 195473bc-1d9c-427c-8f73-1c5bf3d9777a
                  organization: Organization Name
        required: true
      responses:
        "201":
          description: Onboarding request created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingRequestResponse"
              examples:
                default:
                  summary: Default example
                  value:
                    comments:
                    - author: Aliza Clay
                      creationTimestamp: 2024-12-16T17:31:27Z
                      id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                      content: Aliza Clay
                      updateTimestamp: 2024-12-16T17:31:27Z
                    - author: Aliza Clay
                      creationTimestamp: 2024-12-16T17:31:27Z
                      id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                      content: Aliza Clay
                      updateTimestamp: 2024-12-16T17:31:27Z
                    expirationTimeframe: 80
                    documents:
                    - filename: driving-license.pdf
                      hasContent: true
                      creationTimestamp: 2024-12-16T17:31:27Z
                      description: Driving license
                      id: f89b82b7-6fd5-4256-8aaf-0ea12e9e5547
                      mimeType:
                        description: PDF document
                        id: ac0a1143-2835-49da-9fdc-82f04963d2cf
