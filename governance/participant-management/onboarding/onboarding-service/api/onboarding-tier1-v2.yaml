      - type: object
        properties:
          organization:
            type: string
            description: Name of the organization the applicant is representing
            example: Organization Name
            maxLength: 255
        required:
        - organization
        - participantType
      example:
        applicant:
          firstName: Aliza
          lastName: Clay
          email: aliza.clay@example.com
        participantType:
          id: 195473bc-1d9c-427c-8f73-1c5bf3d9777a
        organization: Organization Name
