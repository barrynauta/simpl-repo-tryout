  /runs:
    post:
      tags:
        - Runs
      summary: Execute workflow definition for a resource
      description: |
        Executes the active workflow definition associated with a catalog resource.

        The workflow configuration is defined and stored by the provider inside the workflow definition.
        During execution, this configuration is dynamically augmented with runtime variables
        supplied by the consumer.

        **Variable Substitution**: Variables in the provider-defined YAML template
        (format: ${VARIABLE_NAME}) are resolved by applying the consumer-provided values
        from the config map.

        **Flow**:
        1. Find the active workflow definition for the resource
        2. Load the provider-defined YAML configuration template
        3. Augment it with consumer-supplied variables by resolving placeholders
        4. Submit workflow to Workflow Engine
        5. Store execution run in database
        6. Return run details and status
      operationId: executeWorkflow
      requestBody:
        description: Workflow execution request with resource ID and runtime configuration variables
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteWorkflowRequest'
            examples:
              Execute Workflow Definition Example:
                description: Execute Workflow Definition Example
                value:
                  assetId: asset-001
                  config:
                    APP_URL: https://example.com
                    API_KEY: secret-key-123
                    ENVIRONMENT: production
        required: true
      responses:
        '202':
          description: Workflow definition execution started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteWorkflowResponse'
              example:
                runId: abc123-def456-ghi789
                status: STARTED
                resolvedYaml: |-
                  ops:
                    process_data:
                      config:
                        url: https://example.com
                        api_key: secret-key-123
        '400':
          description: |
            Bad Request - Invalid input or missing YAML configuration
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:validationError
                title: Validation Error
                status: 400
