  /workflows/{repositoryName}/{codeLocation}/{jobName}/defaultConfig:
    get:
      tags:
        - Workflow
      summary: Get workflow default configuration
      description: |
        Retrieves the default configuration schema for a workflow
        to be used when creating a workflow definition
      operationId: getWorkflowDefaultConfig
      parameters:
        - name: repositoryName
          in: path
          required: true
          schema:
            type: string
          example: my_repository
        - name: codeLocation
          in: path
          required: true
          schema:
            type: string
          example: user_code
        - name: jobName
          in: path
          required: true
          schema:
            type: string
          example: data_pipeline
      responses:
        '200':
          description: Default configuration generated successfully
          content:
            application/json:
              schema:
