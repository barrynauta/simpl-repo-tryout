components:
  schemas:
    Problem:
      required:
        - detail
        - status
        - title
        - type
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type
          example: urn:problem-type:simpl:resourceNotFound
        title:
          type: string
          description: A short, human-readable summary of the problem type
          example: Resource Not Found
        status:
          type: integer
          description: The HTTP status code
          example: 404
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence
          example: 'CatalogAsset not found with id: 123'
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence
          example: /v1/catalog-assets/123
        timestamp:
          type: string
          description: Timestamp when the error occurred
          format: date-time
          example: '2024-12-03T10:15:30.123Z'
        errors:
          type: object
          additionalProperties:
            type: string
          description: Field-level validation errors (key = field, value = message)
          example:
            name: size must be between 1 and 255
            originalId: must not be blank
      description: RFC 7807 Problem for API error responses according to BelGIF guidelines
    ValidateJobConfigRequest:
      required:
        - codeLocation
        - jobName
        - repositoryName
        - yamlConfiguration
      type: object
      properties:
        repositoryName:
          type: string
        codeLocation:
          type: string
        jobName:
          type: string
        yamlConfiguration:
          type: object
    ConfigValidation:
      required:
        - isValid
        - jobName
      type: object
      properties:
        jobName:
          type: string
          description: Name of the job being validated
          example: data_pipeline
        isValid:
          type: boolean
          description: Whether the configuration is valid
          example: true
        errors:
          type: array
          description: List of validation errors (empty if valid)
          items:
            $ref: '#/components/schemas/ValidationError'
      description: Configuration validation result
    ValidationError:
      required:
        - message
      type: object
      properties:
        message:
          type: string
          description: Error message
          example: Field validation failed
        path:
          type: array
          description: Path to the field that caused the error
          example:
            - ops
            - config
          items:
            type: string
            description: Path to the field that caused the error
            example: '["ops","config"]'
        reason:
          type: string
          description: Reason for the validation failure
          example: Invalid value
        errorType:
          type: string
          description: Type of error
          example: ValidationError
        fieldName:
          type: string
          description: Name of the field that failed validation
          example: config
        fieldNames:
          type: array
          description: List of field names involved in the error
          items:
            type: string
            description: List of field names involved in the error
        valueRep:
          type: string
          description: String representation of the invalid value
      description: List of validation errors (empty if valid)
    CreateWorkflowDefinitionRequest:
      required:
        - assetDescription
        - assetId
        - assetType
        - providerEmail
      type: object
      properties:
        assetId:
          type: string
        assetType:
          type: string
          description: Type of the catalog asset
          example: dataset
        assetDescription:
          type: string
          description: Description of the catalog asset
          example: Customer analytics dataset
        providerEmail:
          type: string
          description: Email of the asset provider
          example: provider@example.com
        repositoryName:
          type: string
        codeLocation:
          type: string
        jobName:
          type: string
        yamlConfiguration:
          type: object
    WorkflowDefinition:
      required:
        - assetId
        - associationTitle
        - codeLocation
        - id
        - isActive
        - jobName
        - repositoryName
        - yamlConfiguration
      type: object
      properties:
        id:
          type: integer
          description: Internal database ID of the workflow definition
          format: int64
          example: 1
        assetId:
          type: string
          description: Original ID of the catalog resource
          example: asset-001
        assetType:
          type: string
          description: Type of the catalog asset
          example: dataset
        assetDescription:
          type: string
          description: Description of the catalog asset
          example: Customer analytics dataset
        providerEmail:
          type: string
          description: Email of the asset provider
          example: provider@example.com
        repositoryName:
          type: string
          description: Repository name
          example: my_repository
        codeLocation:
          type: string
          description: Code location name
          example: user_code
        jobName:
          type: string
          description: Job name
          example: data_pipeline
        associationTitle:
          type: string
          description: Title describing this workflow definition
          example: Data Processing Pipeline
        isActive:
          type: boolean
          description: Whether this workflow definition is currently active
          example: true
        yamlConfiguration:
          type: string
          description: YAML configuration template with variable placeholders
          example: |
            ops:
              process_data:
                config:
                  url: ${APP_URL}
                  api_key: ${API_KEY}
      description: Workflow definition - association between a catalog resource and a workflow
    ExecuteWorkflowRequest:
      required:
        - assetId
        - config
      type: object
      properties:
        assetId:
          type: string
        config:
          type: object
          additionalProperties:
            type: string
    ExecuteWorkflowResponse:
      required:
        - resolvedYaml
        - runId
        - status
      type: object
      properties:
        runId:
          type: string
          description: Run identifier
          example: abc123-def456-ghi789
        status:
          type: string
          description: Execution status
          example: STARTED
          enum:
            - QUEUED
            - NOT_STARTED
            - STARTING
            - STARTED
            - SUCCESS
            - FAILURE
            - CANCELING
            - CANCELED
            - UNKNOWN
        resolvedYaml:
          type: string
          description: Resolved YAML configuration with substituted variables
          example: |
            ops:
              process_data:
                config:
                  url: https://example.com
                  api_key: secret-key-123
      description: Response from workflow execution request
    CodeLocation:
      required:
        - id
        - loadStatus
        - locationDetails
        - name
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        loadStatus:
          type: string
        locationDetails:
          $ref: '#/components/schemas/LocationDetails'
    CodeLocationsResponse:
      required:
        - codeLocations
        - total
      type: object
      properties:
        codeLocations:
          type: array
          items:
            $ref: '#/components/schemas/CodeLocation'
        total:
          type: integer
          format: int32
    LocationDetails:
      required:
        - id
        - name
        - repositories
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        repositories:
          type: array
          items:
            $ref: '#/components/schemas/Repository'
    Pipeline:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    Repository:
      required:
        - id
        - jobs
        - name
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Pipeline'
    JobDefaultConfigResponse:
      required:
        - codeLocation
        - defaultYamlConfig
        - jobName
        - repositoryName
      type: object
      properties:
        jobName:
          type: string
          description: Job name
          example: data_pipeline
        repositoryName:
          type: string
          description: Repository name
          example: my_repository
        codeLocation:
          type: string
          description: Code location name
          example: user_code
        defaultYamlConfig:
          type: string
          description: YAML configuration built from default values
          example: |
            ops:
              process_data:
                config:
                  url: "https://default.com"
                  api_key: "default-key"
      description: Response containing default YAML configuration for a Workflow Engine job
    RunError:
      type: object
      properties:
        message:
          type: string
    RunResponse:
      required:
        - resolvedYaml
        - runId
        - startTime
        - status
      type: object
      properties:
        runId:
          type: string
          description: Run identifier
          example: abc123-def456-ghi789
        status:
          type: string
          description: Execution status
          enum:
            - QUEUED
            - NOT_STARTED
            - STARTING
            - STARTED
            - SUCCESS
            - FAILURE
            - CANCELING
            - CANCELED
            - UNKNOWN
        resolvedYaml:
          type: string
          description: Resolved YAML configuration with substituted variables
          example: |
            ops:
              process_data:
                config:
                  url: https://example.com
                  api_key: secret-key-123
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        stepErrors:
          type: array
          items:
            $ref: '#/components/schemas/StepError'
        runErrors:
          type: array
          items:
            $ref: '#/components/schemas/RunError'
    StepError:
      type: object
      properties:
        stepKey:
          type: string
        message:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      description: IAA cloud gateway JWT token
      scheme: bearer
      bearerFormat: JWT
