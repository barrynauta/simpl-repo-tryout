paths:
  /workflows/configValidation:
    post:
      tags:
        - Workflow
      summary: Validate workflow configuration
      description: Validates a workflow configuration against its schema before creating a workflow definition
      operationId: validateWorkflowConfig
      requestBody:
        description: Workflow configuration validation request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateJobConfigRequest'
            examples:
              Validate Config Example:
                description: Validate Config Example
                value:
                  repositoryName: my_repository
                  codeLocation: user_code
                  jobName: data_pipeline
                  yamlConfiguration: |-
                    ops:
                      process_data:
                        config:
                          url: ${APP_URL}
                          api_key: ${API_KEY}
        required: true
      responses:
        '200':
          description: Validation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigValidation'
              examples:
                Valid Configuration:
                  description: Example of a valid configuration
                  value:
                    jobName: data_pipeline
                    isValid: true
                    errors: []
                Invalid Configuration:
                  description: Example of an invalid configuration with errors
                  value:
                    jobName: data_pipeline
                    isValid: false
                    errors:
                      - message: Field "url" is required but not provided
                        path:
                          - ops
                          - process_data
                          - config
                          - url
                        reason: MISSING_REQUIRED_FIELD
                        errorType: FIELD_NOT_DEFINED
                        fieldName: url
                        fieldNames: []
                        valueRep: null
                      - message: Invalid type for field "timeout". Expected Int, got String
                        path:
                          - ops
                          - process_data
                          - config
                          - timeout
                        reason: RUNTIME_TYPE_MISMATCH
                        errorType: FIELD_TYPE_MISMATCH
                        fieldName: timeout
                        fieldNames: []
                        valueRep: not_a_number
        '400':
          description: Bad Request - Invalid input
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:validationError
                title: Validation Error
                status: 400
                detail: Validation failed for one or more fields
                instance: /v1/workflows/configValidation
                timestamp: '2024-12-03T10:15:30.123Z'
                errors:
                  repositoryName: must not be blank
                  jobName: must not be blank
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:unauthorized
                title: Unauthorized
                status: 401
                detail: Missing or invalid Authorization header
                instance: /v1/workflows/configValidation
                timestamp: '2024-12-03T10:15:30.123Z'
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:forbidden
                title: Forbidden
                status: 403
                detail: User does not have the required permissions to perform this action
                instance: /v1/workflows/configValidation
                timestamp: '2024-12-03T10:15:30.123Z'
        '404':
          description: Workflow not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:resourceNotFound
                title: Resource Not Found
                status: 404
                detail: 'Workflow not found with identifier: my_repository/user_code/data_pipeline'
                instance: /v1/workflows/configValidation
                timestamp: '2024-12-03T10:15:30.123Z'
        '406':
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:notAcceptable
                title: Not Acceptable
                status: 406
                detail: The requested representation (Accept header) is not supported.
                instance: /v1/workflows/configValidation
                timestamp: '2024-12-03T10:15:30.123Z'
                requested: application/xml
                supported:
                  - application/json
        '415':
          description: Unsupported Media Type
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:unsupportedMediaType
                title: Unsupported Media Type
                status: 415
                detail: The Content-Type of the request is not supported.
                instance: /v1/workflows/configValidation
                timestamp: '2024-12-03T10:15:30.123Z'
                received: application/xml
                supported:
                  - application/json
        '500':
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:internalServerError
                title: Internal Server Error
                status: 500
                detail: An unexpected error occurred
                instance: /v1/workflows/configValidation
                timestamp: '2024-12-03T10:15:30.123Z'
        '502':
          description: External service error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:externalServiceError
                title: External Service Error
                status: 502
                detail: 'Failed to communicate with Workflow Engine: Connection refused'
                instance: /v1/workflows/configValidation
                timestamp: '2024-12-03T10:15:30.123Z'
                service: Workflow Engine
