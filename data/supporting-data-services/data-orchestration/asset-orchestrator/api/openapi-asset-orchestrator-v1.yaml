openapi: 3.0.1
info:
  title: Asset Orchestrator API
  description: |
    The Asset Orchestrator API enables the management and orchestration of resources
    and their associated workflows through integration with Workflow Engine.

    ## Business Context

    The Asset Orchestrator serves as a bridge between the providers connector
    and the orchestration execution engine. It allows users to:
    - Register and manage workflow definition
    - Associate resources with workflows and configuration
    - Validate the configuration for a workflow
    - Monitor workflow execution status

    ### Key Actors

    - **Provider**: Creates the resource self-description
    and associate it with workflow and configuration
    - **Provider Workflow Designer**: Creates resource processing workflows,
    defines default configuration
    - **Consumer**: Triggers the execution of the workflow when consuming the resource

    ### Typical Flow
    1. Provider Workflow Designer creates a workflow and default configuration
    2. Provider creates the self-description for a resource that should trigger a workflow
    on consumption
    3. Provider creates an association between resource and workflow with configuration
    4. Consumer consumes the resource over the connector
    5. Asset Orchestrator submits the job to the orchestration platform
    6. Asset Orchestrator tracks execution status and stores run history

    ## Error Handling

    All error responses follow RFC 7807 Problem Details standard with BelGIF guidelines.
    Each error response includes:
    - `type`: URI identifying the problem type (urn:problem-type:simpl:*)
    - `title`: Short summary of the error
    - `status`: HTTP status code
    - `detail`: Specific explanation for this occurrence
    - `instance`: URI of the request that caused the error
    - `timestamp`: When the error occurred (ISO-8601 format)

    Error types:
    - **400 Bad Request**: Invalid input or malformed request
    - **400 Validation Error**: Field validation failures (includes field-level details)
    - **404 Not Found**: Requested resource does not exist
    - **500 Internal Server Error**: Unexpected server error
    - **502 Bad Gateway**: External service (Workflow Engine) communication error
