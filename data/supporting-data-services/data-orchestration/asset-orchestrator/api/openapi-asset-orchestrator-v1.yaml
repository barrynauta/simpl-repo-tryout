  /runs/{runId}:
    get:
      tags:
        - Runs
      summary: Get workflow run status
      description: Retrieves the status and details of a workflow definition execution run by its run ID
      operationId: getRun
      parameters:
        - name: runId
          in: path
          description: Run identifier
          required: true
          schema:
            type: string
          example: abc123-def456-ghi789
      responses:
        '200':
          description: Run retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
              example:
                runId: abc123-def456-ghi789
                status: SUCCESS
                resolvedYaml: |-
                  ops:
                    process_data:
                      config:
                        url: https://example.com
                startTime: '2024-12-03T10:15:30.123Z'
                endTime: '2024-12-03T10:16:10.456Z'
                stepErrors: []
                runErrors: []
        '400':
          description: Bad Request - Blank run ID
          content:
            application/problem+json:
              schema:
