              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:forbidden
                title: Forbidden
                status: 403
                detail: User does not have the required permissions to perform this action
                instance: /v1/runs
                timestamp: '2024-12-03T10:15:30.123Z'
        '404':
          description: No active workflow definition found for resource
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
