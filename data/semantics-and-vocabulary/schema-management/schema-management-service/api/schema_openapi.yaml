openapi: 3.0.1
security:
  - OAuth2Auth: []

info:
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  contact:
    name: Simpl Programme
    email: cnect-simpl@ec.europa.eu
    url: https://simpl-programme.ec.europa.eu/
  title: Schema Management API
  description: This API allows the Governance authority to manage Resource Description Schemas.
  version: 1.0.0
servers:
  - url: "https://schema-manager.dev.simpl-europe.eu/v1"
    description: Generated server
paths:
  /schemas:
    get:
      tags:
        - Schema management
      summary: Get all schema metadata stored in simpl-schema-manager.
      parameters:
        - name: status
          in: query
          required: false
          description: Status of the schema. By Providing it Results will be filtered by this value.
          schema:
            type: string
            enum:
              - REVOKED
              - PUBLISHED
        - name: resourceType
          in: query
          required: false
          description: Resource type of the schema. By Providing it Results will be filtered by this value. Must be in PascalCase, alphanumeric.
          schema:
            type: string
            minLength: 3
            maxLength: 64
            pattern: '^[A-Z][a-zA-Z0-9]*$'
        - name: page
          in: query
          required: false
          description: Page number to display.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page to display.
          schema:
            type: integer
            default: 20
            minimum: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllSchemasResponsePayload'
              example:
                page: 1
                totalPages: 2
                total: 34
                pageSize: 20
                next: '/schemas?status=REVOKED&page=2&pageSize=20'
                metadata:
                  - name: ApplicationShape
                    description: Schema that defines the Application Resource
                    title: Application Shape
                    resourceType: Application
                    version: 1.0.0
                    changelog: Initial changelog entry.
                    status: PUBLISHED
                  - name: DataOfferingShape
                    description: Schema that defines the Data Offering Resource
                    title: Data Offering Shape
                    resourceType: Data Offering
                    version: 1.0.0
                    changelog: Initial changelog entry.
                    status: PUBLISHED
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:badRequest
                href: https://www.belgif.be/specification/rest/api-guide/problems/badRequest.html
                title: Bad Request
                status: 400
                detail: Query parameter 'status' need to have value REVOKED or PUBLISHED.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '406':
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:notAcceptable
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/406
                title: Not Acceptable
                status: 406
                detail: Server cannot produce a response matching the list of acceptable values defined in the request's
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    post:
      tags:
        - Schema management
      summary: Create a new resource description schema. Realm role GA_SCHEMA_ADMIN is required in authentication token to use this endpoint.
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateSchemaPayload'
      responses:
        '201':
          description: CREATED
          headers:
            Location:
              description: url that points to the newly created schema
              schema:
                type: string
                example: https://schema-manager.dev.simpl-europe.eu/v1/schemas/8667b168-d462-40b8-9226-b955bab7b2da/version/1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSchemaResponsePayload'
              examples:
                returnValidResponse:
                  value:
                    schemaName: Application Shape
                    schemaVersion: 1.0.0
        '400':
          $ref: '#/components/responses/SchemaValidationBadRequestResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '406':
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:notAcceptable
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/406
                title: Not Acceptable
                status: 406
                detail: Server cannot produce a response matching the list of acceptable values defined in the request's
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '409':
          description: Conflict
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:conflict
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/409
                title: Conflict
                status: 409
                detail: Schema with name 'Application shape' already exists
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '415':
          description: Unsupported Media Type
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:unsupportedMediaType
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/415
                title: Unsupported Media Type
                status: 415
                detail: Server refused to accept the request because the message content format is not supported.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
  /schemas/{schemaName}:
    patch:
      tags:
        - Schema management
      summary: Revoke an existing resource description schema. Realm role GA_SCHEMA_ADMIN is required in authentication token to use this endpoint.
      parameters:
        - name: schemaName
          in: path
          required: true
          description: Schema name of the schema to update. Must be in PascalCase, alphanumeric.
          schema:
            type: string
            minLength: 3
            maxLength: 64
            pattern: '^[A-Z][a-zA-Z0-9]*$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchemaStatusUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaCategory'
              example:
                name: LegalPersonShape
                title: Legal Person Shape
                description: Schema defining legal person resource types.
                resourceType: LegalPerson
                status: REVOKED
                latestVersion: 1.0.2
                created: "2024-01-15T10:30:00Z"
                modified: "2024-06-20T14:45:00Z"
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:badRequest
                href: https://www.belgif.be/specification/rest/api-guide/problems/badRequest.html
                title: Bad Request
                status: 400
                detail: Path parameter schemaName must contain only alphanumeric characters and follow PascalCase.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/SchemaNotFoundResponse'
        '406':
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:notAcceptable
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/406
                title: Not Acceptable
                status: 406
                detail: Server cannot produce a response matching the list of acceptable values defined in the request's
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
  /schemas/{schemaName}/versions:
    get:
      tags:
        - Schema management
      summary: Get all schema metadata for given schema name stored in simpl-schema-manager.
      parameters:
        - name: schemaName
          in: path
          required: true
          description: Schema name of which we want to retrieve metadata list. Must be in PascalCase, alphanumeric.
          schema:
            type: string
            minLength: 3
            maxLength: 64
            pattern: '^[A-Z][a-zA-Z0-9]*$'
        - name: page
          in: query
          required: false
          description: Page number to display.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page to display.
          schema:
            type: integer
            default: 20
            minimum: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllSchemasResponsePayload'
              example:
                page: 1
                totalPages: 2
                total: 34
                pageSize: 20
                next: '/schemas/someSchemaName/versions?page=2&pageSize=2'
                metadata:
                  - name: ApplicationShape
                    description: Schema that defines the Application Resource
                    title: Application Shape
                    resourceType: Application
                    version: 1.0.0
                    changelog: Initial changelog entry.
                    status: REVOKED
                  - name: ApplicationShape
                    description: Schema that defines the Application Resource
                    title: Application Shape
                    resourceType: Application
                    version: 1.0.1
                    changelog: Added new constraint.
                    status: PUBLISHED
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:badRequest
                href: https://www.belgif.be/specification/rest/api-guide/problems/badRequest.html
                title: Bad Request
                status: 400
                detail: Path parameter schemaName must contain only alphanumeric characters and follow PascalCase.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '404':
          $ref: '#/components/responses/SchemaNotFoundResponse'
        '406':
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:notAcceptable
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/406
                title: Not Acceptable
                status: 406
                detail: Server cannot produce a response matching the list of acceptable values defined in the request's
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

    post:
      tags:
        - Schema management
      summary: Create a new version of an existing resource description schema. Successful creation of a new version implicitly makes the previous version unavailable for creating new resource descriptions. Realm role GA_SCHEMA_ADMIN is required in authentication token to use this endpoint.
      parameters:
        - name: schemaName
          in: path
          required: true
          description: Schema name of an existing schema of which we want to create a new version
          schema:
            type: string
            minLength: 3
            maxLength: 64
            pattern: '^[A-Z][a-zA-Z0-9]*$'
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateNewSchemaVersionPayload'
      responses:
        '201':
          description: CREATED
          headers:
            Location:
              description: Url that points to the newly created schema
              schema:
                type: string
                example: https://schema-manager.dev.simpl-europe.eu/v1/schemas/8667b168-d462-40b8-9226-b955bab7b2da/version/2
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateNewVersionSchemaResponsePayload'
              example:
                name: Data Offering Schema.
                description: Schema that defines the Application Resource
                title: Application Shape
                resourceType: Application
                version: 1.0.1
                changelog: Provided new length constraint for property 'name'.
                status: PUBLISHED
        '400':
          $ref: '#/components/responses/SchemaValidationBadRequestResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/SchemaNotFoundResponse'
        '406':
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:notAcceptable
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/406
                title: Not Acceptable
                status: 406
                detail: Server cannot produce a response matching the list of acceptable values defined in the request's
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '409':
          description: Conflict
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:conflict
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/409
                title: Conflict
                status: 409
                detail: Schema with version '1.0.1' already exists.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '415':
          description: Unsupported Media Type
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:unsupportedMediaType
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/415
                title: Unsupported Media Type
                status: 415
                detail: Server refused to accept the request because the message content format is not supported.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /vocabularies:
    get:
      tags:
        - Vocabulary management
      summary: Get all vocabulary metadata stored in simpl-schema-manager. Returns the latest version of each vocabulary.
      parameters:
        - name: name
          in: query
          required: false
          description: Name of the vocabulary. By providing it, results will be filtered to vocabularies whose name matches this value. Must be in PascalCase, alphanumeric.
          schema:
            type: string
            minLength: 3
            maxLength: 64
            pattern: '^[A-Z][a-zA-Z0-9]*$'
        - name: status
          in: query
          required: false
          description: Status of the vocabulary. By providing it, results will be filtered by this value.
          schema:
            type: string
            enum:
              - ACTIVE
              - DEPRECATED
        - name: creationDate
          in: query
          required: false
          description: Creation date of the vocabulary (ISO 8601 date-time). By providing it, results will be filtered to vocabularies created on this date.
          schema:
            type: string
            format: date-time
            example: "2024-03-01T00:00:00Z"
        - name: sort
          in: query
          required: false
          description: >
            Sort the results by a supported field. Prefix the field name with `-` for descending order.
            Supported values: `name`, `-name`, `status`, `-status`, `creationDate`, `-creationDate`.
          schema:
            type: string
            enum:
              - name
              - -name
              - status
              - -status
              - creationDate
              - -creationDate
        - name: page
          in: query
          required: false
          description: Page number to display.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page to display.
          schema:
            type: integer
            default: 20
            minimum: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetVocabulariesResponsePayload'
              example:
                page: 1
                totalPages: 2
                total: 3
                pageSize: 20
                next: '/vocabularies?sort=name&page=2&pageSize=20'
                metadata:
                  - name: HealthcareVocabulary
                    version: 3
                    description: Vocabulary defining healthcare resource types.
                    status: ACTIVE
                    creationDate: '2024-03-01T00:00:00Z'
                    lastUpdateDate: '2024-03-01T00:00:00Z'
                  - name: LegalEntityVocabulary
                    version: 1
                    description: Vocabulary defining legal entity types.
                    status: DEPRECATED
                    creationDate: '2024-01-15T00:00:00Z'
                    lastUpdateDate: '2024-01-15T00:00:00Z'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:badRequest
                href: https://www.belgif.be/specification/rest/api-guide/problems/badRequest.html
                title: Bad Request
                status: 400
                detail: Query parameter 'sort' must be one of [name, -name, status, -status, creationDate, -creationDate].
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '406':
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:notAcceptable
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/406
                title: Not Acceptable
                status: 406
                detail: Server cannot produce a response matching the list of acceptable values defined in the request's Accept header.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    post:
      tags:
        - Vocabulary management
      summary: Create a new internal vocabulary. Automatically creates version 1 (ACTIVE). Realm role vocabulary_management is required in authentication token to use this endpoint.
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateVocabularyPayload'
      responses:
        '201':
          description: CREATED
          headers:
            Location:
              description: URL that points to the newly created vocabulary version.
              schema:
                type: string
                example: https://schema-manager.dev.simpl-europe.eu/v1/vocabularies/HealthcareVocabulary/versions/1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VocabularyVersionMetadata'
              example:
                name: HealthcareVocabulary
                version: 1
                description: Vocabulary defining healthcare resource types.
                changelog: Initial version.
                status: ACTIVE
                creationDate: '2024-03-01T00:00:00Z'
                lastUpdateDate: '2024-03-01T00:00:00Z'
        '400':
          $ref: '#/components/responses/VocabularyValidationBadRequestResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '406':
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:notAcceptable
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/406
                title: Not Acceptable
                status: 406
                detail: Server cannot produce a response matching the list of acceptable values defined in the request's Accept header.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '409':
          description: Conflict
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:conflict
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/409
                title: Conflict
                status: 409
                detail: Vocabulary with name 'HealthcareVocabulary' already exists.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '415':
          description: Unsupported Media Type
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:unsupportedMediaType
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/415
                title: Unsupported Media Type
                status: 415
                detail: Server refused to accept the request because the message content format is not supported.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

