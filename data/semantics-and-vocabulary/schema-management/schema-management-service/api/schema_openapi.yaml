  /vocabularies/{vocabularyName}/versions:
    get:
      tags:
        - Vocabulary management
      summary: Get all version metadata for a given vocabulary name stored in simpl-schema-manager.
      parameters:
        - name: vocabularyName
          in: path
          required: true
          description: Name of the vocabulary of which we want to retrieve version history. Must be in PascalCase, alphanumeric.
          schema:
            type: string
            minLength: 3
            maxLength: 64
            pattern: '^[A-Z][a-zA-Z0-9]*$'
        - name: sort
          in: query
          required: false
          description: >
            Sort the results by a supported field. Prefix the field name with `-` for descending order.
            Supported values: `name`, `-name`, `status`, `-status`, `creationDate`, `-creationDate`.
          schema:
            type: string
            enum:
              - name
              - -name
              - status
              - -status
              - creationDate
              - -creationDate
        - name: page
          in: query
          required: false
          description: Page number to display.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page to display.
          schema:
            type: integer
            default: 20
            minimum: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllVocabulariesResponsePayload'
