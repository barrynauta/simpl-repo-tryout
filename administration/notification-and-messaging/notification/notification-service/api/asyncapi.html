<!DOCTYPE html>
<html>
<head>
<title>Notification Service API — AsyncAPI Documentation</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/@asyncapi/react-component@1.4.5/styles/default.min.css">
<style>body { margin: 0; padding: 0; font-family: sans-serif; }</style>
</head>
<body>
<div id="asyncapi"></div>
<script src="https://unpkg.com/@asyncapi/react-component@1.4.5/browser/standalone/index.js"></script>
<script>
AsyncApiStandalone.render(
  {
    schema: { url: 'asyncapi.yaml', options: { method: 'GET' } },
    config: { show: { sidebar: true } },
  },
  document.getElementById('asyncapi')
);
</script>
</body>
</html>
