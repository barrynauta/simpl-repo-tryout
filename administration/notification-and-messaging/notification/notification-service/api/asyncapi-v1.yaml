asyncapi: '3.0.0'
info:
  title: Notification Service API
  version: '1.0.0'
  description: API documentation for a notification service using Kafka.

defaultContentType: application/json
servers:
  production:
    host: 'kafka://localhost:9094'
    protocol: kafka-secure
    description: Kafka server

channels:
  notifications:
    address: "notifications"
    messages:
      EmailNotification:
        $ref: "#/components/messages/EmailNotification"

operations:
  SendNotification:
    action: send
    summary: Sending notification message to Kafka topic 'notifications'
    channel:
      $ref: '#/channels/notifications'
    messages:
      - $ref: '#/channels/notifications/messages/EmailNotification'

components:
  messages:
    EmailNotification:
      name: EmailNotification
      title: Sending email notification
      payload:
        $ref: '#/components/schemas/EmailNotification'
  schemas:
    EmailNotification:
      x-parser-schema-id: emailNotification
      properties:
        channel:
          $ref: '#/components/schemas/NotificationChannel'
        message:
          type: string
          description: Body of the message.
        to:
          type: string
          description: Email address of the recipient.
        cc:
          type: array
          items:
            type: string
          description: List of email addresses in CC.
        subject:
          type: string
          description: Subject of the message.

    NotificationChannel:
      description: The notification channel.
      type: string
      enum:
        - email
