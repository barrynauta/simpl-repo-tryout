  Source — code.europa.eu/simpl/simpl-open/development/monitoring/eck-monitoring-operator.
  Kubernetes Operator companion to eck-monitoring. ECK Monitoring component
  collects and stores logs/metrics from Simpl agents, exposes a GUI for
  dashboards, and sends alerts on detected anomalies. Operator manages
  declarative lifecycle of those resources. Early-stage upstream.
