---
openapi: 3.0.3
info:
  title: Verifiable Credentials issuer service
  description: Verifiable Credentials issuer service HTTP APIs for issuing Verifiable Credentials.
  version: '1.1'
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  contact:
    name: Simpl Programme
    email: cnect-simpl@ec.europa.eu
    url: https://simpl-programme.ec.europa.eu/
servers:
  - url: https://localhost:8085/vcIssuerService/v1
    description: Verifiable Credentials issuer service
paths:
  "/health":
    get:
      tags:
        - health
      summary: health check endpoint
      description: Health check endpoint
      operationId: health#Liveness
      responses:
        '200':
          description: OK response.
          content:
            application/vnd.spring-boot.actuator.v3+json:
              schema:
                "$ref": "#/components/schemas/HealthResponse"
              example:
                status: UP
                groups:
                  - liveness
                  - readiness
                components:
                  diskSpace:
                    status: UP
                    details:
                      total: 135024029696
                      free: 42437074944
                      threshold: 10485760
                      path: C:\workspace\CONTRACTS-BILLING\repos\contract\.
                      exists: true
                  livenessState:
                    status: UP
                  ping:
                    status: UP
                  readinessState:
                    status: UP
                  ssl:
                    status: UP
                    details:
                      validChains: [ ]
                      invalidChains: [ ]
        '503':
          description: Service Unavailable
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: urn:problem-type:simpl:serviceUnavailable
                status: 503
                title: Service Unavailable
                detail: Service Unavailable
  "/credentials/issue":
    post:
      tags:
        - issueVC
      summary: Issue a Verifiable Credential
      description: Issue a Verifiable Credential
      operationId: vcIssuer#issue
      requestBody:
        description: Request body
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueCredentialRequest"
            example:
              clientId: "dev.simpl-europa.eu"
              type: [ "VerifiableCredential", "ContractCreated" ]
              credentialSubject:
                userId: "user-789"
                collectionId: "X"
                validUntil: "2026-10-01T10:09:53Z"
              expirationDate: "2026-01-01T00:00:00Z"
              contextURI: "https://example.com/custom-context.jsonld"
        required: true
      responses:
        '201':
          description: Issued VC
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifiableCredential"
              example:
                "@context":
                  - "https://www.w3.org/2018/credentials/v1"
                type:
                  - "VerifiableCredential"
                  - "ContractCreated"
                issuer: "did:jwk:eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9..."
                issuanceDate: "2024-10-01T10:09:52Z"
                credentialSubject:
                  userId: "user-789"
                  collectionId: "X"
                  validUntil: "2026-10-01T10:09:53Z"
                proof:
                  type: "Ed25519Signature2020"
                  created: "2024-10-01T10:09:53Z"
                  proofPurpose: "assertionMethod"
                  verificationMethod: "did:jwk:...#0"
                  proofValue: "z4byXHNDw6FS37D3HVj2bApCfGQzNUmA7opvuNFe6mae..."
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: urn:problem-type:simpl:badRequest
                status: 400
                title: Bad Request
                detail: Invalid body content
                instance: "/vcIssuer/v1/credentials/issue"
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: urn:problem-type:simpl:unauthorized
                status: 401
                title: Unauthorized
                detail: Invalid API Key
                instance: "/vcIssuer/v1/credentials/issue"
        '405':
          description: Method Not allowed
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: urn:problem-type:simpl:methodNotAllowed
                status: 405
                title: Method Not Allowed
                detail: Method Not Allowed
                instance: "/vcIssuer/v1/credentials/issue"
        '406':
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: urn:problem-type:simpl:notAcceptable
                status: 406
                title: Not Acceptable
                detail: Only application/json responses are supported.
                instance: "/vcIssuer/v1/credentials/issue"
        '415':
          description: Unsupported Media Type
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: urn:problem-type:simpl:unsupportedMediaType
                status: 415
                title: Unsupported Media Type
                detail: Only application/json requests are supported.
                instance: "/vcIssuer/v1/credentials/issue"
        '500':
          description: Server Error
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                status: 500
                title: Server Error
                detail: Server Error
  "/credentials/verify":
    post:
      tags:
        - verifyCredential
      summary: Verify a Verifiable Credential
      description: Verify a Verifiable Credential
      operationId: vcIssuer#verifyCredential
      requestBody:
        description: Request body
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/VerifyCredentialRequest"
            example:
              "@context": [ "https://www.w3.org/2018/credentials/v1" ]
              type: [ "VerifiableCredential", "ContractCreated" ]
              issuer: "did:jwk:..."
              issuanceDate: "2024-10-01T10:09:52Z"
              credentialSubject:
                userId: "user-789"
                collectionId: "X"
              proof:
                type: "Ed25519Signature2020"
                created: "2024-10-01T10:09:53Z"
                proofPurpose: "assertionMethod"
                verificationMethod: "did:jwk:...#0"
                proofValue: "z4byXHND..."
        required: true
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyCredentialResponse"
              example:
                isValid: true
                checks:
                  signature: true
                  expiration: true
                  status: true
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: urn:problem-type:simpl:badRequest
                status: 400
                title: Bad Request
                detail: Invalid body content
                instance: "/vcIssuer/v1/credentials/verify"
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: urn:problem-type:simpl:unauthorized
                status: 401
                title: Unauthorized
                detail: Invalid API Key
                instance: "/vcIssuer/v1/credentials/verify"
        '405':
          description: Method Not allowed
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: urn:problem-type:simpl:methodNotAllowed
                status: 405
                title: Method Not Allowed
                detail: Method Not Allowed
                instance: "/vcIssuer/v1/credentials/verify"
        '406':
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: urn:problem-type:simpl:notAcceptable
                status: 406
                title: Not Acceptable
                detail: Only application/json responses are supported.
                instance: "/vcIssuer/v1/credentials/verify"
        '415':
          description: Unsupported Media Type
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                type: urn:problem-type:simpl:unsupportedMediaType
                status: 415
                title: Unsupported Media Type
                detail: Only application/json requests are supported.
                instance: "/vcIssuer/v1/credentials/verify"
        '500':
          description: Server Error
          content:
            application/problem+json:
              schema:
                "$ref": "#/components/schemas/Problem"
              example:
                status: 500
                title: Server Error
                detail: Server Error
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    IssueCredentialRequest:
      type: object
      required:
        - clientId
        - type
        - credentialSubject
        - expirationDate
        - contextURI
      properties:
        clientId:
          type: string
          description: Identifier of the issuer used to resolve signing key
        type:
          type: array
          items:
            type: string
        credentialSubject:
          type: object
          description: |
            JSON-LD subject. If "id" is present, it MUST be a valid URI (urn:, did:, https://).
            All additional fields MUST be defined in a provided @context
          properties:
            id:
              type: string
              format: uri
          additionalProperties: true
        expirationDate:
          type: string
          format: date-time
        contextURI:
          type: string
          format: uri
          description: Custom @context URI to be added to the credential
      example:
        clientId: "dev.simpl-europa.eu"
        type: [ "VerifiableCredential", "ContractCreated" ]
        credentialSubject:
          userId: "urn:provider:777"
          collectionId: "X"
          validUntil: "2026-10-01T10:09:53Z"
        expirationDate: "2026-01-01T00:00:00Z"
        contextURI: "https://example.com/custom-context.jsonld"
    VerifiableCredential:
      type: object
      description: W3C Verifiable Credential
      additionalProperties: true
      required:
        - "@context"
        - type
        - issuer
        - credentialSubject
      properties:
        "@context":
          description: JSON-LD context defining the semantic meaning of the credential
          oneOf:
            - type: string
              format: uri
            - type: array
              items:
                oneOf:
                  - type: string
                    format: uri
                  - type: object
        id:
          type: string
          format: uri
          description: Globally unique identifier for the verifiable credential
        type:
          description: Type definitions for the credential
          oneOf:
            - type: string
            - type: array
              minItems: 1
              items:
                type: string
          example:
            - VerifiableCredential
        name:
          type: string
          description: Human-readable name of the credential
        description:
          type: string
          description: Human-readable description of the credential
        issuer:
          description: Entity that issued the verifiable credential
          oneOf:
            - type: string
              format: uri
            - type: object
              additionalProperties: true
        issuanceDate:
          type: string
          format: date-time
        credentialSubject:
          description: Subject(s) to which the claims in the credential apply
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        validFrom:
          type: string
          format: date-time
          description: Date and time when the credential becomes valid
        expirationDate:
          type: string
          format: date-time
          description: Date and time when the credential expires
        credentialStatus:
          description: Information used to determine the current status of the credential
          type: object
          additionalProperties: true
        credentialSchema:
          description: Schema defining the structure of the credential subject
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        refreshService:
          description: Service used to refresh the credential
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        termsOfUse:
          description: Terms of use associated with the credential
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        evidence:
          description: Evidence used to support the claims in the credential
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        proof:
          description: Cryptographic proofs used to verify the credential
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
      example:
        "@context":
          - "https://www.w3.org/2018/credentials/v1"
        type:
          - "VerifiableCredential"
          - "ContractCreated"
        issuer: "did:jwk:eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9..."
        issuanceDate: "2024-10-01T10:09:52Z"
        credentialSubject:
          userId: "user-789"
          collectionId: "X"
          validUntil: "2026-10-01T10:09:53Z"
        proof:
          type: "Ed25519Signature2020"
          created: "2024-10-01T10:09:53Z"
          proofPurpose: "assertionMethod"
          verificationMethod: "did:jwk:...#0"
          proofValue: "z4byXHNDw6FS37D3HVj2bApCfGQzNUmA7opvuNFe6mae..."

    VerifyCredentialRequest:
      description: Verifiable Credential JSON
      type: object
      additionalProperties: true
      allOf:
        - $ref: "#/components/schemas/VerifiableCredential"

    VerifyCredentialResponse:
      type: object
      properties:
        isValid:
          type: boolean
        checks:
          type: object
          properties:
            signature:
              type: boolean
            expiration:
              type: boolean
            status:
              type: boolean
        errors:
          type: array
          description: Optional list of validation error messages
          items:
            type: string
      example:
        isValid: false
        checks:
          signature: false
          expiration: true
          status: true
        errors:
          - "Invalid signature: proof verification failed"
          - "Issuer DID document could not be resolved"

    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Overall health status
          enum: [ UP, DOWN ]
          example: UP
        groups:
          type: array
          description: Groups of probes aggregated in this health response
          items:
            type: string
          example: [ "liveness", "readiness" ]
        components:
          type: object
          description: Detailed component health information. Keys are component names, values are health objects.
          additionalProperties:
            type: object
            required:
              - status
            properties:
              status:
                type: string
                enum: [ UP, DOWN ]
                description: Component status
                example: UP
              details:
                type: object
                description: Component-specific details
                additionalProperties: true
          example:
            diskSpace:
              status: UP
              details:
                total: 207929917440
                free: 40679194624
                threshold: 10485760
                path: "/."
                exists: true
    Problem:
      description: A Problem Details object (RFC 9457). Additional properties specific
        to the problem type may be present.
      type: object
      properties:
        type:
          type: string
          format: uri
          description: An absolute URI that identifies the problem type
          default: about:blank
        title:
          type: string
          description: A short summary of the problem type. Written in English and
            readable for engineers (usually not suited for non technical stakeholders
            and not localized).
          example: Service Unavailable
        status:
          type: integer
          format: int32
          description: The HTTP status code generated by the origin server for this
            occurrence of the problem.
          minimum: 400
          maximum: 600
          exclusiveMaximum: true
          example: 503
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of
            the problem
        instance:
          type: string
          format: uri
          description: An absolute URI that identifies the specific occurrence of
            the problem. It may or may not yield further information if dereferenced.
tags:
  - name: health
    description: Health service provides health check endpoints.
  - name: verifyCredential
    description: Operations with verifying a Verifiable Credential.
  - name: issueVC
    description: Operations with issuing a Verifiable Credential.
security:
  - ApiKeyAuth: [ ]
