openapi: 3.0.1
info:
  title: Security Attributes Provider Tier 2
  description: Tier 2 APIs exposed by the Governance Authority to allow participants
    to retrieve identity attributes linked to themselves or other participants. These
    APIs also handle the issuance of Ephemeral Proofs to participants.
  contact:
    name: Simpl Programme
    url: https://simpl-programme.ec.europa.eu/
    email: cnect-simpl@ec.europa.eu
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  version: 2.0.0
servers:
- url: https://localhost:8082/tier2/v2
  description: securityattributesprovider
security:
- mtlsWithEphemeralProof: []
tags:
- name: Identity Attributes
  description: Allow agents to manage identity attributes via Tier 2 communication
- name: Credentials
  description: Manage information related to Tier 2 credentials
- name: Ephemeral Proof
  description: Manage the issuance of ephemeral proof via Tier 2 communication
- name: Participants
  description: Manage participant identity attributes
paths:
  /identityAttributes:
    get:
      tags:
      - Identity Attributes
      summary: Get the Identity Attributes of the dataspace.
      description: Retrieves a list of identity attributes of the dataspace.
      operationId: getDataspaceIdentityAttributes
      responses:
        "200":
          description: Successfully retrieved dataspace identity attributes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdentityAttribute"
              examples:
                default:
                  summary: Default example
                  value:
                  - id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    code: CONSUMER
                    name: Consumer
                    description: Identity attribute used for tagging an end user able
                      to act as a user of a data consumer participant (can start contract
                      and transfer process)
                    assignableToRoles: true
                    enabled: true
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
                    right: true
                    used: true
                    builtIn: true
                  - id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    code: CONSUMER
                    name: Consumer
                    description: Identity attribute used for tagging an end user able
                      to act as a user of a data consumer participant (can start contract
                      and transfer process)
                    assignableToRoles: true
                    enabled: true
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
                    right: true
                    used: true
                    builtIn: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - mtlsWithEphemeralProof: []
  /credentials/{credentialId}/identityAttributes:
    get:
      tags:
      - Credentials
      summary: Get Identity Attributes of a participant identified by a credential
      description: Retrieves a list of identity attributes associated with a given
        certificate ID.
      operationId: getParticipantIdentityAttributesByCredentialId
      parameters:
      - name: credentialId
        in: path
        description: the credentialId of the participant
        required: true
        style: simple
        explode: false
        schema:
          type: string
        examples:
          credentialsDetail:
            summary: credentials by credentialId
            value: zPPJ4TbEd8xNJPkdmePpAsamcKEQf8nxAMa7vw58Fc7eEtAzMrRDLA4oWNETGzrpcwsoQ5GwnEFhpeLxrYyV1gC1LnVXt1KBMM
      responses:
        "200":
          description: Successfully retrieved identity attributes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdentityAttribute"
              examples:
                default:
                  summary: Default example
                  value:
                  - code: CONSUMER
                    name: Consumer
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    description: Identity attribute used for tagging an end user able
                      to act as a user of a data consumer participant (can start contract
                      and transfer process)
                    assignableToRoles: true
                    id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    used: true
                    right: true
                    enabled: true
                    builtIn: true
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
                  - code: CONSUMER
                    name: Consumer
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    description: Identity attribute used for tagging an end user able
                      to act as a user of a data consumer participant (can start contract
                      and transfer process)
                    assignableToRoles: true
                    id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    used: true
                    right: true
                    enabled: true
                    builtIn: true
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - mtlsWithEphemeralProof: []
  /token:
    post:
      tags:
      - Ephemeral Proof
      summary: Generate ephemeral proof
      description: Generates an ephemeral proof for the specified participant
      operationId: getEphemeralProof
      requestBody:
        description: Contains the timestamp of the request along with the timestamp
          signature
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignatureProof"
            examples:
              default:
                summary: Default example
                value:
                  signature: MEYCIQDV6nM1jU2J...==
                  nonce: 36b8f84d-df4e-4d49-b662-bcde71a8764f
                  timestamp: 2025-04-04T12:34:56Z
        required: true
      responses:
        "200":
          description: Ephemeral proof generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
              examples:
                defaultJson:
                  value:
                    token: IxvaN4ER-PlPgLYzfRhk_JiY4VAow3GNjaK5rYCINFsEPa7VaYnRsaCmQVq8CTgddihEPPXet2laH8_c3WqxY4AeZO5eljwSCobCHzxYdOoFKbpNXIm7dqHg_5xpQz-YBJMiDM1ILOEsER8ADyF4NC2sN0K_0t6xZLSAQIRrHvpGOrtYr5E-SllTWHWPmqCkX2BUZxoYNK2FWgQZpuUOD55HfsvFXNVQa_5TFRDibi9LsT7Sd_az0iGB0TfAb0v3ZR0qnmgyp5pTeIeU5UqhtbgU9RnUCVmGIK-SZYNvrlXgv9hiKAZGhLgeI8hO40utfT2YTYHgD2Aiufqo3RIbJA
        "400":
          description: Invalid ephemeral proof request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                invalid-participant-id:
                  value:
                    type: /error/invalid-participant-id
                    title: Participant ID is invalid
                invalid-signature-proof:
                  value:
                    type: /error/invalid-signature-proof
                    title: Signature proof is invalid
                invalid-timestamp-window:
                  value:
                    type: /error/invalid-signature-proof
                    title: Invalid timestamp window
                    detail: The provided timestamp falls outside the Governance Authority’s
                      allowed time window of 1 minute.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - mtls: []
  /participants/{participantId}/identityAttributes:
    get:
      tags:
      - Participants
      summary: Get Identity Attributes of a participant identified by a credential
      description: Retrieves a list of identity attributes associated with a given
        certificate ID.
      operationId: getParticipantIdentityAttributesByParticipantId
      parameters:
      - name: participantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: First participant
            value: 00000001-0000-0000-0000-000000000000
      responses:
        "200":
          description: Successfully retrieved identity attributes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdentityAttribute"
              examples:
                default:
                  summary: Default example
                  value:
                  - code: CONSUMER
                    name: Consumer
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    description: Identity attribute used for tagging an end user able
                      to act as a user of a data consumer participant (can start contract
                      and transfer process)
                    assignableToRoles: true
                    id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    used: true
                    right: true
                    enabled: true
                    builtIn: true
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
                  - code: CONSUMER
                    name: Consumer
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    description: Identity attribute used for tagging an end user able
                      to act as a user of a data consumer participant (can start contract
                      and transfer process)
                    assignableToRoles: true
                    id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    used: true
                    right: true
                    enabled: true
                    builtIn: true
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - mtlsWithEphemeralProof: []
components:
  schemas:
    IdentityAttribute:
      type: object
      example:
        code: CONSUMER
        name: Consumer
        creationTimestamp: 2000-01-23T04:56:07.000+00:00
        description: Identity attribute used for tagging an end user able to act as
          a user of a data consumer participant (can start contract and transfer process)
        assignableToRoles: true
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        used: true
        right: true
        enabled: true
        builtIn: true
        updateTimestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          type: string
          format: uuid
          description: the unique UUID identifier of the identity attribute
        code:
          type: string
          description: the unique code identifying the identity attribute
          maxLength: 255
        name:
          type: string
          description: the human readable name of the identity attribute
          maxLength: 255
        description:
          type: string
          description: the human readable description of the identity attribute
          maxLength: 255
        assignableToRoles:
          type: boolean
          description: boolean stating if the identity attribute can be assigned to
            a role
        enabled:
          type: boolean
          description: boolean flag stating if the identity attribute is enabled
        creationTimestamp:
          type: string
          format: date-time
          description: the creation timestamp of the identity attribute in ISO 8601
            format
        updateTimestamp:
          type: string
          format: date-time
          description: the update timestamp of the identity attribute in ISO 8601
            format
        used:
          type: boolean
          description: boolean saying if the identity attribute is assigned to at
            least a participant
          readOnly: true
        right:
          type: boolean
          description: boolean stating if the identity attribute represent a legal
            right
          readOnly: true
        builtIn:
          type: boolean
          description: boolean stating if the identity attribute is built-in an therefore
            cannot be created modified or deleted
          readOnly: true
      required:
      - assignableToRoles
      - code
      - enabled
      - name
    SignatureProof:
      type: object
      example:
        signature: MEYCIQDV6nM1jU2J...==
        nonce: 36b8f84d-df4e-4d49-b662-bcde71a8764f
        timestamp: 2025-04-04T12:34:56Z
      properties:
        timestamp:
          type: string
          format: date-time
          description: "the timestamp of the request, in UTC ISO 8601 format"
          example: 2025-04-04T12:34:56Z
        nonce:
          type: string
          format: uuid
          description: a randomly generated nonce
          example: 36b8f84d-df4e-4d49-b662-bcde71a8764f
        signature:
          type: string
          format: byte
          description: base64-encoded signature of the timestamp and noce ($timestamp
            + _ + $nonce)
          example: MEYCIQDV6nM1jU2J...==
      required:
      - nonce
      - signature
      - timestamp
    Token:
      type: object
      example:
        token: IxvaN4ER-PlPgLYzfRhk_JiY4VAow3GNjaK5rYCINFsEPa7VaYnRsaCmQVq8CTgddihEPPXet2laH8_c3WqxY4AeZO5eljwSCobCHzxYdOoFKbpNXIm7dqHg_5xpQz-YBJMiDM1ILOEsER8ADyF4NC2sN0K_0t6xZLSAQIRrHvpGOrtYr5E-SllTWHWPmqCkX2BUZxoYNK2FWgQZpuUOD55HfsvFXNVQa_5TFRDibi9LsT7Sd_az0iGB0TfAb0v3ZR0qnmgyp5pTeIeU5UqhtbgU9RnUCVmGIK-SZYNvrlXgv9hiKAZGhLgeI8hO40utfT2YTYHgD2Aiufqo3RIbJA
      properties:
        token:
          type: string
          description: the ephemeral proof token
      required:
      - token
    Problem:
      type: object
      description: |
        A Problem Details object (RFC 9457).

        Additional properties specific to the problem type may be present.
      example:
        type: urn:problem-type:exampleOrganization:exampleProblem
        href: https://www.belgif.be/specification/rest/api-guide/#standardized-problem-types
        title: Description of the type of problem that occurred
        status: 400
        detail: Description of specific occurrence of the problem
        instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
      properties:
        type:
          type: string
          format: uri
          default: about:blank
          description: |
            An absolute URI that identifies the problem type.  When dereferenced,
            it SHOULD provide human-readable documentation for the problem type
            (e.g., using HTML).
          example: https://zalando.github.io/problem/constraint-violation
        title:
          type: string
          description: |
            A short, summary of the problem type. Written in english and readable
            for engineers (usually not suited for non technical stakeholders and
            not localized); example: Service Unavailable
        status:
          type: integer
          format: int32
          description: |
            The HTTP status code generated by the origin server for this occurrence
            of the problem.
          example: 503
          maximum: 600
          minimum: 100
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the
            problem.
          example: Connection to database timed out
        instance:
          type: string
          format: uri
          description: |-
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
  responses:
    BadRequest:
      description: "Bad request, invalid input data"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            badRequest:
              summary: Bad Request
              value:
                type: urn:problem-type:simpl:badRequest
                title: Bad request
                detail: Invalid input data
                status: 400
    Unauthorized:
      description: "Unauthorized, the user is not authenticated"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            unauthorized:
              summary: Unauthorized
              value:
                type: urn:problem-type:simpl:unauthorized
                title: Unauthorized
                detail: The user is not authenticated
                status: 401
    Forbidden:
      description: "Forbidden, the user does not have the roles to perform the operation"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            forbidden:
              summary: Forbidden
              value:
                type: urn:problem-type:simpl:forbidden
                title: Forbidden
                detail: The user does not have the roles to perform the operation
                status: 403
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            notFound:
              summary: Not Found
              value:
                type: urn:problem-type:simpl:notFound
                title: Not Found
                detail: Resource not found
                status: 404
    InternalServerError:
      description: "Internal Server Error, an internal server error occurred"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            internalServerError:
              summary: Internal Server Error
              value:
                type: urn:problem-type:simpl:internalServerError
                title: Internal Server Error
                detail: Internal Server Error
                status: 500
  securitySchemes:
    mtls:
      type: http
      description: SIMPL Tier 2 mTLS authentication process
      scheme: mutual
    mtlsWithEphemeralProof:
      type: http
      description: SIMPL Tier 2 mTLS authentication process with Ephemeral Proof exchange
      scheme: mutual