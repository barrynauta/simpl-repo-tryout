openapi: 3.0.1
info:
  title: Identity Provider Tier 1
  description: Tier 1 OpenAPI definition for the Identity Provider component of the
    SIMPL project
  contact:
    name: Simpl Programme
    url: https://simpl-programme.ec.europa.eu/
    email: cnect-simpl@ec.europa.eu
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  version: 2.0.0
servers:
- url: https://t1.identity-provider.dev.simpl.eu/tier1/v2
  description: Tier1 Identity Provider
security:
- oauth2ClientCredentials: []
tags:
- name: Credentials
  description: "Manage the digital credentials of participants, enabling secure authentication\
    \ and verification of their identity and roles within trusted data exchange processes."
- name: Participants
  description: "Allow the creation and retrieval of participant, also allowing  to\
    \ manage the credential requests (CSR)."
- name: Automatic Renewals
  description: "Allow the creation, retrieval and editing of the default automatic\
    \ renewal configuration for the dataspace participants."
paths:
  /participants:
    get:
      tags:
      - Participants
      summary: List all participants
      description: Lists the available participants in the dataspace. Only accessible
        by users with the NOTARY and IATTR_M roles.
      operationId: listParticipants
      parameters:
      - name: page
        in: query
        description: the index of page to be retrieved
        required: false
        schema:
          $ref: "#/components/schemas/PageQueryParam"
        examples:
          firstPage:
            summary: First page
            value: 0
          firstPageSortedByCreationTimestampAsc:
            summary: First page sorted by creation timestamp asc
            value: 0
          firstPageSortedByCreationTimestampDesc:
            summary: First page sorted by creation timestamp desc
            value: 0
          firstPageFilteredByOrganization:
            summary: First page filtered by organization
            value: 0
          secondPageEmpty:
            summary: Second page empty
            value: 1
      - name: pageSize
        in: query
        description: maximum number of items per page desired by client
        required: false
        schema:
          $ref: "#/components/schemas/PageSizeQueryParam"
        examples:
          firstPage:
            summary: First page
            value: 10
          firstPageSortedByCreationTimestampAsc:
            summary: First page sorted by creation timestamp asc
            value: 10
          firstPageSortedByCreationTimestampDesc:
            summary: First page sorted by creation timestamp desc
            value: 10
          firstPageFilteredByOrganization:
            summary: First page filtered by organization
            value: 10
          secondPageEmpty:
            summary: Second page empty
            value: 10
      - name: sort
        in: query
        description: "Multi-value query param with list of properties to sort on.\
          \ Direction is ascending by default. To indicate descending, prefix property\
          \ with -."
        required: false
        schema:
          $ref: "#/components/schemas/SortQueryParam"
        examples:
          firstPageSortedByCreationTimestampAsc:
            summary: First page sorted by creation timestamp asc
            value: creationTimestamp
          firstPageSortedByCreationTimestampDesc:
            summary: First page sorted by creation timestamp desc
            value: -creationTimestamp
      - name: organization
        in: query
        description: the organization represented by the participant
        required: false
        schema:
          type: string
        examples:
          firstPageFilteredByOrganization:
            summary: Default
            value: ACME_1
      - name: creationTimestampFrom
        in: query
        description: RFC3339 timestamp of onboarding
        required: false
        schema:
          type: string
          format: date-time
        examples:
          default:
            summary: Default
            value: 2025-01-20T17:32:28Z
      - name: creationTimestampTo
        in: query
        description: RFC3339 timestamp of onboarding
        required: false
        schema:
          type: string
          format: date-time
        examples:
          default:
            summary: Default
            value: 2025-01-20T17:32:28Z
      responses:
        "200":
          description: List of participants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantPagedResponse"
              examples:
                default:
                  summary: Default
                  value:
                    self: /participants?creationTimestampFrom=2025-01-20T17:32:28Z&creationTimestampTo=2025-01-25T17:32:28Z&sort=creationTimestamp&page=2&pageSize=2
