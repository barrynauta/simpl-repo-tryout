components:
  schemas:
    PageQueryParam:
      type: integer
      default: 0
      minimum: 0
    PageSizeQueryParam:
      type: integer
      default: 10
    SortQueryParam:
      type: array
      items:
        type: string
        description: a sorting policy
    ParticipantPagedResponse:
      allOf:
      - $ref: "#/components/schemas/PageResponse"
      - type: object
        properties:
          items:
            type: array
            description: Elements in sliced search
            items:
              $ref: "#/components/schemas/ParticipantDetailResponse"
    ParticipantRequest:
      type: object
      properties:
        organization:
          type: string
          description: the organization represented by the participant
          example: ACME Corp
          maxLength: 255
        applicantEmail:
          type: string
          format: email
          example: applicant@email.com
        isAuthority:
          type: boolean
          description: whether the participant is an authority in the dataspace
          example: false
      required:
      - organization
    ParticipantDetailResponse:
      allOf:
      - $ref: "#/components/schemas/ParticipantResponse"
      - type: object
        required:
        - credential
    ParticipantResponse:
      allOf:
      - $ref: "#/components/schemas/Participant"
      - type: object
        required:
        - creationTimestamp
        - id
        - organization
        - tierOnePublicKey
        - updateTimestamp
    CsrResponse:
      type: object
      properties:
        commonName:
          type: string
          example: participant1
          maxLength: 255
        organization:
          type: string
          example: SIMPL
          maxLength: 255
        organizationalUnit:
          type: string
          example: IT Dep
          maxLength: 255
        country:
          type: string
          example: IT
          maxLength: 255
        csr:
          type: string
          description: Certificate Signing Request (CSR) in PEM format
          example: |
            -----BEGIN CERTIFICATE REQUEST-----
            MIICxTCCAa0CAQAwTDELMAkGA1UEBhMCVVMxCzAJBgNVBAgMAkNBMQ8wDQYDVQQH
