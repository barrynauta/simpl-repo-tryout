      x-simpl-roles:
      - NOTARY
      - IATTR_M
    post:
      tags:
      - Participants
      summary: Create a new participant
      description: Creates a new participant with the provided details
      operationId: createParticipant
      requestBody:
        description: Details of the participant to create
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParticipantRequest"
            examples:
              participantRequest:
                summary: a participant creation request
                value:
                  organization: ACME Corp
        required: true
      responses:
        "201":
          description: Participant created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantDetailResponse"
              examples:
                participantCreationResponse:
                  summary: participant creation response
                  value:
                    organization: "{{request.body/organization}}"
                    creationTimestamp: "{{now(yyyy-MM-dd'T'HH:mm:ss'Z')}}"
                    updateTimestamp: "{{now(yyyy-MM-dd'T'HH:mm:ss'Z')}}"
                    id: "{{uuid()}}"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2ClientCredentials: []
      x-microcks-operation:
        dispatcher: JSON_BODY
        dispatcherRules: |
          {
            "exp": "/organization",
            "operator": "presence",
            "cases": {
              "found": "participantCreationResponse",
              "default": "badRequest"
            }
          }
  /participants/{participantId}:
    get:
      tags:
      - Participants
      summary: Retrieve participant data by ID
      description: |
        Retrieves information about a specific participant using its identifier.<br>
        Only accessible by users with the NOTARY and IATTR_M roles their full access permissions.<br>
        An user with APPLICANT role can only access their own participant data.
      operationId: getParticipant
      parameters:
      - name: participantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        examples:
          firstParticipant:
            summary: First participant
            value: 00000001-0000-0000-0000-000000000000
          secondParticipant:
            summary: Second participant
            value: 00000002-0000-0000-0000-000000000000
          thirdParticipant:
            summary: Third participant
            value: 00000003-0000-0000-0000-000000000000
          fourthParticipant:
            summary: Fourth participant
            value: 00000004-0000-0000-0000-000000000000
      responses:
        "200":
          description: Participant data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantResponse"
              examples:
                firstParticipant:
                  summary: First participant
                  value:
                    organization: ACME_1
                    creationTimestamp: 2025-01-20T17:32:28Z
                    id: 00000001-0000-0000-0000-000000000000
                    updateTimestamp: 2025-01-22T17:32:28Z
