            GAm9FiybDpmsXsdrW1zsxSu+bBCBM8wUpemGx5H2Eb2p247dxam1\n-----END PUBLIC\
            \ KEY-----\n"
        applicantEmail:
          type: string
          format: email
          example: applicant@email.com
        credential:
          $ref: "#/components/schemas/CredentialResponse"
        isAuthority:
          type: boolean
          description: whether the participant is an authority in the dataspace
          example: false
        creationTimestamp:
          type: string
