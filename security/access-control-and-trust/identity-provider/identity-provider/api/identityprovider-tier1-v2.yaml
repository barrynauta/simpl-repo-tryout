    post:
      tags:
      - Credentials
      summary: Create a credential for the given participant
      description: Create a credential for the given participant. Only accessible
        by users with the IATTR_M roles or by the participant’s associated APPLICANT
        user.
      operationId: createCredential
      parameters:
      - name: participantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        examples:
