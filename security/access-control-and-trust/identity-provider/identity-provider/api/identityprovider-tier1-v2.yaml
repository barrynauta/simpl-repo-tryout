            1f7xVylTbQ8FzMMhJgNx+iRPLFffYp+iYzC80eTf65U7/ClfGBM4CfdI+TF0nNbf
            WruTAgMBAAGgADANBgkqhkiG9w0BAQsFAAOCAQEALSTjePZKeZspsx+CrcV+hH3u
            Wh2gKfr8bA4arZGGzC5ovCfrcK6C6OUKkiVvP9ADv4g5iG0eFmcg2hZsmMJex8sH
            y6x8zbiZ+T9hG66UZS04iEtUqMzjsSCpIWK97e2lZDHwV7Qgvc2sw8QvUnDj6e4D
            gpcEG3KGEp3XnYOBfHrkAfldz7NVyRftrF+y0kC8r/xLZzv9KKToWWAOyxlql2Qi
            KwbtWZAM7gA77RCRUtAhxD/kPlLM2YwQkh0QwRAxVIkKR82DbK90AcBuSmayPbjo
            3eXjfwtrCbb6UVfWn3xAAHYy46D5iFkkq6Y7mOCUNZ7X9uAIKzqJ12plAUoMBxkM
            9g==
            -----END CERTIFICATE REQUEST-----
      required:
      - commonName
      - country
      - csr
      - organization
      - organizationalUnit
    UpdateParticipant:
      allOf:
      - $ref: "#/components/schemas/CsrRequest"
    CredentialStatus:
      type: string
      description: |
        The status of the credential:<br> - **Valid**: The credential is valid and usable.<br> - **Expired**: The credential has expired.<br> - **Revoked**: The credential is permanently revoked and no longer usable.<br> - **Suspended**: The credential is temporarily revoked and may transition back to valid.<br>
      enum:
      - VALID
      - EXPIRED
      - REVOKED
      - SUSPENDED
    CredentialsPagedResponse:
      allOf:
      - $ref: "#/components/schemas/PageResponse"
      - type: object
        properties:
          renew:
            $ref: "#/components/schemas/RenewResponse"
          installedCSR:
            $ref: "#/components/schemas/CsrResponse"
          items:
            type: array
            description: Elements in sliced search
            items:
              $ref: "#/components/schemas/CredentialDetailResponse"
      - type: object
        required:
        - renew
    CreateCredentialRequest:
      type: object
      properties:
        reason:
          type: string
          description: Reason for issuing a credential
          example: A reason for issuing a credential
          maxLength: 1024
      required:
      - reason
    CredentialDetailResponse:
      allOf:
      - $ref: "#/components/schemas/CredentialResponse"
      - type: object
        required:
        - participant
    UpdateCredential:
      type: object
      example:
        status: VALID
      properties:
        status:
          $ref: "#/components/schemas/CredentialStatus"
        reason:
          type: string
          description: reason for the credential upload
          example: This is a reason
          maxLength: 1024
      required:
      - reason
      - status
    CredentialResponse:
      allOf:
      - $ref: "#/components/schemas/Credential"
      - type: object
        required:
        - content
        - credentialId
        - expiryDate
        - issuanceDate
        - lastStatusChangeDate
        - status
    AutomaticRenewalConfiguration:
      type: object
      example:
        daysBeforeRenewal: 20
      properties:
        daysBeforeRenewal:
          type: integer
          default: 20
          description: The days where the automatic renewal will happen before the
            credentials' expiration
          maximum: 1830
          minimum: 0
      required:
      - daysBeforeRenewal
    ParticipantAutomaticRenewalConfiguration:
      type: object
      example:
        enabled: true
        customRenewal:
          daysBeforeRenewal: 10
        reason: This is a reason
      properties:
        enabled:
          type: boolean
          default: true
          description: Enables the automatic renewal
        customRenewal:
          $ref: "#/components/schemas/AutomaticRenewalConfiguration"
        reason:
          type: string
          description: reason for the credential upload
          example: This is a reason
          maxLength: 1024
      required:
      - enabled
    Problem:
      type: object
      description: |
        A Problem Details object (RFC 9457).

        Additional properties specific to the problem type may be present.
      example:
        type: urn:problem-type:exampleOrganization:exampleProblem
        href: https://www.belgif.be/specification/rest/api-guide/#standardized-problem-types
        title: Description of the type of problem that occurred
        status: 400
        detail: Description of specific occurrence of the problem
        instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
      properties:
        type:
          type: string
          format: uri
          default: about:blank
          description: |
            An absolute URI that identifies the problem type.  When dereferenced,
            it SHOULD provide human-readable documentation for the problem type
            (e.g., using HTML).
          example: https://zalando.github.io/problem/constraint-violation
        title:
          type: string
          description: |
            A short, summary of the problem type. Written in english and readable
            for engineers (usually not suited for non technical stakeholders and
            not localized); example: Service Unavailable
        status:
          type: integer
          format: int32
          description: |
            The HTTP status code generated by the origin server for this occurrence
            of the problem.
          example: 503
          maximum: 600
          minimum: 100
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the
            problem.
          example: Connection to database timed out
        instance:
          type: string
          format: uri
          description: |-
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
    PageResponse:
      type: object
      properties:
        self:
          type: string
          format: uri
          description: Absolute URI to the resource's own location.
        pageSize:
          type: integer
          description: "Maximum number of items per page. For the last page, its value\
            \ should be independent of the number of actually returned items."
        page:
          type: integer
          description: "Index of the current page of items, should be 1-based (the\
            \ default and first page is 1)"
        total:
          type: integer
          description: "Total number of items across all pages. If query parameters\
            \ are used to filter the result set, this is the total of the collection\
            \ result set, not of the entire collection."
        first:
          type: string
          format: uri
          description: Absolute URI to the first page
        last:
          type: string
          format: uri
          description: Absolute URI to the last page
        prev:
          type: string
          format: uri
          description: Absolute URI to the previous page
        next:
          type: string
          format: uri
          description: Absolute URI to the next page
    Participant:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: participant unique identifier in the dataspace
          example: 26fa5d4f-ff89-490d-ba3e-fac0a33cb26f
        organization:
          type: string
          description: the organization represented by the participant
          example: ACME Corp
          maxLength: 255
        tierOnePublicKey:
