  /participants/{participantId}/credentials:
    get:
      tags:
      - Credentials
      summary: Retrieves the credentials given a Participant identifier
      description: Retrieves the credentials (including their status and expiration
        timestamp) given a participant identifier. Only accessible by users with the
        NOTARY or IATTR_M roles.
      operationId: getParticipantCredentials
      parameters:
      - name: participantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        examples:
          firstPage:
            summary: First page
            value: 00000001-0000-0000-0000-000000000000
          firstPageSortedByIssuanceDateAsc:
            summary: First page sorted by issuance date asc
            value: 00000001-0000-0000-0000-000000000000
          firstPageSortedByIssuanceDateDesc:
            summary: First page sorted by issuance date desc
            value: 00000001-0000-0000-0000-000000000000
          firstPageFilteredByIssuanceDate:
            summary: First page filtered by issuance date
            value: 00000001-0000-0000-0000-000000000000
          secondPageEmpty:
            summary: Second page empty
            value: 00000001-0000-0000-0000-000000000000
          credentialRenewal:
            value: 00000002-0000-0000-0000-000000000000
      - name: page
        in: query
        description: the index of page to be retrieved
        required: false
        schema:
          $ref: "#/components/schemas/PageQueryParam"
        examples:
          firstPage:
            summary: First page
            value: 0
          firstPageSortedByIssuanceDateAsc:
            summary: First page sorted by issuance date asc
            value: 0
          firstPageSortedByIssuanceDateDesc:
            summary: First page sorted by issuance date desc
            value: 0
          firstPageFilteredByIssuanceDate:
            summary: First page filtered by issuance date
            value: 0
          secondPageEmpty:
            summary: Second page empty
            value: 1
          credentialRenewal:
            summary: Credential renewal
            value: 0
      - name: pageSize
        in: query
        description: maximum number of items per page desired by client
        required: false
        schema:
          $ref: "#/components/schemas/PageSizeQueryParam"
        examples:
          firstPage:
            summary: First page
            value: 10
          firstPageSortedByIssuanceDateAsc:
            summary: First page sorted by issuance date asc
            value: 10
          firstPageSortedByIssuanceDateDesc:
            summary: First page sorted by issuance date desc
            value: 10
          firstPageFilteredByIssuanceDate:
            summary: First page filtered by issuance date
            value: 10
          secondPageEmpty:
            summary: Second page empty
            value: 10
          credentialRenewal:
            summary: Credential renewal
            value: 10
      - name: sort
        in: query
        description: "Multi-value query param with list of properties to sort on.\
          \ Direction is ascending by default. To indicate descending, prefix property\
          \ with -."
        required: false
        schema:
          $ref: "#/components/schemas/SortQueryParam"
        examples:
          firstPageSortedByIssuanceDateAsc:
            summary: First page sorted by issuance date asc
            value: issuanceDate
          firstPageSortedByIssuanceDateDesc:
            summary: First page sorted by issuance date desc
            value: -issuanceDate
      - name: issuanceDateFrom
        in: query
        description: RFC3339 start interval timestamp of the issuance date to filter
          credentials.
        required: false
        schema:
          type: string
          format: date-time
        examples:
          firstPageFilteredByIssuanceDate:
            summary: First page filtered by issuance date
            value: 2025-01-20T14:00:00.000Z
      - name: issuanceDateTo
        in: query
        description: RFC3339 end interval timestamp of the issuance date to filter
          credentials.
        required: false
        schema:
          type: string
          format: date-time
        examples:
          firstPageFilteredByIssuanceDate:
            summary: First page filtered by issuance date
            value: 2025-01-23T14:00:00.000Z
      - name: expiryDateFrom
        in: query
        description: RFC3339 start interval timestamp of the expiry date to filter
          credentials.
        required: false
        schema:
          type: string
          format: date-time
        examples:
          default:
            summary: Filtered by expiry date
            value: 2025-01-20T14:00:00.000Z
      - name: expiryDateTo
        in: query
        description: RFC3339 end interval timestamp of the expiry date to filter credentials.
        required: false
        schema:
          type: string
          format: date-time
        examples:
          default:
            summary: Filtered by expiry date
            value: 2025-01-23T14:00:00.000Z
      - name: status
        in: query
        description: Status to filter credentials.
        required: false
        schema:
          $ref: "#/components/schemas/CredentialStatus"
        examples:
          default:
            summary: Filtered by status
            value: VALID
      responses:
        "200":
          description: List of credentials by participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialsPagedResponse"
              examples:
                firstPage:
                  summary: First page of credentials
                  value:
