openapi: 3.0.1
info:
  title: Identity Provider
  description: OpenAPI definition for the Identity Provider component of the SIMPL
    project
  contact:
    name: Simpl Programme
    url: https://simpl-programme.ec.europa.eu/
    email: cnect-simpl@ec.europa.eu
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  version: 1.5.0
servers:
- url: https://localhost:8083/v1
  description: identityprovider
security:
- mtls: []
- mtlsWithEphemeralProof: []
- oauth2AuthCode: []
- oauth2ClientCredentials: []
tags:
- name: Certificate Sign Requests
  description: API for managing Certificate Sign Requests
- name: Credentials
  description: API for managing Participant's credentials
- name: Mtls
  description: API for managing Mtls
- name: Mtls Ephemeral Proofs
  description: API for managing Mtls Ephemeral Proofs
- name: Participants
  description: API for managing Participants
paths:
  /credentials/{id}:
    get:
      tags:
      - Credentials
      summary: Retrieve information about the credential of the given participant
      description: Retrieve information about the credential of the given participant
      operationId: getCredential
      parameters:
      - name: id
        in: path
        description: ID of the participant
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: Default example
            value: 1dce13a3-ba1c-44f1-87ec-fca980da71bf
      responses:
        "200":
          description: Credential information returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
              examples:
                default:
                  summary: Default example
                  value:
                    expiryDate: 2000-01-23T04:56:07.000+00:00
                    publicKey: I3F3ILirR0NN+TsTwivWMo+jx0eJxrCJeRgV2M5gU1s=
                    lastStatusChangeDate: 2000-01-23T04:56:07.000+00:00
                    status: VALID
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/Forbidden"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - IATTR_M
      x-deprecation-info:
        replacements:
        - "GET /tier1/v2/participants/{participantId}/credentials"
        reason: Changes in response data due to credentials handling revise
    put:
      tags:
      - Credentials
      summary: Create credential
      description: Creates the credential
      operationId: createCertificate
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: Default example
            value: 1dce13a3-ba1c-44f1-87ec-fca980da71bf
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
              examples:
                default:
                  summary: Default example
                  value:
                    expiryDate: 2000-01-23T04:56:07.000+00:00
                    publicKey: I3F3ILirR0NN+TsTwivWMo+jx0eJxrCJeRgV2M5gU1s=
                    lastStatusChangeDate: 2000-01-23T04:56:07.000+00:00
                    status: VALID
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - SIMPL_USER
      x-deprecation-info:
        replacements:
        - "POST /tier1/v2/participants/{participantId}/credentials"
        reason: Changes in response data due to credentials handling revise
    delete:
      tags:
      - Credentials
      summary: Revoke credential
      description: Revokes the certificate with the specified ID
      operationId: revoke
      parameters:
      - name: id
        in: path
        description: ID of the certificate to be revoked
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: Default example
            value: 8f031077-1d65-4f9c-96cf-8a388db51469
      responses:
        "204":
          description: Certificate revoked successfully
          x-microcks-refs:
          - default
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - IATTR_M
      x-deprecation-info:
        replacements: []
        reason: Changes in response data due to credentials handling revise
    patch:
      tags:
      - Credentials
      summary: Change the status of a participant credential
      description: Modify the status of a participant's credential
      operationId: updateCredentialStatus
      parameters:
      - name: id
        in: path
        description: ID of the participant
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: Default example
            value: 1dce13a3-ba1c-44f1-87ec-fca980da71bf
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCredentialStatusRequest"
            examples:
              default:
                summary: Default example
                value:
                  status: VALID
        required: true
      responses:
        "200":
          description: Credential status updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
              examples:
                default:
                  summary: Default example
                  value:
                    expiryDate: 2000-01-23T04:56:07.000+00:00
                    publicKey: I3F3ILirR0NN+TsTwivWMo+jx0eJxrCJeRgV2M5gU1s=
                    lastStatusChangeDate: 2000-01-23T04:56:07.000+00:00
                    status: VALID
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - IATTR_M
      x-deprecation-info:
        replacements:
        - "PATCH /tier1/v2/credentials/{credentialId}"
        reason: Changes in response data due to credentials handling revise
  /credentials/{id}/download:
    get:
      tags:
      - Credentials
      summary: Download credential
      description: Downloads the certificate for the specified participant ID as a
        file
      operationId: downloadCertificate
      parameters:
      - name: id
        in: path
        description: ID of the certificate to be downloaded
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: Default example
            value: 1dce13a3-ba1c-44f1-87ec-fca980da71bf
      responses:
        "200":
          description: Certificate downloaded successfully
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
              example: "[binary data]"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - APPLICANT
      x-deprecation-info:
        replacements:
        - "GET /tier1/v2/participants/{participantId}/credentials/active"
        reason: Changes in response data due to credentials handling revise
  /credentials/{id}/renew:
    post:
      tags:
      - Credentials
      summary: Renew the specified credential
      description: Renew the specified credential
      operationId: renewCertificate
      parameters:
      - name: id
        in: path
        description: ID of the credential to be renewed
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: Default example
            value: 1dce13a3-ba1c-44f1-87ec-fca980da71bf
      responses:
        "200":
          description: Certificate renewed successfully
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
              example: "[binary data]"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - IATTR_M
      x-deprecation-info:
        replacements:
        - "POST /tier1/v2/participants/{participantId}/credentials"
        reason: Changes in response data due to credentials handling revise
  /participants:
    get:
      tags:
      - Participants
      summary: Search for participants
      description: Searches for participants based on the provided filter criteria
      operationId: search
      parameters:
      - name: page
        in: query
        description: Zero-based page index (0..N)
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 0
          minimum: 0
        examples:
          default:
            summary: Default example
            value: 0
      - name: size
        in: query
        description: The size of the page to be returned
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 10
          minimum: 1
        examples:
          default:
            summary: Default example
            value: 10
      - name: sort
        in: query
        description: "Sorting criteria in the format: property,(asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        required: false
        style: form
        explode: true
        schema:
          type: array
          default:
          - "id,ASC"
          items:
            type: string
        examples:
          default:
            summary: Default example
            value: "id,asc"
      - name: filter
        in: query
        required: false
        style: form
        explode: true
        schema:
          $ref: "#/components/schemas/SearchFilterParameter"
        examples:
          default:
            summary: Default example
            value:
              organization: organization
              isAuthority: true
              participantType: participantType
              dateTo: 2000-01-23T04:56:07.000+00:00
              credentialId: credentialId
              dateFrom: 2000-01-23T04:56:07.000+00:00
              hasCredential: true
        x-parameter-object: true
      responses:
        "200":
          description: Participants retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponseParticipant"
              examples:
                default:
                  summary: Default example
                  value:
                    page:
                      number: 6
                      size: 0
                      totalPages: 5
                      totalElements: 1
                    content:
                    - expiryDate: 2000-01-23T04:56:07.000+00:00
                      organization: Organization 1
                      participantType: CONSUMER
                      creationTimestamp: 2000-01-23T04:56:07.000+00:00
                      credentialId: w+KEjkFH71jLscODJgIkCCgsDXqToX4RZp0cOdt2vJbOImZZAl3vEyaB7rWqUuQu
                      id: 3657a28e-93c4-4f50-9f48-4cbe4dcfbe87
                      updateTimestamp: 2000-01-23T04:56:07.000+00:00
                      credentialStatus: VALID
                    - expiryDate: 2000-01-23T04:56:07.000+00:00
                      organization: Organization 2
                      participantType: DATA_PROVIDER
                      creationTimestamp: 2000-01-23T04:56:07.000+00:00
                      credentialId: XVWP7uxTWyWRteYjJf3nmpRuKUADRbEf0+7dke8YM5dHsHBoacEK7Z4MVxu2a2GU
                      id: c3a45a29-cda0-429c-9e1c-995ebc178e59
                      updateTimestamp: 2000-01-23T04:56:07.000+00:00
                      credentialStatus: VALID
                    empty: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - IATTR_M
      x-deprecation-info:
        replacements:
        - GET /tier1/v2/participants
        reason: Changes in response data due to credentials handling revise
    post:
      tags:
      - Participants
      summary: Create a new participant
      description: Creates a new participant with the provided details
      operationId: create
      requestBody:
        description: Details of the participant to create
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Participant"
            examples:
              default:
                summary: Default example
                value:
                  organization: Organization Name
                  participantType: CONSUMER
        required: true
      responses:
        "201":
          description: Participant created successfully
          content:
            application/json:
              schema:
                type: string
                format: uuid
              example: 87ecf023-2b81-40c1-a0e6-1ee3129cca09
        "400":
          $ref: "#/components/responses/BadRequest"
      deprecated: true
      security:
      - oauth2ClientCredentials: []
      x-deprecation-info:
        replacements:
        - POST /tier1/v2/participants
        reason: Changes in response data due to credentials handling revise
  /participants/{participantId}:
    get:
      tags:
      - Participants
      summary: Get participant by ID
      description: Get participant by ID
      operationId: get
      parameters:
      - name: participantId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: Default example
            value: 91b4ef51-8dc3-451f-a4eb-3ad88826eec9
      responses:
        "200":
          description: Participant retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Participant"
              examples:
                default:
                  summary: Default example
                  value:
                    expiryDate: 2000-01-23T04:56:07.000+00:00
                    organization: Organization Name
                    participantType: CONSUMER
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    credentialId: ymojkQMALL75C+2s4Rv9MGPBS1bIAHyH54//XBI+gjG9zwD20E/k8xb20JHKJ5KD
                    id: 4ff8e666-522e-4796-ac8d-e5c707d675f0
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
                    credentialStatus: VALID
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - IATTR_M
      x-deprecation-info:
        replacements:
        - "GET /tier1/v2/participants/{participantId}"
        reason: Changes in response data due to credentials handling revise
  /participants/{participantId}/csr:
    post:
      tags:
      - Certificate Sign Requests
      summary: Validate and store a CSR for a participant
      description: "Validate and store a CSR for a participant, then create a certificate"
      operationId: storeCSRAndCreateCertificate
      parameters:
      - name: participantId
        in: path
        description: ID of the participant
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: Default example
            value: 91b4ef51-8dc3-451f-a4eb-3ad88826eec9
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/StoreCsrAndCreateCertificateRequest"
            examples:
              default:
                summary: Default example
                value:
                  csr: "[binary data]"
        required: true
      responses:
        "200":
          description: CSR uploaded successfully
          x-microcks-refs:
          - default
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - APPLICANT
      x-deprecation-info:
        replacements:
        - "PUT /tier1/v2/participants/{participantId}/csr"
        reason: Changes in response data due to credentials handling revise
  /mtls/whoami:
    get:
      tags:
      - Mtls
      summary: Get participant information
      description: Retrieves the information of the caller participant
      operationId: whoami
      parameters:
      - name: Credential-Id
        in: header
        description: Public Key Hash of participant
        required: true
        style: simple
        explode: false
        schema:
          type: string
        examples:
          default:
            summary: Default example
            value: zPPJ4TbEd8xNJPkdmePpAsamcKEQf8nxAMa7vw58Fc7eEtAzMrRDLA4oWNETGzrpcwsoQ5GwnEFhpeLxrYyV1gC1LnVXt1KBMM
      responses:
        "200":
          description: Participant and identity attributes retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Participant"
              examples:
                default:
                  summary: Default example
                  value:
                    expiryDate: 2000-01-23T04:56:07.000+00:00
                    organization: Organization Name
                    participantType: CONSUMER
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    credentialId: ymojkQMALL75C+2s4Rv9MGPBS1bIAHyH54//XBI+gjG9zwD20E/k8xb20JHKJ5KD
                    id: 4ff8e666-522e-4796-ac8d-e5c707d675f0
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
                    credentialStatus: VALID
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
      deprecated: true
      security:
      - mtls: []
      x-deprecation-info:
        replacements:
        - GET /tier2/v2/participant
        reason: Changes in response data due to credentials handling revise
  /mtls/token:
    post:
      tags:
      - Mtls Ephemeral Proofs
      summary: |
        Generate ephemeral proof
      description: |
        This api will call POST /v1/mtls/token of SAP component to generate
        an ephemeral proof for the specified participant
      operationId: getEphemeralProof
      parameters:
      - name: Credential-Id
        in: header
        description: The credential ID of the participant for whom the ephemeral proof
          is generated
        required: true
        style: simple
        explode: false
        schema:
          type: string
        examples:
          default:
            summary: Default example
            value: zPPJ4TbEd8xNJPkdmePpAsamcKEQf8nxAMa7vw58Fc7eEtAzMrRDLA4oWNETGzrpcwsoQ5GwnEFhpeLxrYyV1gC1LnVXt1KBMM
      requestBody:
        description: Contains the timestamp of the request along with the timestamp
          signature
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignatureProof"
            examples:
              default:
                summary: Default example
                value:
                  signature: MEYCIQDV6nM1jU2J...==
                  nonce: 36b8f84d-df4e-4d49-b662-bcde71a8764f
                  timestamp: 2025-04-04T12:34:56Z
        required: false
      responses:
        "200":
          description: Ephemeral proof generated successfully
          content:
            application/json:
              schema:
                type: string
              example: |
                IxvaN4ER-PlPgLYzfRhk_JiY4VAow3GNjaK5rYCINFsEPa7VaYnRsaCmQVq8CTgddihEPPXe
                t2laH8_c3WqxY4AeZO5eljwSCobCHzxYdOoFKbpNXIm7dqHg_5xpQz-YBJMiDM1ILOEsER8A
                DyF4NC2sN0K_0t6xZLSAQIRrHvpGOrtYr5E-SllTWHWPmqCkX2BUZxoYNK2FWgQZpuUOD55H
                fsvFXNVQa_5TFRDibi9LsT7Sd_az0iGB0TfAb0v3ZR0qnmgyp5pTeIeU5UqhtbgU9RnUCVmG
                IK-SZYNvrlXgv9hiKAZGhLgeI8hO40utfT2YTYHgD2Aiufqo3RIbJA
        "400":
          description: Invalid ephemeral proof request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                invalid-participant-id:
                  value:
                    type: /error/invalid-participant-id
                    title: Participant ID is invalid
                invalid-signature-proof:
                  value:
                    type: /error/invalid-signature-proof
                    title: Signature proof is invalid
                invalid-timestamp-window:
                  value:
                    type: /error/invalid-signature-proof
                    title: Invalid timestamp window
                    detail: The provided timestamp falls outside the Governance Authority’s
                      allowed time window of 1 minute.
        "401":
          $ref: "#/components/responses/Unauthorized"
      deprecated: true
      security:
      - mtls: []
      x-deprecation-info:
        replacements:
        - POST <security_attribute_provider>/tier2/v2/token
        reason: moved in security attribute provider
  /mtls/publicKey:
    patch:
      tags:
      - Mtls
      summary: Store tier-one public key
      description: Stores the tier-one public key for the specified participant
      operationId: sendTierOnePublicKey
      parameters:
      - name: Credential-Id
        in: header
        description: Public Key Hash of participant
        required: true
        style: simple
        explode: false
        schema:
          type: string
        examples:
          default:
            summary: Default example
            value: zPPJ4TbEd8xNJPkdmePpAsamcKEQf8nxAMa7vw58Fc7eEtAzMrRDLA4oWNETGzrpcwsoQ5GwnEFhpeLxrYyV1gC1LnVXt1KBMM
      requestBody:
        description: tier-one public key to be stored
        content:
          text/plain:
            schema:
              type: string
            examples:
              default:
                summary: Default example
                value: I3F3ILirR0NN+TsTwivWMo+jx0eJxrCJeRgV2M5gU1s=
        required: true
      responses:
        "200":
          description: Public key stored successfully
          x-microcks-refs:
          - default
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
      deprecated: true
      security:
      - mtls: []
      x-deprecation-info:
        replacements:
        - PUT /tier2/v2/tierOnePublicKey
        reason: Changes in response data due to credentials handling revise
  /mtls/echo:
    get:
      tags:
      - Mtls
      summary: Get participant with identity attributes
      description: Retrieves the participant along with their identity attributes
        using the participant ID
      operationId: getParticipantWithIdentityAttributesWithEcho
      parameters:
      - name: Credential-Id
        in: header
        description: Public Key Hash of participant
        required: true
        style: simple
        explode: false
        schema:
          type: string
        examples:
          default:
            summary: Default example
            value: zPPJ4TbEd8xNJPkdmePpAsamcKEQf8nxAMa7vw58Fc7eEtAzMrRDLA4oWNETGzrpcwsoQ5GwnEFhpeLxrYyV1gC1LnVXt1KBMM
      responses:
        "200":
          description: Participant and identity attributes retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantWithIdentityAttributes"
              examples:
                default:
                  summary: Default example
                  value:
                    expiryDate: 2000-01-23T04:56:07.000+00:00
                    organization: Organization Name
                    participantType: CONSUMER
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    credentialId: w/dQ6cq/hWkZ6lS6Ika0xF+LwN8fbhTYHygR3RChZz59ldkCAJPvyWqFjm4/6Foh
                    id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    identityAttributes:
                    - code: CONSUMER
                      name: Consumer
                      creationTimestamp: 2000-01-23T04:56:07.000+00:00
                      description: Identity attribute used for tagging an end user
