        expiryDate:
          type: string
          format: date-time
          description: Timestamp when the credential is expiring.
        credentialId:
          type: string
          description: public key hash (sha384) bound to the credential
          example: zPPJ4TbEd8xNJPkdmePpAsamcKEQf8nxAMa7vw58Fc7eEtAzMrQuyBHptA5aepPeQZACm19EyxKFPmBQxzQfMHLxQt6y6YUD8i
          maxLength: 64
        content:
          type: string
          description: The credential (x.509 certificate in PEM format)
          example: |
            -----BEGIN CERTIFICATE-----
            MIIC+TCCAmKgAwIBAgIBADANBgkqhkiG9w0BAQUFADCB...
            -----END CERTIFICATE-----
