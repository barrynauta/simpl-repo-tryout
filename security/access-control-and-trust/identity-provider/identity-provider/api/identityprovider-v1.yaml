    Problem:
      type: object
      description: |
        A Problem Details object (RFC 9457).

        Additional properties specific to the problem type may be present.
      example:
        type: urn:problem-type:exampleOrganization:exampleProblem
        href: https://www.belgif.be/specification/rest/api-guide/#standardized-problem-types
        title: Description of the type of problem that occurred
        status: 400
        detail: Description of specific occurrence of the problem
        instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
      properties:
        type:
          type: string
          format: uri
          default: about:blank
          description: |
            An absolute URI that identifies the problem type.  When dereferenced,
            it SHOULD provide human-readable documentation for the problem type
            (e.g., using HTML).
          example: https://zalando.github.io/problem/constraint-violation
        title:
          type: string
          description: |
            A short, summary of the problem type. Written in english and readable
            for engineers (usually not suited for non technical stakeholders and
            not localized); example: Service Unavailable
        status:
          type: integer
          format: int32
          description: |
            The HTTP status code generated by the origin server for this occurrence
            of the problem.
          example: 503
          maximum: 600
          minimum: 100
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the
            problem.
          example: Connection to database timed out
        instance:
          type: string
          format: uri
          description: |-
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
    SignatureProof:
      type: object
      example:
        signature: MEYCIQDV6nM1jU2J...==
        nonce: 36b8f84d-df4e-4d49-b662-bcde71a8764f
        timestamp: 2025-04-04T12:34:56Z
      properties:
        timestamp:
          type: string
          format: date-time
          description: "the timestamp of the request, in UTC ISO 8601 format"
          example: 2025-04-04T12:34:56Z
        nonce:
          type: string
          format: uuid
          description: a randomly generated nonce
          example: 36b8f84d-df4e-4d49-b662-bcde71a8764f
        signature:
          type: string
          format: byte
          description: base64-encoded signature of the timestamp and noce ($timestamp
            + _ + $nonce)
          example: MEYCIQDV6nM1jU2J...==
      required:
      - nonce
      - signature
      - timestamp
    CredentialStatus:
      type: string
      description: |
        The status of the credential:<br> - **Valid**: The credential is valid and usable.<br> - **Expired**: The credential has expired.<br> - **Revoked**: The credential is permanently revoked and no longer usable.<br> - **Suspended**: The credential is temporarily revoked and may transition back to valid.<br>
      enum:
      - VALID
      - EXPIRED
      - REVOKED
      - SUSPENDED
