openapi: 3.0.1
info:
  title: Identity Provider Tier 2
  description: Tier 2 OpenAPI definition for the Identity Provider component of the
    SIMPL project
  contact:
    name: Simpl Programme
    url: https://simpl-programme.ec.europa.eu/
    email: cnect-simpl@ec.europa.eu
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  version: 2.0.0
servers:
- url: https://t2.identity-provider.dev.simpl.eu/tier2/v2
  description: Tier2 Identity Provider
security:
- mtlsWithEphemeralProof: []
tags:
- name: Credentials
  description: "Manage participant credentials for Tier 2 communication, allowing\
    \ the participant to interact with the governance authority"
- name: Participants
  description: Manage participant additional information such as Tier 1 public keys
    sent over the Tier 2 communication channel
paths:
  /credentials:
    get:
      tags:
      - Credentials
      summary: Get participant credentials via agent to agent communication
      description: Retrieves the participant credentials stored into the Dataspace
        Governance Authority
      operationId: getParticipantCredentials
      parameters:
      - name: pageSize
        in: query
        description: Maximum number of items per page desired by client
        required: false
        schema:
          $ref: "#/components/schemas/PageSizeQueryParam"
        examples:
          default:
            summary: Default example
            value: 10
      - name: page
        in: query
        description: "Page number to retrieve, starting from 0"
        required: false
        schema:
          $ref: "#/components/schemas/PageQueryParam"
        examples:
          default:
            summary: Default example
            value: 0
      - name: sort
        in: query
        description: |
          Multi-value query parameter defining the properties to sort on, following the Belgif REST API sorting rules.
          Supported sorting properties:
            - status
            - issuanceDate
            - expiryDate
          Sorting is not supported on other properties (e.g. credentialId, lastStatusChangeDate).
          Sorting order:
            - Ascending order is the default.
            - To indicate descending order, prefix the property name with '-'.
          The parameter expects property names only.
          Values such as 'asc', 'desc', '[asc]', '[desc]' are not supported.
        required: false
        schema:
          $ref: "#/components/schemas/SortQueryParam"
        examples:
          sortByIssuanceDateAsc:
            summary: Sort by issuance date ascending
            value: issuanceDate
          sortByIssuanceDateDesc:
            summary: Sort by issuance date descending
            value: -issuanceDate
          sortByStatusThenIssuanceDate:
            summary: "Sort by status ascending, then issuance date descending"
            value:
            - status
            - -issuanceDate
      - name: status
        in: query
        description: Credential status filter
        required: false
        schema:
          $ref: "#/components/schemas/CredentialStatus"
        examples:
          valid:
            value: VALID
          suspended:
            value: SUSPENDED
          revoked:
            value: REVOKED
      - name: issuanceDateFrom
        in: query
        description: Filter credentials issued after this date
        required: false
        schema:
          type: string
          format: date-time
        examples:
          from:
            value: 2025-01-01T00:00:00Z
      - name: issuanceDateTo
        in: query
        description: Filter credentials issued before this date
        required: false
        schema:
          type: string
          format: date-time
        examples:
          to:
            value: 2025-01-31T23:59:59Z
      - name: expiryDateFrom
        in: query
        description: Filter credentials expiring after this date
        required: false
        schema:
          type: string
          format: date-time
        examples:
          from:
            value: 2070-01-01T00:00:00Z
      - name: expiryDateTo
        in: query
        description: Filter credentials expiring before this date
        required: false
        schema:
          type: string
          format: date-time
        examples:
          to:
            value: 2070-01-31T23:59:59Z
      - name: unpaged
        in: query
        description: "If true, ignore pagination parameters and return all results"
        required: false
        schema:
          type: boolean
          default: false
        examples:
          all:
            value: true
      responses:
        "200":
          description: List of credentials by participant
