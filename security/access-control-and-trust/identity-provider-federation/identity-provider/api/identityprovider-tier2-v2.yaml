components:
  schemas:
    PageSizeQueryParam:
      type: integer
      default: 10
    PageQueryParam:
      type: integer
      default: 0
      minimum: 0
    SortQueryParam:
      type: array
      items:
        type: string
        description: a sorting policy
    CredentialStatus:
      type: string
      description: |
        The status of the credential:<br> - **Valid**: The credential is valid and usable.<br> - **Expired**: The credential has expired.<br> - **Revoked**: The credential is permanently revoked and no longer usable.<br> - **Suspended**: The credential is temporarily revoked and may transition back to valid.<br>
      enum:
      - VALID
      - EXPIRED
      - REVOKED
      - SUSPENDED
    CredentialsPagedResponse:
      allOf:
      - $ref: "#/components/schemas/PageResponse"
      - type: object
        properties:
          renew:
            $ref: "#/components/schemas/RenewResponse"
          installedCSR:
            $ref: "#/components/schemas/CsrResponse"
          items:
            type: array
            description: Elements in sliced search
            items:
              $ref: "#/components/schemas/CredentialDetailResponse"
      - type: object
        required:
        - renew
    UpdateCredentialIdRequest:
