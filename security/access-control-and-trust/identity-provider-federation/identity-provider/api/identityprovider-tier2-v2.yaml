      properties:
        id:
          type: string
          format: uuid
        organization:
          type: string
          maxLength: 255
        creationTimestamp:
          type: string
          format: date-time
        updateTimestamp:
          type: string
          format: date-time
        credentialId:
          type: string
          maxLength: 64
        expiryDate:
          type: string
          format: date-time
        identityAttributes:
          type: array
          items:
            $ref: "#/components/schemas/IdentityAttribute"
      required:
      - organization
    Problem:
      type: object
      description: |
        A Problem Details object (RFC 9457).

        Additional properties specific to the problem type may be present.
      example:
        type: urn:problem-type:exampleOrganization:exampleProblem
        href: https://www.belgif.be/specification/rest/api-guide/#standardized-problem-types
        title: Description of the type of problem that occurred
        status: 400
        detail: Description of specific occurrence of the problem
        instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
      properties:
        type:
          type: string
          format: uri
          default: about:blank
          description: |
            An absolute URI that identifies the problem type.  When dereferenced,
            it SHOULD provide human-readable documentation for the problem type
            (e.g., using HTML).
          example: https://zalando.github.io/problem/constraint-violation
        title:
          type: string
          description: |
            A short, summary of the problem type. Written in english and readable
            for engineers (usually not suited for non technical stakeholders and
            not localized); example: Service Unavailable
        status:
          type: integer
          format: int32
          description: |
            The HTTP status code generated by the origin server for this occurrence
            of the problem.
          example: 503
          maximum: 600
          minimum: 100
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the
            problem.
          example: Connection to database timed out
        instance:
          type: string
          format: uri
          description: |-
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
    PageResponse:
      type: object
      properties:
        self:
          type: string
          format: uri
          description: Absolute URI to the resource's own location.
        pageSize:
          type: integer
          description: "Maximum number of items per page. For the last page, its value\
            \ should be independent of the number of actually returned items."
        page:
          type: integer
          description: "Index of the current page of items, should be 1-based (the\
            \ default and first page is 1)"
        total:
          type: integer
          description: "Total number of items across all pages. If query parameters\
            \ are used to filter the result set, this is the total of the collection\
            \ result set, not of the entire collection."
        first:
          type: string
          format: uri
          description: Absolute URI to the first page
        last:
          type: string
          format: uri
          description: Absolute URI to the last page
        prev:
          type: string
          format: uri
          description: Absolute URI to the previous page
        next:
          type: string
          format: uri
          description: Absolute URI to the next page
    RenewResponse:
      type: object
      properties:
        requested:
          type: boolean
          default: false
          description: true if the credential is asked for renew from the participant
          example: false
        timestamp:
          type: string
          format: date-time
          description: timestamp when the renewal request by the participant is made
          example: 2025-01-31T17:32:28Z
      required:
      - requested
    CredentialDetailResponse:
      allOf:
      - $ref: "#/components/schemas/CredentialResponse"
      - type: object
        required:
        - participant
    Participant:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: participant unique identifier in the dataspace
          example: 26fa5d4f-ff89-490d-ba3e-fac0a33cb26f
        organization:
          type: string
          description: the organization represented by the participant
          example: ACME Corp
          maxLength: 255
        tierOnePublicKey:
          type: string
          description: the tier 1 public key of the participant
          example: "-----BEGIN PUBLIC KEY-----      \nMFUwEwYHKoZIzj0CAQYIKoZIzj0DAQQDPgAEb2Rysur9oTJVtptNNoGsHOMXW30h\n\
            GAm9FiybDpmsXsdrW1zsxSu+bBCBM8wUpemGx5H2Eb2p247dxam1\n-----END PUBLIC\
            \ KEY-----\n"
        applicantEmail:
          type: string
          format: email
          example: applicant@email.com
        credential:
          $ref: "#/components/schemas/CredentialResponse"
        isAuthority:
          type: boolean
          description: whether the participant is an authority in the dataspace
          example: false
        creationTimestamp:
          type: string
          format: date-time
          description: participant creation timestamp
          example: 2025-01-20T17:32:28Z
        updateTimestamp:
          type: string
          format: date-time
          description: participant last update timestamp
          example: 2025-01-22T17:32:28Z
    IdentityAttribute:
      type: object
      example:
        code: CONSUMER
        name: Consumer
        creationTimestamp: 2000-01-23T04:56:07.000+00:00
        description: Identity attribute used for tagging an end user able to act as
          a user of a data consumer participant (can start contract and transfer process)
        assignableToRoles: true
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        used: true
        right: true
        enabled: true
        builtIn: true
        updateTimestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          type: string
          format: uuid
          description: the unique UUID identifier of the identity attribute
        code:
          type: string
          description: the unique code identifying the identity attribute
          maxLength: 255
        name:
          type: string
          description: the human readable name of the identity attribute
          maxLength: 255
        description:
          type: string
          description: the human readable description of the identity attribute
          maxLength: 255
        assignableToRoles:
          type: boolean
          description: boolean stating if the identity attribute can be assigned to
            a role
        enabled:
          type: boolean
          description: boolean flag stating if the identity attribute is enabled
        creationTimestamp:
          type: string
          format: date-time
          description: the creation timestamp of the identity attribute in ISO 8601
            format
        updateTimestamp:
          type: string
          format: date-time
          description: the update timestamp of the identity attribute in ISO 8601
            format
        used:
          type: boolean
          description: boolean saying if the identity attribute is assigned to at
            least a participant
          readOnly: true
        right:
          type: boolean
          description: boolean stating if the identity attribute represent a legal
            right
          readOnly: true
        builtIn:
          type: boolean
          description: boolean stating if the identity attribute is built-in an therefore
            cannot be created modified or deleted
          readOnly: true
      required:
      - assignableToRoles
      - code
      - enabled
      - name
    CredentialResponse:
      allOf:
      - $ref: "#/components/schemas/Credential"
      - type: object
        required:
        - content
        - credentialId
        - expiryDate
        - issuanceDate
        - lastStatusChangeDate
        - status
    Credential:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/CredentialStatus"
        lastStatusChangeDate:
          type: string
          format: date-time
          description: Timestamp of the last change of status for the credential.
        issuanceDate:
          type: string
          format: date-time
          description: Timestamp when the credential is issued.
        expiryDate:
          type: string
          format: date-time
          description: Timestamp when the credential is expiring.
        credentialId:
          type: string
          description: public key hash (sha384) bound to the credential
          example: zPPJ4TbEd8xNJPkdmePpAsamcKEQf8nxAMa7vw58Fc7eEtAzMrRDLA4oWNETGzrpcwsoQ5GwnEFhpeLxrYyV1gC1LnVXt1KBMM
          maxLength: 64
        content:
          type: string
          description: The credential (x.509 certificate in PEM format)
          example: |
            -----BEGIN CERTIFICATE-----
            MIIC+TCCAmKgAwIBAgIBADANBgkqhkiG9w0BAQUFADCB...
            -----END CERTIFICATE-----
        participant:
          $ref: "#/components/schemas/ParticipantResponse"
  responses:
    BadRequest:
      description: "Bad request, invalid input data"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            badRequest:
              summary: Bad Request
              value:
                type: urn:problem-type:simpl:badRequest
                title: Bad request
                detail: Invalid input data
                status: 400
    MissingTier2Credential:
      description: "Unauthorized, the caller did not provide the tier two credential\
        \ to identify itself"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            unauthorized:
              summary: Missing Tier 2 Credential
              value:
                type: urn:problem-type:simpl:missingTier2Credential
                title: Missing Tier 2 Credential
                detail: Tier 2 Credential is missing
                status: 401
    InternalServerError:
      description: "Internal Server Error, an internal server error occurred"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            internalServerError:
              summary: Internal Server Error
              value:
                type: urn:problem-type:simpl:internalServerError
                title: Internal Server Error
                detail: Internal Server Error
                status: 500
    Unauthorized:
      description: "Unauthorized, the user is not authenticated"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            unauthorized:
              summary: Unauthorized
              value:
                type: urn:problem-type:simpl:unauthorized
                title: Unauthorized
                detail: The user is not authenticated
                status: 401
    Forbidden:
      description: "Forbidden, the user does not have the roles to perform the operation"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            forbidden:
              summary: Forbidden
              value:
                type: urn:problem-type:simpl:forbidden
                title: Forbidden
                detail: The user does not have the roles to perform the operation
                status: 403
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            notFound:
              summary: Not Found
              value:
                type: urn:problem-type:simpl:notFound
                title: Not Found
                detail: Resource not found
                status: 404
  securitySchemes:
    mtls:
      type: http
      description: SIMPL Tier 2 mTLS authentication process
      scheme: mutual
    mtlsWithEphemeralProof:
      type: http
      description: SIMPL Tier 2 mTLS authentication process with Ephemeral Proof exchange
      scheme: mutual