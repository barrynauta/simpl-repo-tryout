openapi: 3.0.1
info:
  title: Authentication Provider
  description: OpenAPI definition for the Authentication Provider component of the
    SIMPL project
  contact:
    name: Simpl Programme
    url: https://simpl-programme.ec.europa.eu/
    email: cnect-simpl@ec.europa.eu
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  version: 1.5.0
servers:
- url: https://localhost:8085/v1
  description: authenticationprovider
security:
- mtls: []
- mtlsWithEphemeralProof: []
- oauth2AuthCode: []
- oauth2ClientCredentials: []
tags:
- name: Keypairs
  description: API for managing Keypairs
- name: Certificate Sign Requests
  description: API for managing Certificate Sign Requests
paths:
  /keypairs:
    get:
      tags:
      - Keypairs
      summary: Get installed Key Pair
      description: ONBOARDER_M user get the public/private Key Pair
      operationId: getInstalledKeyPair
      responses:
        "200":
          description: Key Pair successfully retrieved. The response body contains
            the details of the requested KeyPair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyPair"
              examples:
                default:
                  summary: Default example
                  value:
                    privateKey: 9JFtFuN0RSnxnkMlOZbnrYZfFfFThhsGhI6/F9kXNAk=
                    publicKey: L87PbSJyrfjZcVVShgTLSnAfWVR/dCTgC1GckbQhGXc=
        "404":
          $ref: "#/components/responses/NotFound"
      deprecated: true
      security:
      - oauth2ClientCredentials: []
      x-deprecation-info:
        replacements:
        - POST /tier1/v2/keypairs/active
        reason: Changes in response data due to credentials handling revise
    post:
      tags:
      - Keypairs
      summary: Import Key Pair
      description: ONBOARDER_M user import a public/private Key Pair and store it
        to database
      operationId: importKeyPair
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportKeyPair"
            examples:
              default:
                summary: Default example
                value:
                  privateKey: 9JFtFuN0RSnxnkMlOZbnrYZfFfFThhsGhI6/F9kXNAk=
                  publicKey: L87PbSJyrfjZcVVShgTLSnAfWVR/dCTgC1GckbQhGXc=
        required: true
      responses:
        "204":
          description: Key Pair generate and stored successfully
          x-microcks-refs:
          - default
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
      x-deprecation-info:
        replacements:
        - POST /tier1/v2/keypairs/import
        reason: Changes in response data due to credentials handling revise
    head:
      tags:
      - Keypairs
      summary: Keypair Exists
      description: ONBOARDER_M checks whether a public/private Key Pair is stored
        in the database
      operationId: existsKeypair
      responses:
        "200":
          description: KeyPair is present
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
      x-deprecation-info:
        replacements:
        - HEAD /tier1/v2/keypairs/active
        reason: Changes in response data due to credentials handling revise
  /keypairs/generate:
    post:
      tags:
      - Keypairs
      summary: Generate Key Pair
      description: ONBOARDER_M user generate a public/private Key Pair and store it
        to database
      operationId: generateKeyPair
      responses:
        "204":
          description: Key Pair generate and stored successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
      x-deprecation-info:
        replacements:
        - GET /tier1/v2/keypairs
        reason: Changes in response data due to credentials handling revise
  /csr/generate:
    post:
      tags:
      - Certificate Sign Requests
      summary: Generates the CSR for the applicant participant
      description: Generates the CSR for the applicant participant
      operationId: generateCSR
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DistinguishedName"
            examples:
              default:
                summary: Default example
                value:
                  commonName: Organization Name
                  country: EU
                  organization: Organization Name
                  organizationalUnit: Organizational Unit
        required: true
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
              example: "[binary data]"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
      x-deprecation-info:
        replacements:
        - "POST /tier1/v2/keypairs/{keyPairId}/csr"
        reason: Changes in response data due to credentials handling revise
  /agent/ping:
    get:
      tags:
      - Agents
      summary: Ping a participant
      description: Pings a participant using the provided FQDN and returns identity
        attributes
      operationId: pingAgent
      parameters:
      - name: fqdn
        in: query
        description: Fully Qualified Domain Name of the participant
        required: true
        style: form
        explode: true
        schema:
          type: string
        examples:
          default:
            summary: Default example
            value: t2.participant.dev.simpl-europe.eu
      responses:
        "200":
          description: Successfully pinged the participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiteParticipantWithIdentityAttributes"
              examples:
                default:
                  summary: Default example
                  value:
                    expiryDate: 2000-01-23T04:56:07.000+00:00
                    organization: Organization Name
                    participantType: CONSUMER
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    credentialId: w/dQ6cq/hWkZ6lS6Ika0xF+LwN8fbhTYHygR3RChZz59ldkCAJPvyWqFjm4/6Foh
                    id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    identityAttributes:
                    - code: CONSUMER
                      name: Consumer
                      creationTimestamp: 2000-01-23T04:56:07.000+00:00
                      description: Identity attribute used for tagging an end user
                        able to act as a user of a data consumer participant (can
                        start contract and transfer process)
                      assignableToRoles: true
                      id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                      used: true
                      right: true
                      enabled: true
                      updateTimestamp: 2000-01-23T04:56:07.000+00:00
                    - code: DATA_SEARCHER
                      name: Data searcher
                      creationTimestamp: 2000-01-23T04:56:07.000+00:00
                      description: "Identity Attributes used for tagging an end user\
                        \ able to act only as a searcher in the catalogue, but he\
                        \ can't start a contract negotiation or transfer process"
                      assignableToRoles: true
                      id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                      used: true
                      right: true
                      enabled: true
                      updateTimestamp: 2000-01-23T04:56:07.000+00:00
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
        "400":
          description: Invalid FQDN provided
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                summary: Invalid FQDN
                value:
                  type: urn:problem-type:simpl:invalidFqdn
                  title: Invalid FQDN
                  detail: Invalid FQDN provided
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - SIMPL_USER
      x-deprecation-info:
        replacements:
        - GET /tier1/v2/ping
        reason: Changes in response data due to credentials handling revise
  /agent/identityAttributes:
    get:
      tags:
      - Agents
      summary: Get identity attributes with ownership
      description: Returns a list of identity attributes with ownership details
      operationId: getIdentityAttributesWithOwnership
      responses:
        "200":
          description: Successfully retrieved identity attributes with ownership
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdentityAttributeWithOwnership"
              examples:
                default:
                  summary: Default example
                  value:
                  - code: CONSUMER
                    name: Consumer
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    description: Identity attribute used for tagging an end user able
                      to act as a user of a data consumer participant (can start contract
                      and transfer process)
                    assignableToRoles: true
                    id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    used: true
                    right: true
                    enabled: true
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
                    assignedToParticipant: true
                  - code: CONSUMER
                    name: Consumer
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    description: Identity attribute used for tagging an end user able
                      to act as a user of a data consumer participant (can start contract
                      and transfer process)
                    assignableToRoles: true
                    id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    used: true
                    right: true
                    enabled: true
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
                    assignedToParticipant: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - T1UAR_M
      x-deprecation-info:
        replacements:
        - GET /tier1/v2/identityAttributes
        reason: Changes in response data
  /agent/identityAttributes/{credentialId}:
    get:
      tags:
      - Agents
      summary: Get identity attributes with ownership
      description: Returns a list of identity attributes with ownership details
      operationId: getParticipantIdentityAttributes
      parameters:
      - name: credentialId
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
        examples:
          default:
            summary: Default example
            value: GWSxr+Iz2Mm5W/6Zn/wumQF6lG6nuPyzKPOnMX+8q9+jRBNvDaPLbb2VLdHEqyA+
      responses:
        "200":
          description: Successfully retrieved identity attributes with ownership
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IdentityAttribute"
              examples:
                default:
                  summary: Default example
                  value:
                  - code: CONSUMER
                    name: Consumer
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    description: Identity attribute used for tagging an end user able
                      to act as a user of a data consumer participant (can start contract
                      and transfer process)
                    assignableToRoles: true
                    id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    used: true
                    right: true
                    enabled: true
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
                  - code: CONSUMER
                    name: Consumer
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    description: Identity attribute used for tagging an end user able
                      to act as a user of a data consumer participant (can start contract
                      and transfer process)
                    assignableToRoles: true
                    id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    used: true
                    right: true
                    enabled: true
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - T1UAR_M
      x-deprecation-info:
        replacements: []
        reason: participant attributes are managed internally by authentication provider
  /agent/echo:
    get:
      tags:
      - Agents
      summary: Get echo information
      description: Returns echo information including connection and MTLS status
      operationId: echo
      responses:
        "200":
          description: Successfully retrieved echo information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Echo"
              examples:
                default:
                  summary: Default example
                  value:
                    mtlsStatus: SECURED
                    participantType: CONSUMER
                    userIdentityAttributes:
                    - DATA_PROVIDER
                    - DATA_PROVIDER_PUBLISHER
                    identityAttributes:
                    - code: CONSUMER
                      name: Consumer
                      creationTimestamp: 2000-01-23T04:56:07.000+00:00
                      description: Identity attribute used for tagging an end user
                        able to act as a user of a data consumer participant (can
                        start contract and transfer process)
                      assignableToRoles: true
                      id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                      used: true
                      right: true
                      enabled: true
                      updateTimestamp: 2000-01-23T04:56:07.000+00:00
                    - code: DATA_SEARCHER
                      name: Data searcher
                      creationTimestamp: 2000-01-23T04:56:07.000+00:00
                      description: "Identity Attributes used for tagging an end user\
                        \ able to act only as a searcher in the catalogue, but he\
                        \ can't start a contract negotiation or transfer process"
                      assignableToRoles: true
                      id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                      used: true
                      right: true
                      enabled: true
                      updateTimestamp: 2000-01-23T04:56:07.000+00:00
                    updateTimestamp: 2000-01-23T04:56:07.000+00:00
                    expiryDate: 2000-01-23T04:56:07.000+00:00
                    organization: Organization Name
                    connectionStatus: CONNECTED
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    credentialId: w/dQ6cq/hWkZ6lS6Ika0xF+LwN8fbhTYHygR3RChZz59ldkCAJPvyWqFjm4/6Foh
                    id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    email: user@email.com
                    username: user_12345
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - SIMPL_USER
      x-deprecation-info:
        replacements:
        - GET /tier1/v2/echo
        reason: Changes in response data due to credentials handling revise
  /agent/ephemeralProof:
    get:
      tags:
      - Agents
      summary: Request ephemeral proof from authority
      description: Request an ephemeral proof from the authority that can be used
        to connect with other agents into the dataspace
      operationId: requestEphemeralProofFromAuthority
      responses:
        "200":
          description: The Dataspace Governance Authority successfully issued an ephemeral
            proof to this agent
          content:
            application/json:
              schema:
                type: string
              example: |
                IxvaN4ER-PlPgLYzfRhk_JiY4VAow3GNjaK5rYCINFsEPa7VaYnRsaCmQVq8CTgddihEPPXe
                t2laH8_c3WqxY4AeZO5eljwSCobCHzxYdOoFKbpNXIm7dqHg_5xpQz-YBJMiDM1ILOEsER8A
                DyF4NC2sN0K_0t6xZLSAQIRrHvpGOrtYr5E-SllTWHWPmqCkX2BUZxoYNK2FWgQZpuUOD55H
                fsvFXNVQa_5TFRDibi9LsT7Sd_az0iGB0TfAb0v3ZR0qnmgyp5pTeIeU5UqhtbgU9RnUCVmG
                IK-SZYNvrlXgv9hiKAZGhLgeI8hO40utfT2YTYHgD2Aiufqo3RIbJA
        "500":
          $ref: "#/components/responses/InternalServerError"
      deprecated: true
      security:
      - oauth2ClientCredentials: []
      x-deprecation-info:
        replacements:
        - GET /tier1/v2/ephemeralProof
        reason: Changes in response data
  /agent/credentials/validate:
    post:
      tags:
      - Agents
      summary: Validates a counterpart credential
      description: Checks if a counterpart credentials is valid in the Dataspace
      operationId: validateCredential
      requestBody:
        content:
          application/x-pem-file:
            schema:
              type: string
              description: The credential (x.509 certificate in PEM format)
            examples:
              default:
                summary: Default example
                value: |
                  -----BEGIN CERTIFICATE-----
                  MIIC+TCCAmKgAwIBAgIBADANBgkqhkiG9w0BAQUFADCB...
                  -----END CERTIFICATE-----
        required: true
      responses:
        "204":
          description: Certificate is valid.
          x-microcks-refs:
          - default
        "400":
          description: Invalid certificate
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                invalidCredential:
                  summary: Invalid Credential
                  description: 'Generic error stating that the credential is not valid. '
                  value:
                    type: /error/invalid-credential
                revoked:
                  summary: Credential Revoked
                  description: The credential is valid but has been revoked (e.g.
                    OCSP revocation for x.509 certificates)
                  value:
                    type: /error/credential-revoked
      deprecated: true
      security:
      - oauth2ClientCredentials: []
      x-deprecation-info:
        replacements:
        - POST /tier1/v2/credentials/validate
        reason: Changes in response data due to credentials handling revise
  /credentials:
    get:
      tags:
      - Credentials
      summary: Replaces hasCredential. Returns the participant's credentials' information.
      description: "Returns the public participant's credentials' information, i.e.\
        \ the participant id, the credential id and the public key"
      operationId: getCredential
      parameters:
      - name: checkStatus
        in: query
        description: "If false, the credential validity check is not performed"
        required: false
        style: form
        explode: true
        schema:
          type: boolean
          default: true
        examples:
          default:
            summary: Default example
            value: false
      responses:
        "200":
          description: Successfully retrieve credential information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
              examples:
                default:
                  summary: Default example
                  value:
                    participantId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    expiryDate: 2000-01-23T04:56:07.000+00:00
                    credentialId: w/dQ6cq/hWkZ6lS6Ika0xF+LwN8fbhTYHygR3RChZz59ldkCAJPvyWqFjm4/6Foh
                    publicKey: xLLPYLEhSZqtOCGSubdLlw==
                    lastStatusChangeDate: 2000-01-23T04:56:07.000+00:00
                    status: VALID
        "404":
          $ref: "#/components/responses/NotFound"
      deprecated: true
      security: []
      x-deprecation-info:
        replacements:
        - GET /tier1/v2/credentials/active
        reason: Changes in response data due to credentials handling revise
    post:
      tags:
      - Credentials
      summary: Upload a credential file
      description: Uploads a credential file to the server and returns the ID of the
        uploaded credential
      operationId: uploadCredential
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadCredentialRequest"
            examples:
              default:
                summary: Default example
                value:
                  credential: "[binary content]"
        required: true
      responses:
        "201":
          description: Successfully uploaded credential
          content:
            application/json:
              schema:
                type: integer
                format: int64
                description: The id of the uploaded credential
              examples:
                default:
                  summary: Default example
                  value: 12345
        "400":
          description: Invalid file format
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                summary: Invalid file format
                value:
                  type: urn:problem-type:simpl:invalidFileFormat
                  title: Invalid file format
                  detail: Invalid file format
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
      x-deprecation-info:
        replacements:
        - POST /tier1/v2/credentials
        reason: Changes in response data due to credentials handling revise
    delete:
      tags:
      - Credentials
      summary: Delete the credential
      description: Deletes the existing credential from the server
      operationId: delete
      responses:
        "204":
          description: Successfully deleted credential
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
      x-deprecation-info:
        replacements: []
        reason: end user manages credentials differently in v2
  /credentials/download:
    get:
      tags:
      - Credentials
      summary: Download the participant's credential
      description: Download the participant's credential
      operationId: downloadInstalledCredentials
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
              example: "[binary data]"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      deprecated: true
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - SIMPL_USER
      x-deprecation-info:
        replacements:
        - GET /tier1/v2/credentials/active
        reason: Changes in response data due to credentials handling revise
  /mtls/ping:
    get:
      tags:
      - Mtls
      summary: Ping the participant
      description: Performs a ping operation to check the participant's status using
        its credential id
      operationId: ping
      parameters:
      - name: Credential-Id
        in: header
        description: The Public Key Hash of the participant
        required: true
        style: simple
        explode: false
        schema:
          type: string
        examples:
          default:
            summary: Default example
            value: zPPJ4TbEd8xNJPkdmePpAsamcKEQf8nxAMa7vw58Fc7eEtAzMrRDLA4oWNETGzrpcwsoQ5GwnEFhpeLxrYyV1gC1LnVXt1KBMM
      responses:
        "200":
          description: Successfully pinged the participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantWithIdentityAttributes"
              examples:
                default:
                  summary: Default example
                  value:
                    expiryDate: 2000-01-23T04:56:07.000+00:00
                    organization: Organization Name
                    participantType: CONSUMER
                    creationTimestamp: 2000-01-23T04:56:07.000+00:00
                    credentialId: w/dQ6cq/hWkZ6lS6Ika0xF+LwN8fbhTYHygR3RChZz59ldkCAJPvyWqFjm4/6Foh
                    id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                    identityAttributes:
                    - code: CONSUMER
                      name: Consumer
                      creationTimestamp: 2000-01-23T04:56:07.000+00:00
                      description: Identity attribute used for tagging an end user
                        able to act as a user of a data consumer participant (can
                        start contract and transfer process)
                      assignableToRoles: true
                      id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
                      used: true
                      right: true
                      enabled: true
                      updateTimestamp: 2000-01-23T04:56:07.000+00:00
                    - code: DATA_SEARCHER
                      name: Data searcher
                      creationTimestamp: 2000-01-23T04:56:07.000+00:00
                      description: "Identity Attributes used for tagging an end user\
                        \ able to act only as a searcher in the catalogue, but he\
                        \ can't start a contract negotiation or transfer process"
                      assignableToRoles: true
