    PageRequest:
      type: object
      properties:
        page:
          type: integer
          default: 0
          description: the index of page to be retrieved
        pageSize:
          type: integer
          default: 10
          description: maximum number of items per page desired by client
    SortRequest:
      type: object
      properties:
        sort:
          type: array
          description: "Multi-value query param with list of properties to sort on.\
            \ Direction is ascending by default. To indicate descending, prefix property\
            \ with -."
          items:
            type: string
            description: a sorting policy
    PageResponse:
      type: object
      properties:
        self:
          type: string
          format: uri
          description: Absolute URI to the resource's own location.
        pageSize:
          type: integer
          description: "Maximum number of items per page. For the last page, its value\
            \ should be independent of the number of actually returned items."
        page:
          type: integer
          description: "Index of the current page of items, should be 1-based (the\
            \ default and first page is 1)"
        total:
          type: integer
          description: "Total number of items across all pages. If query parameters\
            \ are used to filter the result set, this is the total of the collection\
            \ result set, not of the entire collection."
        first:
          type: string
          format: uri
          description: Absolute URI to the first page
        last:
          type: string
          format: uri
          description: Absolute URI to the last page
        prev:
          type: string
          format: uri
          description: Absolute URI to the previous page
        next:
          type: string
          format: uri
          description: Absolute URI to the next page
    KeyPair:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of the keypair
        name:
          type: string
          description: Human readable keypair name
          example: my keypair
          maxLength: 255
        active:
          type: boolean
          default: false
          description: the keypair bound to the installed credentials (if any)
        publicKey:
          type: string
          description: public key (in PEM format)
          example: |
            -----BEGIN PUBLIC KEY-----
            MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEn6Htd4aaqQ2fmKLhuCz0aLKha31P
            XGMddh8bvMUPFGnUT1ZcRBh+323bzbnu4hZsToMYdYLwz6fOM3C07eiMeA==
            -----END PUBLIC KEY-----
        creationTimestamp:
          type: string
          format: date-time
          description: RFC3339 timestamp of creation
    CredentialStatus:
      type: string
      description: |
        The status of the credential:<br> - **Valid**: The credential is valid and usable.<br> - **Expired**: The credential has expired.<br> - **Revoked**: The credential is permanently revoked and no longer usable.<br> - **Suspended**: The credential is temporarily revoked and may transition back to valid.<br>
      enum:
      - VALID
      - EXPIRED
      - REVOKED
      - SUSPENDED
    CredentialByKeyPairResponse:
      allOf:
      - $ref: "#/components/schemas/Credential"
      - type: object
        required:
        - content
        - credentialId
        - expiryDate
        - issuanceDate
        - status
    IdentityAttributeResponse:
      allOf:
      - $ref: "#/components/schemas/IdentityAttribute"
      - type: object
        required:
        - active
        - creationTimestamp
        - id
        - name
        - publicKey
    Credential:
      allOf:
      - $ref: "#/components/schemas/CredentialContent"
      - type: object
        properties:
          status:
            $ref: "#/components/schemas/CredentialStatus"
          issuanceDate:
            type: string
            format: date-time
            description: Timestamp when the credential is issued.
          expiryDate:
            type: string
            format: date-time
            description: Timestamp when the credential is expiring.
          credentialId:
            type: string
            description: public key hash (sha384) bound to the credential
            example: zPPJ4TbEd8xNJPkdmePpAsamcKEQf8nxAMa7vw58Fc7eEtAzMrRDLA4oWNETGzrpcwsoQ5GwnEFhpeLxrYyV1gC1LnVXt1KBMM
            maxLength: 64
