  /keypairs/{keyPairId}/renew:
    post:
      tags:
      - Credentials
      summary: Request to Dataspace Governance Authority a credentials renewal
      description: "The participant requests a credentials renewal to Dataspace Participant,\
        \ receiving an acknowledge on the issued request. Only accessible by users\
        \ with the ONBOARDER_M role."
      operationId: requestCredentialsRenewal
      parameters:
      - name: keyPairId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        examples:
          distinguishedName:
            summary: a distinguished name
            value: 10503716-e76f-4ba8-81be-38203c50c6cc
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CsrRequest"
            examples:
              distinguishedName:
                summary: a distinguished name
                value: |
                  {
                    "commonName": "participant1",
                    "country": "IT",
                    "organization": "SIMPL",
                    "organizationalUnit": "IT Dep"
                  }
        required: true
      responses:
        "204":
          description: Renewal request issued correctly
          x-microcks-refs:
          - distinguishedName
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
