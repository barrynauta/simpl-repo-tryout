openapi: 3.0.1
info:
  title: Authentication Provider Tier 1
  description: Tier 1 OpenAPI definition for the Authentication Provider component
    of the SIMPL project
  contact:
    name: Simpl Programme
    url: https://simpl-programme.ec.europa.eu/
    email: cnect-simpl@ec.europa.eu
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  version: 2.0.0
servers:
- url: https://t1.authentication-provider.dev.simpl.eu/tier1/v2
  description: Tier1 Authentication Provider
security:
- oauth2ClientCredentials: []
tags:
- name: Keypairs
  description: Manage and store participant keypair securely
- name: Credentials
  description: API for managing participant's credentials
- name: Participants
  description: Retrieve information about the agent participant and other data space
    participants
- name: Identity Attributes
  description: Retrieve information about the dataspace Identity Attributes
- name: Tier 1 Credentials
  description: Validates the Tier 1 credentials of an end-user originating from an
    external participant.
- name: Automatic Renewals
  description: Allow setting and retrieving the automatic renewal configuration.
paths:
  /keypairs:
    get:
      tags:
      - Keypairs
      summary: List all keypairs
      description: "Lists the available keypairs stored in the agent. Each entry includes\
        \ the identifier, a vanity representation of the public key, if the keypair\
        \ is active in the agent (bound to the installed credentials) and creation\
        \ date. Only accessible by users with the ONBOARDER_M role."
      operationId: listKeypairs
      parameters:
      - name: filter
        in: query
        description: Keypairs listing filter
        required: false
        style: form
        explode: true
        schema:
          $ref: "#/components/schemas/KeyPairPagedRequest"
        examples:
          keyPairPagedRequest:
            summary: keypair listing filter
            value: |
              {
                "name": "keypair",
                "creationTimestampFrom": "2025-01-20T17:32:28Z",
                "creationTimestampTo": "2025-01-25T17:32:28Z",
                "page": 2,
                "pageSize": 2,
                "sort": [
                  "creationTimestamp"
                ]
              }
      responses:
        "200":
          description: List of keypairs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyPairPagedResponse"
              examples:
                keypairsDetail:
                  summary: keypairs list
                  value: |
                    {
                      "self": "/keypairs?name=keypair&creationTimestampFrom=2025-01-20T17:32:28Z&creationTimestampTo=2025-01-25T17:32:28Z&sort=creationTimestamp&page=2&pageSize=2",
                      "items": [
                        {
                          "name": "my keypair",
                          "creationTimestamp": "2025-01-23T04:56:07Z",
                          "active": false,
                          "id": "046b6c7f-0b8a-43b9-b35d-6489e6daee91",
                          "publicKey": "-----BEGIN PUBLIC KEY-----\nMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEn6Htd4aaqQ2fmKLhuCz0aLKha31P\nXGMddh8bvMUPFGnUT1ZcRBh+323bzbnu4hZsToMYdYLwz6fOM3C07eiMeA==\n-----END PUBLIC KEY-----",
                          "csr": "-----BEGIN CERTIFICATE REQUEST-----\nMIICxTCCAa0CAQAwTDELMAkGA1UEBhMCVVMxCzAJBgNVBAgMAkNBMQ8wDQYDVQQH\nDAZTYW5Kb3NlMRAwDgYDVQQKDAdNeUNvbXBhbnkxEDAOBgNVBAMMB215Y2VydC5j\nb20wggEiMA0GCSqGSIb3DQEBAQUAA4IBDwAwggEKAoIBAQC1hrWLEsw9vLkZCHdy\neWcX0Gbd7s0P1qgl2nTspN2bgoctW3gvQAKN7O8r9TFO7hXvvjF2HCEb41CSiFoE\nEgmSvVAOpMtCjMdFctvX3MCABGHYLU5nImLZhTMRdflyoTRJz25uq5hYrfmBdzP4\nnZn4QuYp+h6pRZ07Plq+URrIF4E/c+0N9rwleAVoY9Frn/vwopAhv8l0U6AypS8S\nBlBfZ2MIUXgAWRA1T+n9lgv3X2snFnSxrUqbi4tSPcJDk+7ZcS9M1QetKnPB6ROZ\n1f7xVylTbQ8FzMMhJgNx+iRPLFffYp+iYzC80eTf65U7/ClfGBM4CfdI+TF0nNbf\nWruTAgMBAAGgADANBgkqhkiG9w0BAQsFAAOCAQEALSTjePZKeZspsx+CrcV+hH3u\nWh2gKfr8bA4arZGGzC5ovCfrcK6C6OUKkiVvP9ADv4g5iG0eFmcg2hZsmMJex8sH\ny6x8zbiZ+T9hG66UZS04iEtUqMzjsSCpIWK97e2lZDHwV7Qgvc2sw8QvUnDj6e4D\ngpcEG3KGEp3XnYOBfHrkAfldz7NVyRftrF+y0kC8r/xLZzv9KKToWWAOyxlql2Qi\nKwbtWZAM7gA77RCRUtAhxD/kPlLM2YwQkh0QwRAxVIkKR82DbK90AcBuSmayPbjo\n3eXjfwtrCbb6UVfWn3xAAHYy46D5iFkkq6Y7mOCUNZ7X9uAIKzqJ12plAUoMBxkM\n9g==\n-----END CERTIFICATE REQUEST-----\n"
                        },
                        {
                          "name": "another keypair",
                          "creationTimestamp": "2025-01-24T13:00:00Z",
                          "active": true,
                          "id": "046b6c7f-0b8a-43b9-b35d-6489e6daee92",
                          "publicKey": "-----BEGIN PUBLIC KEY-----\nMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEn6Htd4aaqQ2fmKLhuCz0aLKha31P\nXGMddh8bvMUPFGnUT1ZcRBh+323bzbnu4hZsToMYdYLwz6fOM3C07eiMeB==\n-----END PUBLIC KEY-----"
                        }
                      ],
                      "pageSize": 2,
                      "page": 2,
                      "total": 7,
                      "first": "/keypairs?name=keypair&creationTimestampFrom=2025-01-20T17:32:28Z&creationTimestampTo=2025-01-25T17:32:28Z&sort=creationTimestamp&page=0&pageSize=2",
                      "last": "/keypairs?name=keypair&creationTimestampFrom=2025-01-20T17:32:28Z&creationTimestampTo=2025-01-25T17:32:28Z&sort=creationTimestamp&page=4&pageSize=2",
                      "prev": "/keypairs?name=keypair&creationTimestampFrom=2025-01-20T17:32:28Z&creationTimestampTo=2025-01-25T17:32:28Z&sort=creationTimestamp&page=1&pageSize=2",
                      "next": "/keypairs?name=keypair&creationTimestampFrom=2025-01-20T17:32:28Z&creationTimestampTo=2025-01-25T17:32:28Z&sort=creationTimestamp&page=3&pageSize=2"
                    }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
    post:
      tags:
      - Keypairs
      summary: Create a new keypair
      description: Generates a new public/private keypair and stores it securely in
        the agent. The private key is never exposed. Only accessible by users with
        the ONBOARDER_M role.
      operationId: createKeypair
      requestBody:
        description: The keypair request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyPairRequest"
            examples:
              keypairCreationRequest:
                summary: an agent internal keypair representation
                value: |
                  {
                    "name": "my keypair"
                  }
        required: true
      responses:
        "201":
          description: Keypair successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyPairResponse"
              examples:
                keypairCreationResponse:
                  summary: keypair creation response
                  value: |
                    {
                      "creationTimestamp": "2025-01-23T04:56:07Z",
                      "name": "my keypair",
                      "active": false,
                      "id": "046b6c7f-0b8a-43b9-b35d-6489e6daee91",
                      "publicKey": "-----BEGIN PUBLIC KEY-----\nMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEn6Htd4aaqQ2fmKLhuCz0aLKha31P\nXGMddh8bvMUPFGnUT1ZcRBh+323bzbnu4hZsToMYdYLwz6fOM3C07eiMeA==\n-----END PUBLIC KEY-----"
                    }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
  /keypairs/algorithm:
    get:
      tags:
      - Keypairs
      summary: Returns the current agent encryption algorithm selected for keypairs
      description: Returns the current agent encryption algorithm selected for keypairs
      operationId: getAgentEncryptionAlgorithm
      responses:
        "200":
          description: Agent keypairs encryption algorithm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentKeypairEncryptionAlgorithm"
              examples:
                encryptionAlgorithm:
                  summary: encryption algorithm
                  value: |
                    {
                      "readAlgorithm": "EC",
                      "keyLength": 256,
                      "signatureAlgorithm": "SHA256withECDSA",
                      "algorithm": "ECDSA"
                    }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
  /keypairs/active:
    get:
      tags:
      - Keypairs
      summary: Get active KeyPair
      description: Retrieve the active keypair (the one related to the installed credentials)
      operationId: getActiveKeyPair
      responses:
        "200":
          description: A complete keypair used inside the agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyPairDetailResponse"
              examples:
                completeKeypairDetail:
                  summary: an agent internal keypair representation
                  value: |
                    {
                      "name": "my keypair",
                      "privateKey": "-----BEGIN PRIVATE KEY-----\nMHcCAQEEIHo9LGqNGEL32AwY6FdN2gluG0O4JqKAnSmDhCtVJCQ7oAoGCCqGSM49\nAwEHoUQDQgAEn6Htd4aaqQ2fmKLhuCz0aLKha31PXGMddh8bvMUPFGnUT1ZcRBh+\n323bzbnu4hZsToMYdYLwz6fOM3C07eiMeA==\n-----END PRIVATE KEY-----\n",
                      "creationTimestamp": "2000-01-23T04:56:07.000+00:00",
                      "id": "046b6c7f-0b8a-43b9-b35d-6489e6daee91",
                      "publicKey": "-----BEGIN PUBLIC KEY-----\nMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEn6Htd4aaqQ2fmKLhuCz0aLKha31P\nXGMddh8bvMUPFGnUT1ZcRBh+323bzbnu4hZsToMYdYLwz6fOM3C07eiMeA==\n-----END PUBLIC KEY-----\n"
                    }
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2ClientCredentials: []
    head:
      tags:
      - Keypairs
      summary: Checks if the participant has an active KeyPair
      description: Check if the participant has an active keypair (the one related
        to the installed credentials).  Only accessible by users with the ONBOARDER_M
        role.
      operationId: isActiveKeyPairPresent
      responses:
        "204":
          description: An active keypair is installed in the agent
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
  /keypairs/import:
    post:
      tags:
      - Keypairs
      summary: Import Key Pair
      description: ONBOARDER_M user import a public/private Key Pair and store it
      operationId: importKeyPair
      requestBody:
        description: A complete keypair used inside the agent
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyPairImportRequest"
            examples:
              completeKeypairDetail:
                summary: an agent internal keypair representation
                value: |
                  {
                    "name": "my keypair",
                    "publicKey": "-----BEGIN PUBLIC KEY-----\nMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEn6Htd4aaqQ2fmKLhuCz0aLKha31P\nXGMddh8bvMUPFGnUT1ZcRBh+323bzbnu4hZsToMYdYLwz6fOM3C07eiMeA==\n-----END PUBLIC KEY-----\n",
                    "privateKey": "-----BEGIN PRIVATE KEY-----\nMHcCAQEEIHo9LGqNGEL32AwY6FdN2gluG0O4JqKAnSmDhCtVJCQ7oAoGCCqGSM49\nAwEHoUQDQgAEn6Htd4aaqQ2fmKLhuCz0aLKha31PXGMddh8bvMUPFGnUT1ZcRBh+\n323bzbnu4hZsToMYdYLwz6fOM3C07eiMeA==\n-----END PRIVATE KEY-----\n"
                  }
        required: true
      responses:
        "201":
          description: Keypair metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyPairResponse"
              examples:
                keypairDetail:
                  summary: a keypair detail
                  value: |
                    {
                      "name": "my keypair",
                      "id": "046b6c7f-0b8a-43b9-b35d-6489e6daee91",
                      "publicKey": "-----BEGIN PUBLIC KEY-----\nMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEn6Htd4aaqQ2fmKLhuCz0aLKha31P\nXGMddh8bvMUPFGnUT1ZcRBh+323bzbnu4hZsToMYdYLwz6fOM3C07eiMeA==\n-----END PUBLIC KEY-----",
                      "creationTimestamp": "2025-01-23T04:56:07.000+00:00",
                      "active": false
                    }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
  /keypairs/{keyPairId}:
    get:
      tags:
      - Keypairs
      summary: Retrieve keypair data by ID
      description: Retrieves information about a specific keypair using its identifier.
        Only accessible by users with the ONBOARDER_M role.
      operationId: getKeypair
      parameters:
      - name: keyPairId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        examples:
          keypairDetail:
            summary: a keypair detail
            value: 10503716-e76f-4ba8-81be-38203c50c6cc
      responses:
        "200":
          description: Keypair data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyPairResponse"
              examples:
                keypairDetail:
                  summary: a keypair detail
                  value: |
                    {
                      "name": "my keypair",
                      "id": "046b6c7f-0b8a-43b9-b35d-6489e6daee91",
                      "publicKey": "-----BEGIN PUBLIC KEY-----\nMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEn6Htd4aaqQ2fmKLhuCz0aLKha31P\nXGMddh8bvMUPFGnUT1ZcRBh+323bzbnu4hZsToMYdYLwz6fOM3C07eiMeA==\n-----END PUBLIC KEY-----",
                      "creationTimestamp": "2025-01-23T04:56:07.000+00:00",
                      "active": false,
                      "csr": "-----BEGIN CERTIFICATE REQUEST-----\nMIICxTCCAa0CAQAwTDELMAkGA1UEBhMCVVMxCzAJBgNVBAgMAkNBMQ8wDQYDVQQH\nDAZTYW5Kb3NlMRAwDgYDVQQKDAdNeUNvbXBhbnkxEDAOBgNVBAMMB215Y2VydC5j\nb20wggEiMA0GCSqGSIb3DQEBAQUAA4IBDwAwggEKAoIBAQC1hrWLEsw9vLkZCHdy\neWcX0Gbd7s0P1qgl2nTspN2bgoctW3gvQAKN7O8r9TFO7hXvvjF2HCEb41CSiFoE\nEgmSvVAOpMtCjMdFctvX3MCABGHYLU5nImLZhTMRdflyoTRJz25uq5hYrfmBdzP4\nnZn4QuYp+h6pRZ07Plq+URrIF4E/c+0N9rwleAVoY9Frn/vwopAhv8l0U6AypS8S\nBlBfZ2MIUXgAWRA1T+n9lgv3X2snFnSxrUqbi4tSPcJDk+7ZcS9M1QetKnPB6ROZ\n1f7xVylTbQ8FzMMhJgNx+iRPLFffYp+iYzC80eTf65U7/ClfGBM4CfdI+TF0nNbf\nWruTAgMBAAGgADANBgkqhkiG9w0BAQsFAAOCAQEALSTjePZKeZspsx+CrcV+hH3u\nWh2gKfr8bA4arZGGzC5ovCfrcK6C6OUKkiVvP9ADv4g5iG0eFmcg2hZsmMJex8sH\ny6x8zbiZ+T9hG66UZS04iEtUqMzjsSCpIWK97e2lZDHwV7Qgvc2sw8QvUnDj6e4D\ngpcEG3KGEp3XnYOBfHrkAfldz7NVyRftrF+y0kC8r/xLZzv9KKToWWAOyxlql2Qi\nKwbtWZAM7gA77RCRUtAhxD/kPlLM2YwQkh0QwRAxVIkKR82DbK90AcBuSmayPbjo\n3eXjfwtrCbb6UVfWn3xAAHYy46D5iFkkq6Y7mOCUNZ7X9uAIKzqJ12plAUoMBxkM\n9g==\n-----END CERTIFICATE REQUEST-----\n"
                    }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
    delete:
      tags:
      - Keypairs
      summary: Delete a keypair by ID
      description: Deletes a specific keypair by ID if it is not currently used by
        an active credential. Only accessible by users with the ONBOARDER_M role.
      operationId: deleteKeypair
      parameters:
      - name: keyPairId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        examples:
          default:
            summary: Default example
            value: 10503716-e76f-4ba8-81be-38203c50c6cc
      responses:
        "204":
          description: Keypair successfully deleted
          x-microcks-refs:
          - default
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot delete keypair in use by an active credential
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                conflict:
                  summary: Conflict
                  value: |
                    {
                      "type": "urn:problem-type:simpl:conflict",
                      "status": 409,
                      "title": "conflict"
                    }
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-simpl-roles:
      - ONBOARDER_M
  /keypairs/{keyPairId}/credentials:
    get:
      tags:
      - Credentials
      summary: Retrieves the credentials given a KeyPair identifier
      description: Retrieves the credentials (including their status and expiration
        timestamp) given a KeyPair identifier. Only accessible by users with the ONBOARDER_M
        role.
      operationId: getCredentialsByKeypair
      parameters:
      - name: keyPairId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        examples:
          credentialsByKeyPairPagedRequest:
            summary: credentials by keypair listing filter
            value: 10503716-e76f-4ba8-81be-38203c50c6cc
      - name: filter
        in: query
        description: Credentials by keypair listing filter
        required: false
        style: form
        explode: true
        schema:
          $ref: "#/components/schemas/CredentialsByKeyPairPagedRequest"
        examples:
          credentialsByKeyPairPagedRequest:
            summary: credentials by keypair listing filter
            value: |
              {
                "page": 2,
                "pageSize": 2,
                "sort": [
                  "issuanceDate"
                ],
                "issuanceDateFrom": "2025-01-20T00:00:00.000Z",
                "issuanceDateTo": "2025-01-30T00:00:00.000Z",
              }
      responses:
        "200":
          description: List of credentials by keypair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialsByKeyPairPagedResponse"
              examples:
                credentialsByKeyPairDetail:
                  summary: credentials by keypair list
                  value: |
                    {
                      "self": "/keypairs/046b6c7f-0b8a-43b9-b35d-6489e6daee92/credentials?issuanceDateFrom=2025-01-20T00:00:00.000Z&issuanceDateTo=2025-01-30T00:00:00.000Z&sort=issuanceDate&page=2&pageSize=2",
                      "items": [
                        {
                          "expiryDate": "2070-01-23T14:00:00.000Z",
