                  value:
                    set: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |
          return "automaticRenewal"
      x-simpl-roles:
      - ONBOARDER_M
    patch:
      tags:
      - Automatic Renewals
      summary: Set the automatic renewal configuration.
      description: "Edit, for the current participant, the automatic installation\
        \ of newer valid credentials, permitting automatic renewal from the participant.\
        \ Invokable by users with Tier 2 setup administration role (ONBOARDER_M)"
      operationId: updateAutomaticRenewal
      requestBody:
        description: The new automatic renewal configuration
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomaticRenewalConfiguration"
            examples:
              newAutomaticRenewalConfiguration:
                summary: a new automatic renewal configuration
                value:
                  set: true
        required: true
      responses:
        "202":
          description: The new automatic renewal configuration is set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomaticRenewalConfiguration"
              examples:
                automaticRenewal:
                  summary: automaticRenewal
                  value:
                    set: "{{request.body/set}}"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2AuthCode: []
      x-microcks-operation:
        dispatcher: JSON_BODY
        dispatcherRules: |
          {
            "exp": "/set",
            "operator": "regexp",
            "cases": {
              "true|false": "automaticRenewal",
              "default": "badRequest"
            }
          }
      x-simpl-roles:
      - ONBOARDER_M
components:
  schemas:
    KeyPairPagedRequest:
      allOf:
      - $ref: "#/components/schemas/PageRequest"
      - $ref: "#/components/schemas/SortRequest"
      - type: object
        properties:
          name:
            type: string
            description: Human readable keypair name
            example: keypair
          creationTimestampFrom:
            type: string
            format: date-time
            description: RFC3339 timestamp of creation
            example: 2025-01-20T17:32:28Z
          creationTimestampTo:
            type: string
            format: date-time
            description: RFC3339 timestamp of creation
            example: 2025-01-25T17:32:28Z
          active:
            type: boolean
    KeyPairPagedResponse:
      allOf:
      - $ref: "#/components/schemas/PageResponse"
      - type: object
        properties:
          items:
            type: array
            description: Elements in sliced search
            items:
              $ref: "#/components/schemas/KeyPairResponse"
    KeyPairRequest:
      allOf:
      - $ref: "#/components/schemas/KeyPair"
      - type: object
        required:
        - name
    KeyPairResponse:
      allOf:
      - $ref: "#/components/schemas/CsrResponse"
      - $ref: "#/components/schemas/KeyPair"
      - type: object
        required:
        - active
        - creationTimestamp
        - id
        - name
        - publicKey
    AgentKeypairEncryptionAlgorithm:
      type: object
      properties:
        signatureAlgorithm:
          type: string
          description: signature algorithm
          example: SHA256withECDSA
          maxLength: 255
        algorithm:
          type: string
          description: cryptographic algorithm
          example: ECDSA
          maxLength: 255
        keyLength:
          type: integer
          description: key length
          example: 256
        readAlgorithm:
          type: string
          description: cryptographic algorithm name for reading keypairs
          example: EC
          maxLength: 255
      required:
      - algorithm
      - keyLength
      - readAlgorithm
      - signatureAlgorithm
    KeyPairDetailResponse:
      allOf:
      - $ref: "#/components/schemas/KeyPairResponse"
      - type: object
        properties:
          privateKey:
            type: string
            description: private key (in PEM format)
            example: |
              -----BEGIN PRIVATE KEY-----
              MHcCAQEEIHo9LGqNGEL32AwY6FdN2gluG0O4JqKAnSmDhCtVJCQ7oAoGCCqGSM49
              AwEHoUQDQgAEn6Htd4aaqQ2fmKLhuCz0aLKha31PXGMddh8bvMUPFGnUT1ZcRBh+
              323bzbnu4hZsToMYdYLwz6fOM3C07eiMeA==
              -----END PRIVATE KEY-----
      - type: object
        required:
        - privateKey
    KeyPairImportRequest:
      allOf:
      - $ref: "#/components/schemas/KeyPairRequest"
      - type: object
        properties:
          privateKey:
            type: string
            description: private key (in PEM format)
            example: |
              -----BEGIN PRIVATE KEY-----
              MHcCAQEEIHo9LGqNGEL32AwY6FdN2gluG0O4JqKAnSmDhCtVJCQ7oAoGCCqGSM49
              AwEHoUQDQgAEn6Htd4aaqQ2fmKLhuCz0aLKha31PXGMddh8bvMUPFGnUT1ZcRBh+
              323bzbnu4hZsToMYdYLwz6fOM3C07eiMeA==
              -----END PRIVATE KEY-----
        required:
        - name
        - privateKey
        - publicKey
    Problem:
      type: object
      description: |
        A Problem Details object (RFC 9457).

        Additional properties specific to the problem type may be present.
      example:
        type: urn:problem-type:exampleOrganization:exampleProblem
        href: https://www.belgif.be/specification/rest/api-guide/#standardized-problem-types
        title: Description of the type of problem that occurred
        status: 400
        detail: Description of specific occurrence of the problem
        instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
      properties:
        type:
          type: string
          format: uri
          default: about:blank
          description: |
            An absolute URI that identifies the problem type.  When dereferenced,
            it SHOULD provide human-readable documentation for the problem type
            (e.g., using HTML).
          example: https://zalando.github.io/problem/constraint-violation
        title:
          type: string
          description: |
            A short, summary of the problem type. Written in english and readable
            for engineers (usually not suited for non technical stakeholders and
            not localized); example: Service Unavailable
        status:
          type: integer
          format: int32
          description: |
            The HTTP status code generated by the origin server for this occurrence
            of the problem.
          example: 503
          maximum: 600
          minimum: 100
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the
            problem.
          example: Connection to database timed out
        instance:
          type: string
          format: uri
          description: |-
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
    CredentialsByKeyPairPagedRequest:
