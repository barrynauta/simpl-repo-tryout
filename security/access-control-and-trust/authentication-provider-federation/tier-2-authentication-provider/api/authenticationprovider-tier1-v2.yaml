  /tierOneCredentials/validate:
    post:
      tags:
      - Tier 1 Credentials
      summary: Validates Tier 1 credential of an End-User during Tier2 communication
      description: "During Tier 2 communication, the calling participant invokes the\
        \ called participant via secure communication. \nThe Tier 1 credential (JWT)\
        \ of the user logged in in the calling participant can be propagated and sent\n\
        to the called participant. The called participant validates a received Tier\
        \ 1 credential upon the following flow:                  \n1. retrieve the\
        \ mTLS session information associated with the \"participant_id\" claim -\
        \ if no session is available, validation fails.\n2. verifies JWT signature\
        \ against the public key contained in the mTLS session information\n3. verify\
        \ that all the attributes contained in the claim \"identity_attributes\" are\
        \ coherent with the mTLS session information (contained in the ephemeral proof)\n"
      operationId: validateTierOneSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TierOneCredential"
            examples:
              default:
                summary: Default example
                value:
                  jwt: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
        required: true
      responses:
        "204":
          description: Tier 1 session validated successfully
          x-microcks-refs:
          - default
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
      - oauth2ClientCredentials: []
      x-microcks-operation:
        dispatcher: JSON_BODY
        dispatcherRules: |
          {
            "exp": "/jwt",
            "operator": "equals",
            "cases": {
              "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c": "default",
              "default": "badRequest"
            }
          }
  /automaticRenewal:
    get:
      tags:
      - Automatic Renewals
      summary: Retrieves the automatic renewal configuration.
      description: "Reads, for the current participant, the automatic installation\
        \ of newer valid credentials. Invokable by users with Tier 2 setup administration\
        \ role (ONBOARDER_M)"
      operationId: getAutomaticRenewal
      responses:
        "200":
          description: Automatic renewal configuration
          content:
