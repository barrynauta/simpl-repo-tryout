            value: 1
      - name: pageSize
        in: query
        description: maximum number of items per page desired by client
        required: false
        schema:
          $ref: "#/components/schemas/PageSizeQueryParam"
        examples:
          firstPage:
            summary: First page
            value: 10
          firstPageFilteredByCode:
            summary: First page filtered by code
            value: 10
          secondPageEmpty:
            summary: Second page empty
            value: 10
      - name: sort
        in: query
        description: "Multi-value query param with list of properties to sort on.\
          \ Direction is ascending by default. To indicate descending, prefix property\
          \ with -."
        required: false
        schema:
          $ref: "#/components/schemas/SortQueryParam"
        examples:
          firstPageSortedByCreationTimestampAsc:
            summary: First page sorted by creation timestamp asc
            value: creationTimestamp
          firstPageSortedByCreationTimestampDesc:
            summary: First page sorted by creation timestamp desc
            value: -creationTimestamp
      - name: code
        in: query
        description: the identity attribute code
        required: false
        schema:
          type: string
          maxLength: 255
        examples:
          firstPageFilteredByCode:
            summary: Default
            value: ACME_1
      - name: name
        in: query
        description: the identity attribute name
        required: false
        schema:
          type: string
          maxLength: 255
        examples:
          firstPageFilteredByName:
            summary: Default
            value: Acme 1
      - name: assignableToRoles
        in: query
