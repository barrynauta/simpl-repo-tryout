openapi: 3.0.1
security:
  - jwt: []
info:
  title: Eclipse XFSC Federated Catalogue
  description: REST API of the XFSC catalogue
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  contact:
    name: Simpl Programme
    email: cnect-simpl@ec.europa.eu
    url: https://simpl-programme.ec.europa.eu/
  version: 1.0.0
servers:
  - url: "https://fc-server.dev.simpl-europe.eu/v1"
    description: Configurable server

components:
  responses:
    NotFound:
      description: The specified resource was not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: urn:problem-type:simpl:resourceNotFound
            href: https://www.belgif.be/specification/rest/api-guide/problems/resourceNotFound.html
            title: Not Found
            status: 404
            detail: The requested resource was not found.
            instance: urn:uuid:123e4567-e89b-12d3-a456-426614174003
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: urn:problem-type:simpl:unauthorized
            href: https://www.belgif.be/specification/rest/api-guide/problems/unauthorized.html
            title: Unauthorized
            status: 401
            detail: The request lacks valid authentication credentials.
            instance: urn:uuid:123e4567-e89b-12d3-a456-426614174001
    Forbidden:
      description: >-
        Forbidden. The user does not have the permission to execute this
        request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: urn:problem-type:simpl:forbidden
            href: https://www.belgif.be/specification/rest/api-guide/problems/forbidden.html
            title: Forbidden
            status: 403
            detail: The authenticated user does not have permission to perform this operation.
            instance: urn:uuid:123e4567-e89b-12d3-a456-426614174002
    ServerError:
      description: >-
        May contain hints how to solve the error or indicate what went wrong at
        the server. Must not outline any information about the internal
        structure of the server.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: urn:problem-type:simpl:internalServerError
            href: https://www.belgif.be/specification/rest/api-guide/problems/internalServerError.html
            title: Internal Server Error
            status: 500
            detail: An unexpected error occurred on the server.
            instance: urn:uuid:123e4567-e89b-12d3-a456-426614174004
    ClientError:
      description: >-
        May contain hints how to solve the error or indicate what was wrong in
        the request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: urn:problem-type:simpl:badRequest
            href: https://www.belgif.be/specification/rest/api-guide/problems/badRequest.html
            title: Bad Request
            status: 400
            detail: The input message is incorrect. See error details for hints.
            instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
    Conflict:
      description: HTTP Conflict 409
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: urn:problem-type:simpl:conflict
            href: https://www.belgif.be/specification/rest/api-guide/problems/conflict.html
            title: Conflict
            status: 409
            detail: The resource already exists or conflicts with an existing resource.
            instance: urn:uuid:123e4567-e89b-12d3-a456-426614174005
    Unprocessible:
      description: HTTP Unprocessible Entity 422
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: urn:problem-type:simpl:unprocessableEntity
            href: https://www.belgif.be/specification/rest/api-guide/problems/unprocessableEntity.html
            title: Unprocessable Entity
            status: 422
            detail: The request content is semantically incorrect or violates business rules.
            instance: urn:uuid:123e4567-e89b-12d3-a456-426614174006
    NotAcceptable:
      description: Not Acceptable
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: urn:problem-type:simpl:notAcceptable
            href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/406
            title: Not Acceptable
            status: 406
            detail: Server cannot produce a response matching the list of acceptable values defined in the request's proactive negotiation headers.
            instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
    UnsupportedMediaType:
      description: Unsupported Media Type
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: urn:problem-type:simpl:unsupportedMediaType
            href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/415
            title: Unsupported Media Type
            status: 415
            detail: Server refused to accept the request because the message content format is not supported.
            instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
  schemas:
    Problem:
      description: |
        A Problem Details object (RFC 9457).
        Additional properties specific to the problem type may be present.
      type: object
      properties:
        type:
          type: string
          format: uri
          description: An absolute URI that identifies the problem type
        href:
          type: string
          format: uri
          description: An absolute URI that, when dereferenced, provides human-readable documentation for the problem type.
        title:
          type: string
          description: A short summary of the problem type.
        status:
          type: integer
          format: int32
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
          minimum: 400
          maximum: 600
          exclusiveMaximum: true
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
        instance:
          type: string
          format: uri
          description: An absolute URI that identifies the specific occurrence of the problem.
    Statement:
      type: object
      properties:
        statement:
          type: string
          example: Match (m:Movie) where m.released > 2000 RETURN m
        parameters:
          $ref: '#/components/schemas/Parameters'
      required:
        - statement
    #      discriminator:
    #        propertyName: type
    #        mapping:
    #          as: "#/components/schemas/AnnotatedStatement"
    Parameters:
      type: object
      additionalProperties:
        type: object
      example:
        name: "John"
        limit: 10
        offset: 5
    Result:
      type: object
      additionalProperties:
        type: object
    QueryLanguage:
      type: string
      enum:
        - OPENCYPHER
        - SPARQL
        - GRAPHQL
      default: OPENCYPHER
    AnnotatedStatement:
      allOf:
        - $ref: '#/components/schemas/Statement'
        - type: object
          properties:
            servers:
              type: array
              uniqueItems: true
              items:
                type: string
                description: known catalog servers already queried in distributed search scenario
            annotations:
              type: object
              additionalProperties:
                type: object
                description: additional properties to tune query execution
              example:
                queryLanguage: SPARQL
                timeout: 30
                withTotalCount: false
    VerificationResult:
      type: object
      properties:
        verificationTimestamp:
          type: string
          format : date-time
        lifecycleStatus: #!! is not known when verifying external SDs -> Julius: You are supposed to compute the status (active, invalid, etc.) from the available information. That is the result of the validation. Maybe rename to just status
          type: string # does the self-description have a lifecycle status in this catalogue?
          description: Lifecycle-state an SD would get, if it would be added to the catalogue.
        issuer: #!! Is this the participant? -> Julius: Yes, the participant that created the SD
          type: string # contains the id of the issuers self-description if available  #!! NOT FURTHER SPECIFIED
          description: ID of the issues Self-Description, if available.
        issuedDateTime:
          type: string
          format: date-time
        validatorDids:
          type: array
          items:
            type: string
            description: The dids of validators, having signed parts of the Self-Description
      required:
        - verificationTimestamp
        - lifecycleStatus #!! is not known when verifying external SDs. Remove from required -> Julius: You are supposed to compute the status (active, invalid, etc.) from the available information. That is the result of the validation. Maybe rename to just status
        - issuer #!! Comment on issuer: if available, but still required?? Remove from required -> Julius: required
        - issuedDateTime
        - validatorDids
    Participant:
      type: object
      properties:
        id:
          type: string
          description: Global ID of the participant
        name:
          type: string
        publicKey: #!! Can this be changed? If it is changed, are all SDs signed by the old key invalid? -> Julius: For the first version you can assume that SD go invalid when the TrustAnchor or participant key change
          type: string
        selfDescription:
          type: string
    User:
      type: object
      properties:
        participantId:
          type: string
          description: Global ID of the associated participant
          example: ExampleCompany
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        email:
          type: string
        roleIds:
          type: array
          items:
            $ref: '#/components/schemas/Role'
      required:
        - participantId
        - firstName
        - lastName
        - email
    UserProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            id:
              type: string
              description: Internal catalogue user id
              example: ExampleCompany-John-Doe
            username:
              type: string
              example: John Doe
          required:
            - id
            - username
    Role: #!! Changed Role from an object with a single String property to simply a String
      type: string
      example: Ro-MU-CA
    Session:
      type: object
      properties:
        userId:
          type: string
        creationDatetime:
          type: string
          format: date-time
        status: #!! What is a status?
          type: string
        #        seed: #!! We must have a seed to do pagination, user must be able to set it? -> Julius: ok
        #          type: string
        roleIds:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    SelfDescription:
      type: object
      properties:
        sdHash:
          type: string
        id: #!! Added id / credentialSubject
          type: string
        status:
          $ref: '#/components/schemas/SelfDescriptionStatus'
        issuer:
          type: string
        validatorDids:
          description: >-
            The credentialSubjects of the parties that validated (parts of) the
            Self-Description
          type: array
          items:
            type: string
        uploadDatetime:
          type: string
          format: date-time
          example: '2022-03-01T13:00:00Z'
          description: The time stamp (ISO8601) when the SD was uploaded.
        statusDatetime:
          type: string
          format: date-time
          example: '2022-05-11T15:30:00Z'
          description: >-
            The last time stamp (ISO8601) the status changed (for this
            Catalogue)
    SelfDescriptionStatus:
      type: string
      enum:
        - active
        - eol
        - deprecated
        - revoked
    SelfDescriptionResult:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/SelfDescription'
        content:
          type: string
    OntologySchema:
      type: object
      properties:
        ontologies:
          description: 'SchemaIds of ontologies, defining the terms of a schema'
          type: array
          items:
            type: string
            example: schemaId
        shapes:
          description: 'SchemaIds of shapes (SHACL Shapes Constraint Language) used to validate instances against the schema.'
          type: array
          items:
            type: string
            example: schemaId
        vocabularies:
          description: 'SchemaIds of controlled vocabularies used in the schema'
          type: array
          items:
            type: string
            example: schemaId
    ResultPage:
      type: object
      properties:
        totalCount:
          type: integer
    SelfDescriptions:
      allOf:
        - $ref: '#/components/schemas/ResultPage'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/SelfDescriptionResult'
    Participants:
      allOf:
        - $ref: '#/components/schemas/ResultPage'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Participant'
    UserProfiles:
      allOf:
        - $ref: '#/components/schemas/ResultPage'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/UserProfile'
    Results:
      allOf:
        - $ref: '#/components/schemas/ResultPage'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Result'
    WebhookEventType:
      type: string
      enum:
        - SchemaPublished
        - SchemaRevoked
      description: Type of schema lifecycle event
    SchemaCategoryStatus:
      type: string
      enum:
        - PUBLISHED
        - REVOKED
      description: Status of the schema in the catalogue
    EventDataSchema:
      type: object
      properties:
        name: 
          type: string
          description: Schema name
        uri:
          type: string
          description: Schema base URI
        title:
          type: string
        description:
          type: string
        resourceType:
          type: string
        status:
          $ref: '#/components/schemas/SchemaCategoryStatus'
      required:
        - uri
        - title
        - status
    EventDataVersion:
      type: object
      properties:
        uri:
          type: string
          description: Version-specific schema URI
        version:
          type: string
        changelog:
          type: string
        created:
          type: string
          format: date-time
    EventData:
      type: object
      properties:
        schema:
          $ref: '#/components/schemas/EventDataSchema'
        version:
          $ref: '#/components/schemas/EventDataVersion'
          description: Present for SchemaPublished; omitted for SchemaRevoked
      required:
        - schema
    SchemaChangeEvent:
      type: object
      description: Event payload sent by the Schema Manager when a schema is published or revoked
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier of the event
        eventType:
          $ref: '#/components/schemas/WebhookEventType'
        timestamp:
          type: string
          format: date-time
        data:
          $ref: '#/components/schemas/EventData'
      required:
        - eventId
        - eventType
        - timestamp
        - data
  parameters:
    OffsetParam:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      required: false
      description: The number of items to skip before starting to collect the result set.
    LimitParam:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
      required: false
      description: The number of items to return.
    OrderByParam:
      in: query
      name: orderBy
      schema:
        type: string
      required: false
      description: Results will be sorted by this field.
    AscendingParam:
      in: query
      name: ascending
      schema:
        type: boolean
        default: true
      required: false
      description: Ascending/Descending ordering.
    StatusParam:
      in: query
      name: status
      schema:
        type: array
        items:
          $ref: '#/components/schemas/SelfDescriptionStatus'
      explode: false
      required: false
      description: SelfDescription statuses
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
  - name: SelfDescriptions
    description: >-
      Retrieving Self-Descriptions from the Catalogue. All Self-Descriptions are
      JSON-LD files. They are referenced by their sha256 hash. Catalogues
      synchronize by downloading changesets (lists of hashes) from known other
      Catalogues and reading the full Self-Descriptions of entries that are
      unknown to them.
    externalDocs:
      description: Find out more
      url: http://gaiax.io
  - name: Query
    description: Send graph queries to this Catalogue.
  - name: Schemas
    description: >-
      The format of the self-descriptions are defined by schemas in the
      catalogue. Here you get information about the latest schema.
  - name: Verification
    description: The Catalogue provides a verification service for e.g. checking the syntax
  - name: Participants
    description: Participant Management operations
  - name: Users
    description: User Management operations
  - name: Roles
    description: Role Managemet operations
  - name: Session
    description: Management for auth sessions in the catalogue
  - name: Webhooks
    description: Inbound webhooks for schema lifecycle events from the Schema Manager
paths:
  /selfDescriptions:
    get:
      tags:
        - SelfDescriptions
      summary: Get the list of metadata of Self-Descriptions in the Catalogue
      operationId: readSelfDescriptions
      parameters: #!! Added filter parameters for all(?) metadata fields
        - name: uploadTimerange
          in: query
          description: >-
            Filter for the time range when the Self-Description was uploaded to
            the catalogue. The time range has to be specified as start time and
            end time as ISO8601 timestamp separated by a `/`.
          required: false
          example: 2022-03-01T13:00:00Z/2022-05-11T15:30:00Z
          schema:
            type: string
        - name: statusTimerange
          in: query
          description: >-
            Filter for the time range when the status of the Self-Description
            was last changed in the catalogue. The time range has to be
            specified as start time and end time as ISO8601 timestamp separated
            by a `/`.
          required: false
          example: 2022-03-01T13:00:00Z/2022-05-11T15:30:00Z
          schema:
            type: string
        - name: issuer
          in: query
          description: >-
            Filter for the issuer of the Self-Description. This is the unique ID
            of the Participant that has prepared the Self-Description.
          required: false
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: validatorDids
          in: query
          description: >-
            Filter for a validator of the Self-Description. This is the unique
            ID of the Participant that validated (part of) the Self-Description.
          required: false
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: status
          in: query
          description: Filter for the status of the Self-Description.
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/SelfDescriptionStatus'
          explode: false
        - name: id
          in: query
          description: Filter for a id/credentialSubject of the Self-Description.
          required: false
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: sdHash
          in: query
          description: Filter for a hash of the Self-Description.
          required: false
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: providedBy
          in: query
          description: Filter for Self-Descriptions by provider identifier from the providedBy field.
          required: false
          schema:
            type: array
            items:
              type: string
          explode: false
        - name: withMeta
          in: query
          description: To add Self-Description Metadata to response or not.
          required: false
          schema:
            type: boolean
            default: true
        - name: withContent
          in: query
          description: To add Self-Description Content to response or not.
          required: false
          schema:
            type: boolean
            default: false
        - name: offset
          in: query
          required: false
          description: The number of items to skip before starting to collect the result set.
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          required: false
          description: The number of items to return.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        '200':
          description: List of meta data of available Self-Descriptions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfDescriptions'
              example:
                totalCount: 1
                items:
                  - meta:
                      sdHash: "a3f8b2c1d4e5f67890abcdef1234567890abcdef1234567890abcdef12345678"
                      id: "did:web:registry.simpl-europe.eu:Participant:ExampleCompany"
                      status: active
                      issuer: "did:web:registry.simpl-europe.eu:Participant:ExampleCompany"
                      validatorDids:
                        - "did:web:registry.simpl-europe.eu:Participant:ValidatorOrg"
                      uploadDatetime: "2024-01-15T10:30:00Z"
                      statusDatetime: "2024-01-15T10:30:00Z"
                    content: '{"@context": "https://www.w3.org/2018/credentials/v1", "@type": "VerifiableCredential"}'
        '400':
          $ref: '#/components/responses/ClientError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
        '406':
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:notAcceptable
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/406
                title: Not Acceptable
                status: 406
                detail: Server cannot produce a response matching the list of acceptable values defined in the request's proactive negotiation headers.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
    post:
      tags:
        - SelfDescriptions
      summary: Add a new Service-Offering SelfDescription to the catalogue
      operationId: addSelfDescription
      requestBody:
        description: The new SelfDescription
        content:
          application/json:
            schema:
              type: string
            example: '{"@context": ["https://www.w3.org/2018/credentials/v1", "https://w3id.org/security/suites/jws-2020/v1"], "@type": "VerifiableCredential", "issuer": "did:web:registry.simpl-europe.eu:Participant:ExampleCompany", "credentialSubject": {"@id": "did:web:registry.simpl-europe.eu:DataOffering:example-offering-001", "@type": "simpl:DataOffering", "simpl:name": "Example Data Offering"}}'
        required: true
      responses:
        '201':
          description: Created
          headers:
            Location:
              description: URL of the added Self-Description.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfDescription'
              example:
                sdHash: "a3f8b2c1d4e5f67890abcdef1234567890abcdef1234567890abcdef12345678"
                id: "did:web:registry.simpl-europe.eu:Participant:ExampleCompany"
                status: active
                issuer: "did:web:registry.simpl-europe.eu:Participant:ExampleCompany"
                validatorDids:
                  - "did:web:registry.simpl-europe.eu:Participant:ValidatorOrg"
                uploadDatetime: "2024-01-15T10:30:00Z"
                statusDatetime: "2024-01-15T10:30:00Z"
        '202':
          description: The request was accepted but the validation is not finished yet.
          headers:
            Location:
              description: The URL of the status page.
              schema:
                type: string
            Retry-After:
              description: >-
                The delay the client have to wait before requesting the status
                page.
              schema:
                type: integer
        '400':
          $ref: '#/components/responses/ClientError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

        '406':
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:notAcceptable
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/406
                title: Not Acceptable
                status: 406
                detail: Server cannot produce a response matching the list of acceptable values defined in the request's proactive negotiation headers.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
        '415':
          description: Unsupported Media Type
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: urn:problem-type:simpl:unsupportedMediaType
                href: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Status/415
                title: Unsupported Media Type
                status: 415
                detail: Server refused to accept the request because the message content format is not supported.
                instance: urn:uuid:123e4567-e89b-12d3-a456-426614174000
  /selfDescriptions/resource:
    post:
      tags:
        - SelfDescriptions
      summary: Add a new Resource SelfDescription to the catalogue
      operationId: addResource
      requestBody:
        description: The new Resource SelfDescription
        content:
          application/json:
            schema:
              type: string
            example: '{"@context": ["https://www.w3.org/2018/credentials/v1", "https://w3id.org/security/suites/jws-2020/v1"], "@type": "VerifiableCredential", "issuer": "did:web:registry.simpl-europe.eu:Participant:ExampleCompany", "credentialSubject": {"@id": "did:web:registry.simpl-europe.eu:DataOffering:example-offering-001", "@type": "simpl:DataOffering", "simpl:name": "Example Data Offering"}}'
