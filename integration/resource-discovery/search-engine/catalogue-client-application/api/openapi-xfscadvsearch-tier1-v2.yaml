info:
  title: Catalog Search API
  description: |-
    These APIs enable the discovery of self-descriptions within a federated catalog, supporting two search modes: simple keyword-based search and advanced metadata-based search. They are designed to facilitate standardized, secure, and efficient access to data offering metadata in federated data ecosystems.

    ## Business Context

    The Catalog Search API enables consumers to discover and retrieve metadata about data offerings published by providers in a federated catalog. It supports both simple keyword-based and advanced structured search mechanisms, allowing for flexible and precise discovery of self-descriptions. It enables:

    1. Keyword-based and advanced metadata-based search of offerings.

    2. Retrieval of detailed self-descriptions in the form of Verifiable Credentials.

    3. Access to schema definitions for self-description creation and validation.

    ### Key Actors

    - **Consumer**: Searches the catalog, filters results, and retrieves detailed descriptions of data offerings.

    ### Typical Flow

    1. Perform a simple keyword search across the catalog.

    2. Execute an advanced search using structured metadata filters based on schema offer

    3. Retrieve a detailed self-description using its unique identifier.
  contact:
    name: Simpl Programme
    url: https://simpl-programme.ec.europa.eu/
    email: cnect-simpl@ec.europa.eu
  license:
    name: European Union Public License (EUPL) 1.2
    url: https://interoperable-europe.ec.europa.eu/sites/default/files/custom-page/attachment/eupl_v1.2_en.pdf
  version: "1.0"
servers:
- url: https://xfsc-advsearch-be.dev.simpl-europe.eu/v2
security:
- bearerAuth: []
openapi: 3.0.1
components:
  securitySchemes:
    bearerAuth:
      type: http
      description: IAA cloud gateway JWT token
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UnauthorizedProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        additionalProperties:
          type: object
          additionalProperties:
            type: object
    InternalServerErrorProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        additionalProperties:
          type: object
          additionalProperties:
            type: object
    NotFoundProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        additionalProperties:
          type: object
          additionalProperties:
            type: object
    NotAcceptableProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        additionalProperties:
          type: object
          additionalProperties:
            type: object
    InputObject:
      type: object
      properties:
        in:
          type: string
          enum:
          - body
          - path
          - query
          - header
        name:
          type: string
        value:
          type: object
    BadRequestProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        issues:
          type: array
          items:
            $ref: '#/components/schemas/InputValidationIssue'
        additionalProperties:
          type: object
          additionalProperties:
            type: object
    InputValidationIssue:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        detail:
          type: string
        in:
          type: string
          enum:
          - body
          - path
          - query
          - header
        name:
          type: string
        value:
          type: object
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/InputObject'
        additionalProperties:
          type: object
          additionalProperties:
            type: object
paths:
  /schemas/{schemaId}/content:
    get:
      tags:
      - Schema
      summary: Returns schema content based on schemaId
      description: Returns schema content for the specified schema identifier
      operationId: getSchemaContent
      parameters:
      - name: schemaId
        in: path
        description: Identifier of the TTL schema
        required: true
        schema:
          type: string
          description: Identifier of the schema
          example: data-offeringShape
        example: data-offeringShape
      responses:
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              example:
                type: urn:problem-type:simpl:badRequest
                title: Invalid payload
                status: 400
                detail: Invalid request
                instance: /schemas/dataOfferingShape/content
                issues: []
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              example:
                type: urn:problem-type:simpl:internalServerError
                title: Internal Server Error
                status: 500
                instance: /schemas/dataOfferingShape/content
                detail: Unexpected internal error
        "200":
          description: TTL schema file content
          content:
            text/turtle:
              schema:
                type: string
              examples:
                ttlExample:
                  summary: Example TTL content
                  description: ttlExample
                  value: '@prefix ex: <http://example.org/> .'
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnauthorizedProblem'
              example:
                type: urn:problem-type:simpl:unauthorized
                title: Unauthorized
                status: 401
                instance: /schemas/dataOfferingShape/content
                detail: Missing or invalid Authorization header
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/NotFoundProblem'
              examples:
                Not Found:
                  summary: Schema not found
                  description: Not Found
                  value:
                    type: urn:problem-type:simpl:notFound
                    title: Resource not found
                    status: 404
                    detail: Schema with identifier 'dataOfferingShape' was not found
                    instance: /schemas/dataOfferingShape/content
        "406":
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/NotAcceptableProblem'
              examples:
                Not Acceptable Example:
                  description: Requested media type is not supported
                  value:
                    type: urn:problem-type:simpl:notAcceptable
                    title: Not Acceptable
                    status: 406
                    detail: The requested media type could not be provided.
                    instance: /schemas/dataOfferingShape/content
  /schemas/{schemaId}/{version}:
    get:
      tags:
      - Schema
      summary: Retrieve a specific version of a schema
      description: Retrieves the content of a specific version of a schema identified by its schema name and version. The endpoint returns the representation of the schema as published by the Governance Authority
      operationId: getSchemaByVersion
      parameters:
      - name: schemaId
        in: path
        description: Unique identifier of the TTL schema
        required: true
        schema:
          type: string
          description: Unique identifier of the TTL schema
          example: dataOfferingShape
        example: dataOfferingShape
      - name: version
        in: path
        description: Version of the TTL schema
        required: true
        schema:
          type: string
          description: Version of the TTL schema
          example: 1.0.0
        example: 1.0.0
      responses:
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              example:
                type: urn:problem-type:simpl:validationError
                title: Invalid payload
                status: 400
                detail: missing required arguments
                instance: /schemas/{schemaName}/{version}
                issues:
                - detail: Field 'schemaName' must not be empty
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              example:
                type: urn:problem-type:simpl:internalServerError
                title: Internal Server Error
                status: 500
                instance: /schemas/{schemaName}/{version}
                detail: Unexpected internal error
        "200":
          description: Returns the content of the specified TTL file
          content:
            text/turtle:
              schema:
                type: string
              example: |
                @prefix rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#> .
                @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
                @prefix sh: <http://www.w3.org/ns/shacl#> .
                @prefix simpl: <http://w3id.org/gaia-x/simpl#> .
                @prefix xsd: <http://www.w3.org/2001/XMLSchema#> .

                simpl:DataOfferingShape
                  rdf:type sh:NodeShape ;
                  sh:targetClass simpl:DataOffering ;
                  sh:property [
                    sh:path simpl:name ;
                    sh:datatype xsd:string ;
                    sh:minCount 1 ;
                    sh:maxCount 1 ;
                    sh:description "The name of the data offering." ;
                  ] ;
                  sh:property [
                    sh:path simpl:description ;
                    sh:datatype xsd:string ;
                    sh:minCount 0 ;
                    sh:maxCount 1 ;
                    sh:description "A description of the data offering." ;
                  ] ;
                  sh:property [
                    sh:path simpl:format ;
                    sh:datatype xsd:string ;
                    sh:minCount 1 ;
                    sh:maxCount 1 ;
                    sh:description "The format of the data offering, e.g. XML, JSON, CSV." ;
                  ] .
        "404":
          description: Schema not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/NotFoundProblem'
              examples:
                Schema Not Found Example:
                  description: Schema not found
                  value:
                    type: urn:problem-type:simpl:notFound
                    title: Resource not found
                    status: 404
                    detail: Schema with identifier 'dataOfferingShape' was not found
                    instance: /schemas/dataOfferingShape/content
        "406":
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/NotAcceptableProblem'
              examples:
                Not Acceptable Example:
                  description: Requested media type is not supported
                  value:
                    type: urn:problem-type:simpl:notAcceptable
                    title: Not Acceptable
                    status: 406
                    detail: Requested media type 'application/json' is not supported. Use 'text/turtle'.
                    instance: /schemas/dataOfferingShape/content
  /schemas:
    get:
      tags:
      - Schema
      summary: List all available schema
      description: Returns all schema info in order to allow them to be selected and initiate the self-description creation process.
      operationId: getSchemas
      parameters:
      - name: resourceType
        in: query
        description: resourceType
        required: false
        schema:
          type: string
        example: data
      responses:
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              example:
                type: urn:problem-type:simpl:badRequest
                title: Invalid payload
                status: 400
                detail: Invalid request
                instance: /schemas
                issues: []
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              example:
                type: urn:problem-type:simpl:internalServerError
                title: Internal Server Error
                status: 500
                instance: /schemas
                detail: Unexpected internal error
        "200":
          description: A map of available TTL schema files
          content:
            application/json:
              schema:
                type: object
              examples:
                Available schemas:
                  description: Available schemas
                  value:
                    schemas:
                    - title: Application Asset
                      name: health
                      description: Schema for describing a software application.
                      resourceType: APPLICATION
                      version: 1.0.0
                      schemaId: applicationHealth
                    - title: Data Offering
                      name: Data offering
                      description: SHACL shape for data offering self-descriptions.
                      resourceType: DATA
                      version: 1.0.0
                      schemaId: dataOfferingShape
                No schemas available:
                  description: No schemas available for the current environment/tenant
                  value:
                    schemas: []
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnauthorizedProblem'
              example:
                type: urn:problem-type:simpl:unauthorized
                title: Unauthorized
                status: 401
                instance: /schemas
                detail: Missing or invalid Authorization header
        "406":
          description: Not Acceptable
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/NotAcceptableProblem'
              examples:
                Not Acceptable Example:
                  description: Requested media type is not supported
                  value:
                    type: urn:problem-type:simpl:notAcceptable
                    title: Not Acceptable
                    status: 406
                    detail: The requested media type could not be provided.
                    instance: /schemas
