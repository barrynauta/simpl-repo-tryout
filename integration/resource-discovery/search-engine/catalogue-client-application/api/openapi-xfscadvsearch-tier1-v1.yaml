          description: Schema not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/NotFoundProblem'
              example:
                type: urn:problem-type:simpl:notFound
                title: SelfDescription not found
                status: 404
                detail: SelfDescription with identifier 'did:web:registry.gaia-x.eu:DataOffering:123' was not found
