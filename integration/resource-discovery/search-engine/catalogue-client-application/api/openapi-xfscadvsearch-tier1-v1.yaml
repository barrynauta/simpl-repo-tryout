openapi: 3.0.1
components:
  securitySchemes:
    bearerAuth:
      type: http
      description: IAA cloud gateway JWT token
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UnauthorizedProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        additionalProperties:
          type: object
          additionalProperties:
            type: object
    InternalServerErrorProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        additionalProperties:
          type: object
          additionalProperties:
            type: object
    NotFoundProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        additionalProperties:
          type: object
          additionalProperties:
            type: object
    InputObject:
      type: object
      properties:
        in:
          type: string
          enum:
          - body
          - path
          - query
          - header
        name:
          type: string
        value:
          type: object
    BadRequestProblem:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        issues:
          type: array
          items:
            $ref: '#/components/schemas/InputValidationIssue'
        additionalProperties:
          type: object
          additionalProperties:
            type: object
    InputValidationIssue:
      type: object
      properties:
        type:
          type: string
          format: uri
        href:
          type: string
          format: uri
        title:
          type: string
        detail:
          type: string
        in:
          type: string
          enum:
          - body
          - path
          - query
          - header
        name:
          type: string
        value:
          type: object
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/InputObject'
        additionalProperties:
          type: object
          additionalProperties:
            type: object
paths:
  /selfDescriptions:
    get:
      tags:
      - Self Description
      summary: Returns the result of a simple search on the catalog
      description: Performs a keyword-based search across the catalog of self-descriptions. This endpoint allows clients to retrieve a filtered list of self-descriptions by providing a search term via the `q` query parameter.
      operationId: getSimpleSearch
      parameters:
      - name: q
        in: query
        description: A keyword used to filter self-descriptions in the federated catalog
        required: true
        schema:
          type: string
          description: A keyword used to filter self-descriptions in the federated catalog
          example: Health Data
        example: Health Data
      - name: page
        in: query
        description: Page number (1-based). Must be greater than 0
        required: false
        schema:
          type: integer
          description: Page number (1-based). Must be greater than 0
          format: int32
          example: 1
          default: 1
        example: 1
      - name: pageSize
        in: query
        description: Number of items per page. Must be greater than 0
        required: false
        schema:
          type: integer
          description: Number of items per page. Must be greater than 0
          format: int32
          example: 20
          default: 20
        example: 20
      responses:
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              example:
                type: urn:problem-type:simpl:validationError
                title: Invalid payload
                status: 400
                detail: missing required arguments
                instance: /selfDescriptions
                issues:
                - detail: Field 'q' must not be empty
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              example:
                type: urn:problem-type:simpl:internalServerError
                title: Internal Server Error
                status: 500
                instance: /selfDescriptions
                detail: Unexpected internal error
        "200":
          description: Returns search results
          content:
            application/json:
              schema:
                type: object
              example:
                totalCount: 4
                items:
                - i:
                    claimsGraphUri:
                    - did:web:registry.gaia-x.eu:DataOffering:fMw2UtNCDW-ydI83YKscqCKa-n75jJ0qY7v7====
                    name: aefaf
                    description: afafa
                    inLanguage: en
                    serviceAccessPoint: https://creation.com
                - i:
                    claimsGraphUri:
                    - did:web:registry.gaia-x.eu:DataOffering:fMw2UtNCDW-ydI83YKscqCKa-n75jJ0qY7v1
                    name: aefaf
                    description: afafa
                    inLanguage: en
                    serviceAccessPoint: https://creation.com
                - i:
                    claimsGraphUri:
                    - did:web:registry.gaia-x.eu:DataOffering:fMw2UtNCDW-ydI83YKscqCKa-n75jJ0qY7v0
                    name: aefaf
                    description: afafa
                    inLanguage: en
                    serviceAccessPoint: https://creation.com
                - i:
                    claimsGraphUri:
                    - did:web:registry.gaia-x.eu:DataOffering:fMw2UtNCDW-ydI83YKscqCKa-n75jJ0qY7v8====
                    name: aefaf
                    description: afafa
                    inLanguage: en
                    serviceAccessPoint: https://creation.com
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnauthorizedProblem'
              example:
                type: urn:problem-type:simpl:unauthorized
                title: Unauthorized
                status: 401
                instance: /selfDescriptions
                detail: Missing or invalid Authorization header
  /selfDescriptions/advanced:
    post:
      tags:
      - Self Description
      summary: Returns the result of an advanced search on the catalog
      description: Executes an advanced search query on the federated catalog using structured criteria. This endpoint allows consumers to filter and retrieve self-descriptions based on specific metadata attributes. Each JSON root key needs to correspond to a resource description node name. As a value for that key an JSON object need to be provided with the searched property names and values. In case of numerical values we can provide a range of searched values by providing op1 and op2 properties as described in the example.
      operationId: postAdvancedSearch
      requestBody:
        content:
          application/json:
            schema:
              type: string
              description: Object containing advanced search criteria
              example: '{"simpl:GeneralServiceProperties":{"@type":"simpl:GeneralServiceProperties","name":"Health"},"simpl:OfferingPrice":{"price":{"op1":">=","value1":15,"op2":"<","value2":150}}}'
        required: true
      responses:
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              example:
                type: urn:problem-type:simpl:validationError
                title: Invalid payload
                status: 400
                detail: missing required arguments
                instance: /selfDescriptions/advanced
                issues:
                - detail: Request body must not be empty
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              example:
                type: urn:problem-type:simpl:internalServerError
                title: Internal Server Error
                status: 500
                instance: /selfDescriptions/advanced
                detail: Unexpected internal error
        "200":
          description: Returns search results
          content:
            application/json:
              schema:
                type: object
              example:
                totalCount: 4
                items:
                - i:
                    claimsGraphUri:
                    - did:web:registry.gaia-x.eu:DataOffering:fMw2UtNCDW-ydI83YKscqCKa-n75jJ0qY7v7====
                    name: aefaf
                    description: afafa
                    inLanguage: en
                    serviceAccessPoint: https://creation.com
                - i:
                    claimsGraphUri:
                    - did:web:registry.gaia-x.eu:DataOffering:fMw2UtNCDW-ydI83YKscqCKa-n75jJ0qY7v1
                    name: aefaf
                    description: afafa
                    inLanguage: en
                    serviceAccessPoint: https://creation.com
                - i:
                    claimsGraphUri:
                    - did:web:registry.gaia-x.eu:DataOffering:fMw2UtNCDW-ydI83YKscqCKa-n75jJ0qY7v0
                    name: aefaf
                    description: afafa
                    inLanguage: en
                    serviceAccessPoint: https://creation.com
                - i:
                    claimsGraphUri:
                    - did:web:registry.gaia-x.eu:DataOffering:fMw2UtNCDW-ydI83YKscqCKa-n75jJ0qY7v8====
                    name: aefaf
                    description: afafa
                    inLanguage: en
                    serviceAccessPoint: https://creation.com
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnauthorizedProblem'
              example:
                type: urn:problem-type:simpl:unauthorized
                title: Unauthorized
                status: 401
                instance: /selfDescriptions/advanced
                detail: Missing or invalid Authorization header
  /selfDescriptions/{selfDescriptionId}:
    get:
      tags:
      - Self Description
      summary: Returns self description based on selfDescriptionID
      description: Fetches a detailed self-description document identified by the provided selfDescriptionId. This endpoint returns a Verifiable Credential that describes a data/infra/app offering in compliance with SIMPL standards. The response includes metadata such as service properties, contract templates, data formats, and access endpoints.
      operationId: getSelfDescription
      parameters:
      - name: selfDescriptionId
        in: path
        description: The unique identifier of the self-description to retrieve.
        required: true
        schema:
          type: string
          description: The unique identifier of the self-description to retrieve.
          example: did:web:registry.gaia-x.eu:DataOffering:4727baa4-8c7b-4e7f-90ba-eebe460c0408
        example: did:web:registry.gaia-x.eu:DataOffering:4727baa4-8c7b-4e7f-90ba-eebe460c0408
      responses:
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestProblem'
              example:
                type: urn:problem-type:simpl:validationError
                title: Invalid payload
                status: 400
                detail: missing required arguments
                instance: /selfDescriptions/{selfDescriptionId}
                issues:
                - detail: Field 'selfDescriptionId' must not be empty
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblem'
              example:
                type: urn:problem-type:simpl:internalServerError
                title: Internal Server Error
                status: 500
                instance: /selfDescriptions/{selfDescriptionId}
                detail: Unexpected internal error
        "200":
          description: Returns self description
          content:
            application/json:
              schema:
                type: object
              example:
                '@context':
                - https://www.w3.org/2018/credentials/v1
                - https://w3id.org/security/suites/jws-2020/v1
                credentialSubject:
